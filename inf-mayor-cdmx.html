<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infantil Mayor CDMX 2026</title>

<style>
body{
  margin:0;
  font-family:-apple-system,system-ui;
  background:url('background.png') center/cover fixed;
  color:white;
}

/* GLASS HEADER */
header{
  position:sticky;
  top:0;
  backdrop-filter:blur(14px);
  background:rgba(0,0,0,0.4);
  padding:20px;
  text-align:center;
}

h1{
  margin:0;
  font-size:32px;
  text-shadow:0 0 20px rgba(0,150,255,0.6);
  animation:breath 3s infinite;
}

@keyframes breath{
  0%,100%{text-shadow:0 0 10px rgba(0,150,255,0.5);}
  50%{text-shadow:0 0 30px rgba(0,150,255,1);}
}

.subtitle{
  font-size:18px;
  font-weight:bold;
}

/* CATEGORY NAV */
.nav{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:10px;
}

.nav a{
  color:white;
  text-decoration:none;
  opacity:0.7;
}
.nav a.active{opacity:1;font-weight:bold;}

/* FILTERS */
.filters{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.filters button{
  padding:10px 18px;
  border-radius:25px;
  border:none;
  background:#0f2a44;
  color:white;
  font-weight:bold;
}

.filters button.active{
  background:#003b66;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  border-radius:16px;
  overflow:hidden;
  position:relative;
}

.card img{
  width:100%;
  transition:.4s;
}
.card:hover img{transform:scale(1.05);}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.lightbox.active{display:flex;}

.lightbox img{
  max-width:95%;
  max-height:70%;
  transition:.3s;
}

.controls{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button.action{
  padding:10px 16px;
  border-radius:20px;
  border:none;
  background:#0077cc;
  color:white;
}

/* NAV ARROWS */
.arrow{
  position:absolute;
  top:50%;
  font-size:40px;
  cursor:pointer;
}
.left{left:10px;}
.right{right:10px;}
</style>
</head>

<body>

<header>
  <h1>AOFM Waterpolo</h1>
  <div class="subtitle">Inf Mayor CDMX 2026</div>
</header>

<div class="nav">
  <a href="inf-mayor-cdmx.html" class="active">Inf Mayor</a>
  <a href="inf-menor-cdmx.html">Inf Menor</a>
</div>

<div class="filters" id="filters"></div>
<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <div class="arrow left" onclick="prev()">‹</div>
  <div class="arrow right" onclick="next()">›</div>
  <img id="lightbox-img">
  <div class="controls">
    <button class="action" onclick="download()">Download</button>
    <button class="action" onclick="share()">Share</button>
    <button class="action" onclick="zoom()">Zoom</button>
  </div>
</div>

<script>
const cloud="du4pmuch7";
const TAG="infmayor2026";

const teams=[
["ALL",TAG],
["vs AGS","infmayor2026_ags"],
["vs Coahuila","infmayor2026_coahuila"],
["vs EdoMex","infmayor2026_edomex"],
["vs Guerrero","infmayor2026_guerrero"],
["vs Nuevo León","infmayor2026_nuevoleon"],
["vs QRoo","infmayor2026_qroo"]
];

let imgs=[],i=0,zoomed=false;

const g=document.getElementById("gallery");
const f=document.getElementById("filters");
const lb=document.getElementById("lightbox");
const lbImg=document.getElementById("lightbox-img");

teams.forEach((t,idx)=>{
  const b=document.createElement("button");
  b.textContent=t[0];
  if(idx==0) b.classList.add("active");
  b.onclick=()=>{
    document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    load(t[1]);
  };
  f.appendChild(b);
});

async function load(tag){
  g.innerHTML="";
  const r=await fetch(`https://res.cloudinary.com/${cloud}/image/list/${tag}.json`);
  const d=await r.json();
  imgs=d.resources;

  imgs.forEach((im,idx)=>{
    const el=document.createElement("img");
    el.src=`https://res.cloudinary.com/${cloud}/image/upload/w_500,q_auto/${im.public_id}.jpg`;
    el.onclick=()=>open(idx);
    const c=document.createElement("div");
    c.className="card";
    c.appendChild(el);
    g.appendChild(c);
  });
}

function open(index){
  i=index;
  lb.classList.add("active");
  update();
}

function update(){
  lbImg.src=`https://res.cloudinary.com/${cloud}/image/upload/${imgs[i].public_id}.jpg`;
}

function next(){i=(i+1)%imgs.length;update();}
function prev(){i=(i-1+imgs.length)%imgs.length;update();}

function download(){
  window.open(lbImg.src);
}

function share(){
  navigator.share?.({url:lbImg.src});
}

function zoom(){
  zoomed=!zoomed;
  lbImg.style.transform=zoomed?"scale(2)":"scale(1)";
}

let start=0;
lb.addEventListener("touchstart",e=>start=e.touches[0].clientX);
lb.addEventListener("touchend",e=>{
  let end=e.changedTouches[0].clientX;
  if(start-end>50) next();
  if(end-start>50) prev();
});

lb.onclick=e=>{if(e.target===lb) lb.classList.remove("active");}

load(TAG);
</script>

</body>
</html>
