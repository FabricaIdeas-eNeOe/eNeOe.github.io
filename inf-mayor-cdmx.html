<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infantil Mayor CDMX 2026</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220 url('background.png') center/cover fixed;
  color:white;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(10,20,40,0.75);
  backdrop-filter:blur(8px);
  z-index:-1;
}

header{text-align:center;padding:40px;}
.back{position:absolute;left:20px;top:20px;color:white;text-decoration:none;}

/* FILTERS */
.filters{display:flex;overflow-x:auto;gap:10px;padding:10px 16px;}
.filters button{padding:10px 18px;border-radius:20px;background:#1e293b;color:white;border:none;}
.filters button.active{background:#38bdf8;}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
  padding:16px;
}

.card{position:relative;border-radius:12px;overflow:hidden;background:#111;}
.card img{width:100%;opacity:0;transition:0.4s;}
.card img.loaded{opacity:1;}

.skeleton{
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,#222,#333,#222);
  animation:shimmer 1.2s infinite;
}
@keyframes shimmer{0%{background-position:-200px}100%{background-position:200px}}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.lightbox.active{display:flex;}

.lightbox img{
  max-width:90%;
  max-height:70%;
  transition:0.3s;
}

/* CONTROLS */
.counter{
  position:absolute;
  top:20px;
  font-size:14px;
  opacity:0.8;
}

.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  cursor:pointer;
}

.prev{left:20px;}
.next{right:20px;}

.download-btn{
  margin-top:10px;
  padding:10px 20px;
  border-radius:25px;
  background:#38bdf8;
  border:none;
}
</style>
</head>

<body>

<div class="overlay"></div>

<a href="campeonato2026.html" class="back">← Back</a>

<header>
  <h1>AOFM Waterpolo</h1>
  <p>Inf Mayor CDMX 2026</p>
</header>

<div class="filters" id="filters"></div>
<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="counter" id="counter"></div>

  <div class="nav prev" onclick="prevImage()">❮</div>
  <div class="nav next" onclick="nextImage()">❯</div>

  <img id="lightbox-img">

  <a id="downloadLink" download>
    <button class="download-btn">Download</button>
  </a>
</div>

<script>
const cloudName="du4pmuch7";
const TAG="infmayor2026";

const teams=[
  {name:"ALL", tag:TAG},
  {name:"vs Aguascalientes", tag:"infmayor2026_ags"},
  {name:"vs Coahuila", tag:"infmayor2026_coahuila"},
  {name:"vs EdoMex", tag:"infmayor2026_edomex"},
  {name:"vs Guerrero", tag:"infmayor2026_guerrero"},
  {name:"vs Nuevo León", tag:"infmayor2026_nuevoleon"},
  {name:"vs QRoo", tag:"infmayor2026_qroo"}
];

let images=[];
let currentIndex=0;

const gallery=document.getElementById("gallery");
const filters=document.getElementById("filters");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");
const counter=document.getElementById("counter");
const downloadLink=document.getElementById("downloadLink");

/* BUTTONS */
function createButtons(){
  teams.forEach((t,i)=>{
    const btn=document.createElement("button");
    btn.textContent=t.name;
    if(i===0) btn.classList.add("active");

    btn.onclick=()=>{
      document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      loadImages(t.tag);
    };

    filters.appendChild(btn);
  });
}

/* LOAD */
async function loadImages(tag){
  gallery.innerHTML="";
  const res=await fetch(`https://res.cloudinary.com/${cloudName}/image/list/${tag}.json`);
  const data=await res.json();

  images=data.resources;

  images.forEach((img,i)=>{
    const card=document.createElement("div");
    card.className="card";

    const skeleton=document.createElement("div");
    skeleton.className="skeleton";

    const image=document.createElement("img");
    const size=window.innerWidth<600?400:800;

    image.src=`https://res.cloudinary.com/${cloudName}/image/upload/w_${size},q_auto,f_auto/${img.public_id}.jpg`;
    image.loading="lazy";

    image.onload=()=>{
      image.classList.add("loaded");
      skeleton.remove();
    };

    image.onclick=()=>openLightbox(i);

    card.appendChild(skeleton);
    card.appendChild(image);
    gallery.appendChild(card);
  });
}

/* LIGHTBOX */
function openLightbox(i){
  currentIndex=i;
  lightbox.classList.add("active");
  updateLightbox();
}

function updateLightbox(){
  const img=images[currentIndex];
  const url=`https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.jpg`;

  lightboxImg.src=url;
  downloadLink.href=url;
  counter.innerText=`${currentIndex+1} / ${images.length}`;

  preload();
}

function nextImage(){
  currentIndex=(currentIndex+1)%images.length;
  updateLightbox();
}

function prevImage(){
  currentIndex=(currentIndex-1+images.length)%images.length;
  updateLightbox();
}

/* PRELOAD */
function preload(){
  const next=new Image();
  const prev=new Image();

  next.src=`https://res.cloudinary.com/${cloudName}/image/upload/${images[(currentIndex+1)%images.length].public_id}.jpg`;
  prev.src=`https://res.cloudinary.com/${cloudName}/image/upload/${images[(currentIndex-1+images.length)%images.length].public_id}.jpg`;
}

/* SWIPE */
let startX=0;
lightbox.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
lightbox.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(startX-endX>50) nextImage();
  if(endX-startX>50) prevImage();
});

/* KEYBOARD */
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") nextImage();
  if(e.key==="ArrowLeft") prevImage();
  if(e.key==="Escape") lightbox.classList.remove("active");
});

/* CLOSE */
lightbox.onclick=()=>lightbox.classList.remove("active");

/* INIT */
createButtons();
loadImages(TAG);
</script>

</body>
</html>
