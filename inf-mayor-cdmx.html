<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infantil Mayor CDMX 2026</title>

<style>
body{
  margin:0;
  font-family:-apple-system,system-ui;
  background:url('background.png') center/cover no-repeat fixed;
  color:#0b3c5d;
}

/* BACK */
.back{
  position:absolute;
  top:20px;
  left:20px;
  text-decoration:none;
  font-weight:bold;
  color:#0b3c5d;
}

/* HEADER */
.header{
  text-align:center;
  padding:80px 20px 30px;
}

.title{
  font-size:40px;
  font-weight:800;
  background:rgba(255,255,255,0.7);
  display:inline-block;
  padding:15px 40px;
  border-radius:20px;
  backdrop-filter:blur(10px);
}

.subtitle{
  margin-top:10px;
  font-size:18px;
  font-weight:600;
}

/* NAV */
.nav{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.nav a{
  text-decoration:none;
  font-weight:600;
  opacity:0.6;
  color:#0b3c5d;
}

.nav a.active{
  opacity:1;
}

/* FILTERS */
.filters{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:30px 20px;
  flex-wrap:wrap;
}

.filters button{
  padding:10px 20px;
  border-radius:20px;
  border:none;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(6px);
  font-weight:600;
  cursor:pointer;
}

.filters button.active{
  background:#0b3c5d;
  color:white;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:18px;
  padding:0 40px 60px;
}

.card{
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  display:block;
  cursor:pointer;
  transition:.3s;
}

.card:hover img{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.lightbox.active{
  display:flex;
}

.lightbox img{
  max-width:92%;
  max-height:75%;
  border-radius:12px;
  transition:.2s;
}

/* BUTTON */
.controls{
  margin-top:20px;
}

.controls button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:#0b3c5d;
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* ARROWS */
.arrow{
  position:absolute;
  top:50%;
  font-size:40px;
  color:white;
  cursor:pointer;
  user-select:none;
}

.left{left:20px;}
.right{right:20px;}
</style>
</head>

<body>

<a href="campeonato2026.html" class="back">← Back</a>

<div class="header">
  <div class="title">AOFM Waterpolo</div>
  <div class="subtitle">Inf Mayor CDMX 2026</div>

  <div class="nav">
    <a href="inf-mayor-cdmx.html" class="active">Inf Mayor</a>
    <a href="inf-menor-cdmx.html">Inf Menor</a>
  </div>
</div>

<div class="filters" id="filters"></div>
<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <div class="arrow left" onclick="prev()">‹</div>
  <div class="arrow right" onclick="next()">›</div>

  <img id="lightbox-img">

  <div class="controls">
    <button onclick="downloadImage()">Download</button>
  </div>
</div>

<script>
const cloud="du4pmuch7";
const TAG="infmayor2026";

const teams=[
["ALL",TAG],
["vs AGS","infmayor2026_ags"],
["vs Coahuila","infmayor2026_coahuila"],
["vs EdoMex","infmayor2026_edomex"],
["vs Guerrero","infmayor2026_guerrero"],
["vs Nuevo León","infmayor2026_nuevoleon"],
["vs QRoo","infmayor2026_qroo"]
];

let imgs=[],i=0,startX=0,endX=0;

const g=document.getElementById("gallery");
const f=document.getElementById("filters");
const lb=document.getElementById("lightbox");
const lbImg=document.getElementById("lightbox-img");

/* FILTER BUTTONS */
teams.forEach((t,idx)=>{
  const b=document.createElement("button");
  b.textContent=t[0];
  if(idx===0) b.classList.add("active");

  b.onclick=()=>{
    document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    load(t[1]);
  };

  f.appendChild(b);
});

/* LOAD IMAGES */
async function load(tag){
  g.innerHTML="";

  const r=await fetch(`https://res.cloudinary.com/${cloud}/image/list/${tag}.json`);
  const d=await r.json();
  imgs=d.resources;

  imgs.forEach((im,idx)=>{
    const img=document.createElement("img");
    img.loading="lazy";
    img.src=`https://res.cloudinary.com/${cloud}/image/upload/w_600,q_auto,f_auto/${im.public_id}.jpg`;

    img.onclick=()=>open(idx);

    const c=document.createElement("div");
    c.className="card";
    c.appendChild(img);
    g.appendChild(c);
  });
}

/* LIGHTBOX */
function open(index){
  i=index;
  lb.classList.add("active");
  update();
  preload();
}

function update(){
  lbImg.src=`https://res.cloudinary.com/${cloud}/image/upload/q_auto,f_auto/${imgs[i].public_id}.jpg`;
}

function next(){i=(i+1)%imgs.length;update();preload();}
function prev(){i=(i-1+imgs.length)%imgs.length;update();preload();}

/* PRELOAD */
function preload(){
  new Image().src=`https://res.cloudinary.com/${cloud}/image/upload/${imgs[(i+1)%imgs.length].public_id}.jpg`;
}

/* DOWNLOAD */
function downloadImage(){
  const url=lbImg.src;
  const a=document.createElement("a");
  a.href=url;
  a.download="waterpolo.jpg";
  document.body.appendChild(a);
  a.click();
  a.remove();
}

/* SWIPE */
lb.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
lb.addEventListener("touchend",e=>{
  endX=e.changedTouches[0].clientX;
  if(startX-endX>50) next();
  if(endX-startX>50) prev();
});

/* CLOSE */
lb.onclick=e=>{
  if(e.target===lb) lb.classList.remove("active");
};

load(TAG);
</script>

</body>
</html>
