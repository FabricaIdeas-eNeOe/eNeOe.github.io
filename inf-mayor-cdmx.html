<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infantil Mayor CDMX 2026</title>

<style>
body{margin:0;font-family:-apple-system,system-ui;background:url('background.png') center/cover no-repeat fixed;color:#0b3c5d;}
.back{position:absolute;top:20px;left:20px;text-decoration:none;font-weight:bold;color:#0b3c5d;}

.header{text-align:center;padding:80px 20px 30px;}
.title{font-size:40px;font-weight:800;background:rgba(255,255,255,0.7);padding:15px 40px;border-radius:20px;display:inline-block;backdrop-filter:blur(10px);}
.subtitle{margin-top:10px;font-size:18px;font-weight:600;}

.filters{display:flex;justify-content:center;gap:10px;margin:30px 20px;flex-wrap:wrap;}
.filters button{padding:10px 20px;border-radius:20px;border:none;background:rgba(255,255,255,0.7);backdrop-filter:blur(6px);font-weight:600;cursor:pointer;}
.filters button.active{background:#0b3c5d;color:white;}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;padding:0 40px 60px;}
.card{border-radius:18px;overflow:hidden;}
.card img{width:100%;cursor:pointer;}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;}
.lightbox.active{display:flex;}
.lightbox img{max-width:92%;max-height:75%;border-radius:12px;}

.controls{margin-top:20px;}
.controls button{padding:12px 20px;border:none;border-radius:25px;background:#0b3c5d;color:white;font-weight:600;}

.arrow{position:absolute;top:50%;font-size:40px;color:white;cursor:pointer;}
.left{left:20px;}
.right{right:20px;}
</style>
</head>

<body>

<a href="campeonato2026.html" class="back">← Back</a>

<div class="header">
  <div class="title">AOFM Waterpolo</div>
  <div class="subtitle">Inf Mayor CDMX 2026</div>
</div>

<div class="filters" id="filters"></div>
<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <div class="arrow left" onclick="prev()">‹</div>
  <div class="arrow right" onclick="next()">›</div>
  <img id="lightbox-img">
  <div class="controls">
    <button onclick="downloadImage()">Download</button>
  </div>
</div>

<script>
const cloud="du4pmuch7";
const TAG="infmayor2026";

const teams=[
["ALL",TAG],
["vs AGS","infmayor2026_ags"],
["vs Coahuila","infmayor2026_coahuila"],
["vs EdoMex","infmayor2026_edomex"],
["vs Guerrero","infmayor2026_guerrero"],
["vs Nuevo León","infmayor2026_nuevoleon"],
["vs QRoo","infmayor2026_qroo"]
];

let imgs=[],i=0,startX=0,endX=0;

const g=document.getElementById("gallery");
const f=document.getElementById("filters");
const lb=document.getElementById("lightbox");
const lbImg=document.getElementById("lightbox-img");

teams.forEach((t,idx)=>{
  const b=document.createElement("button");
  b.textContent=t[0];
  if(idx===0) b.classList.add("active");
  b.onclick=()=>{
    document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    load(t[1]);
  };
  f.appendChild(b);
});

async function load(tag){
  g.innerHTML="";
  const r=await fetch(`https://res.cloudinary.com/${cloud}/image/list/${tag}.json`);
  const d=await r.json();
  imgs=d.resources;

  imgs.forEach((im,idx)=>{
    const img=document.createElement("img");
    img.loading="lazy";
    img.src=`https://res.cloudinary.com/${cloud}/image/upload/w_600,q_auto,f_auto/${im.public_id}.jpg`;
    img.onclick=()=>open(idx);

    const c=document.createElement("div");
    c.className="card";
    c.appendChild(img);
    g.appendChild(c);
  });
}

function open(index){
  i=index;
  lb.classList.add("active");
  update();
  preload();
}

function update(){
  lbImg.src=`https://res.cloudinary.com/${cloud}/image/upload/q_auto,f_auto/${imgs[i].public_id}.jpg`;
}

function next(){i=(i+1)%imgs.length;update();preload();}
function prev(){i=(i-1+imgs.length)%imgs.length;update();preload();}

function preload(){
  new Image().src=`https://res.cloudinary.com/${cloud}/image/upload/${imgs[(i+1)%imgs.length].public_id}.jpg`;
}

function downloadImage(){
  const a=document.createElement("a");
  a.href=lbImg.src;
  a.download="waterpolo.jpg";
  a.click();
}

/* swipe */
lb.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
lb.addEventListener("touchend",e=>{
  endX=e.changedTouches[0].clientX;
  if(startX-endX>50) next();
  if(endX-startX>50) prev();
});

lb.onclick=e=>{if(e.target===lb) lb.classList.remove("active");}

load(TAG);
</script>

</body>
</html>
