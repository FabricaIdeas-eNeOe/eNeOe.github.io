<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infantil Mayor CDMX 2026</title>

<script src="https://unpkg.com/cloudinary-core/cloudinary-core-shrinkwrap.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b1220 url('background.png') center/cover fixed;
  color:white;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(10,20,40,0.75);
  backdrop-filter:blur(6px);
  z-index:-1;
}

header{text-align:center;padding:40px 20px;}

.back{
  position:absolute;
  left:20px;
  top:20px;
  text-decoration:none;
  color:white;
  font-size:14px;
}

.filters{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

.filters button{
  border:none;
  padding:10px 16px;
  border-radius:20px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

.filters button.active{
  background:#38bdf8;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:16px;
  padding:20px;
}

.gallery img{
  width:100%;
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
}

.gallery img:hover{transform:scale(1.03);}
</style>
</head>

<body>
<div class="overlay"></div>

<a href="campeonato2026.html" class="back">← Back</a>

<header>
  <h1>AOFM Waterpolo</h1>
  <p>Inf Mayor CDMX 2026</p>
</header>

<div class="filters" id="filters"></div>
<div class="gallery" id="gallery"></div>

<script>
const cloudName = "du4pmuch7";
const TAG = "infmayor2026";

const teams = [
  {name:"ALL", tag:TAG},
  {name:"vs Aguascalientes", tag:"infmayor2026_ags"},
  {name:"vs Coahuila", tag:"infmayor2026_coahuila"},
  {name:"vs EdoMex", tag:"infmayor2026_edomex"},
  {name:"vs Guerrero", tag:"infmayor2026_guerrero"},
  {name:"vs Nuevo León", tag:"infmayor2026_nuevoleon"},
  {name:"vs QRoo", tag:"infmayor2026_qroo"}
];

const gallery = document.getElementById("gallery");
const filters = document.getElementById("filters");

function createButtons(){
  teams.forEach((t,i)=>{
    const btn=document.createElement("button");
    btn.textContent=t.name;
    if(i===0) btn.classList.add("active");
    btn.onclick=()=>{
      document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      loadImages(t.tag);
    };
    filters.appendChild(btn);
  });
}

async function loadImages(tag){
  gallery.innerHTML="Loading...";
  const res=await fetch(`https://res.cloudinary.com/${cloudName}/image/list/${tag}.json`);
  const data=await res.json();

  gallery.innerHTML="";
  data.resources.forEach(img=>{
    const el=document.createElement("img");
    el.src=`https://res.cloudinary.com/${cloudName}/image/upload/f_auto,q_auto,w_800/${img.public_id}.jpg`;
    el.onclick=()=>window.open(`https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.jpg`);
    gallery.appendChild(el);
  });
}

createButtons();
loadImages(TAG);
</script>

</body>
</html>
