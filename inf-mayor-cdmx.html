<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infantil Mayor CDMX 2026</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220 url('background.png') center/cover fixed;
  color:white;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(10,20,40,0.75);
  backdrop-filter:blur(8px);
  z-index:-1;
}

header{text-align:center;padding:40px 20px;}

.back{
  position:absolute;
  left:20px;
  top:20px;
  text-decoration:none;
  color:white;
}

.filters{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px 16px;
}

.filters button{
  flex:0 0 auto;
  border:none;
  padding:10px 18px;
  border-radius:20px;
  background:#1e293b;
  color:white;
}

.filters button.active{background:#38bdf8;}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
  padding:16px;
}

.card{position:relative;border-radius:12px;overflow:hidden;background:#111;}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity .4s;
}

.card img.loaded{opacity:1;}

.skeleton{
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,#222,#333,#222);
  animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
  0%{background-position:-200px}
  100%{background-position:200px}
}

.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img{max-width:90%;max-height:90%;}
.lightbox.active{display:flex;}
</style>
</head>

<body>
<div class="overlay"></div>

<a href="campeonato2026.html" class="back">← Back</a>

<header>
  <h1>AOFM Waterpolo</h1>
  <p>Inf Mayor CDMX 2026</p>
</header>

<div class="filters" id="filters"></div>
<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<script>
const cloudName="du4pmuch7";
const TAG="infmayor2026";

const teams=[
  {name:"ALL", tag:TAG},
  {name:"vs Aguascalientes", tag:"infmayor2026_ags"},
  {name:"vs Coahuila", tag:"infmayor2026_coahuila"},
  {name:"vs EdoMex", tag:"infmayor2026_edomex"},
  {name:"vs Guerrero", tag:"infmayor2026_guerrero"},
  {name:"vs Nuevo León", tag:"infmayor2026_nuevoleon"},
  {name:"vs QRoo", tag:"infmayor2026_qroo"}
];

const gallery=document.getElementById("gallery");
const filters=document.getElementById("filters");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

function createButtons(){
  teams.forEach((t,i)=>{
    const btn=document.createElement("button");
    btn.textContent=t.name;
    if(i===0) btn.classList.add("active");

    btn.onclick=()=>{
      document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      loadImages(t.tag);
    };

    filters.appendChild(btn);
  });
}

async function loadImages(tag){
  gallery.innerHTML="";

  const res=await fetch(`https://res.cloudinary.com/${cloudName}/image/list/${tag}.json`);
  const data=await res.json();

  data.resources.forEach(img=>{
    const card=document.createElement("div");
    card.className="card";

    const skeleton=document.createElement("div");
    skeleton.className="skeleton";

    const image=document.createElement("img");

    const size = window.innerWidth < 600 ? 400 : 800;

    image.src=`https://res.cloudinary.com/${cloudName}/image/upload/f_auto,q_auto,w_${size}/${img.public_id}.jpg`;
    image.loading="lazy";

    image.onload=()=>{
      image.classList.add("loaded");
      skeleton.remove();
    };

    image.onclick=()=>{
      lightbox.classList.add("active");
      lightboxImg.src=`https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.jpg`;
    };

    card.appendChild(skeleton);
    card.appendChild(image);
    gallery.appendChild(card);
  });
}

lightbox.onclick=()=>lightbox.classList.remove("active");

createButtons();
loadImages(TAG);
</script>

</body>
</html>
