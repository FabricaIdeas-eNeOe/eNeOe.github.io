<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infantil Mayor CDMX 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* BASE */
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#0b0f14;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px 10px;
}

.title{
  font-size:32px;
  font-weight:800;
}

.subtitle{
  font-size:14px;
  color:#aaa;
}

/* FILTERS */
.filters{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  padding:20px;
}

.btn{
  padding:8px 16px;
  border-radius:20px;
  background:#1c1f26;
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
}

.btn.active{
  background:#0ea5e9;
}

/* GRID */
.gallery{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

/* IMG */
.img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.img:hover{
  transform:scale(1.05);
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal img{
  max-width:90%;
  max-height:90%;
}

.modal.active{
  display:flex;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">AOFM Waterpolo</div>
  <div class="subtitle">Inf Mayor CDMX 2026</div>
</div>

<div class="filters" id="filters"></div>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <img id="modal-img">
</div>

<script>

const cloudName = "du4pmuch7";

/* TAGS (your real structure) */
const categories = {
  all: "infmayor2026",
  ags: "infmayor2026_ags",
  coahuila: "infmayor2026_coahuila",
  edomex: "infmayor2026_edomex",
  guerrero: "infmayor2026_guerrero",
  nuevoleon: "infmayor2026_nuevoleon",
  qroo: "infmayor2026_qroo"
};

const filtersDiv = document.getElementById("filters");
const gallery = document.getElementById("gallery");

/* CREATE BUTTONS */
Object.keys(categories).forEach((key, i)=>{

  const btn = document.createElement("div");
  btn.className = "btn";
  btn.innerText = key.toUpperCase();

  if(i===0) btn.classList.add("active");

  btn.onclick = ()=>{
    document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    loadImages(categories[key]);
  };

  filtersDiv.appendChild(btn);
});

/* LOAD IMAGES */
function loadImages(tag){

  gallery.innerHTML = "";

  fetch(`https://res.cloudinary.com/${cloudName}/image/list/${tag}.json`)
    .then(res=>res.json())
    .then(data=>{

      data.resources.forEach(img=>{

        const url = `https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.jpg`;

        const image = document.createElement("img");
        image.src = url;
        image.className = "img";

        image.onclick = ()=>openModal(url);

        gallery.appendChild(image);

      });

    });
}

/* MODAL */
function openModal(src){
  document.getElementById("modal").classList.add("active");
  document.getElementById("modal-img").src = src;
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

/* INITIAL LOAD */
loadImages(categories.all);

</script>

</body>
</html>
