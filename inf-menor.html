<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería INF-MENOR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 32px;
    }

    .subtitle {
      display: inline-block;
      margin: 15px 0 40px;
      padding: 8px 16px;
      background: #2f5d50;
      color: white;
      border-radius: 20px;
      font-size: 14px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      padding: 0 20px 50px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .btn {
      display: block;
      padding: 12px;
      background: #2f5d50;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #24463c;
    }
  </style>
</head>

<body>

  <h1>GALERÍA INF-MENOR</h1>
  <div class="subtitle">vs GRO</div>
  <div id="filters" style="margin-bottom: 20px;"></div>
  <div class="gallery" id="gallery"></div>


  <script>
  const cloudName = "du4pmuch7";

  const basePathGallery = "WP2026/CN2026/infmenor/gallery/";
  const basePathDownload = "WP2026/CN2026/infmenor/download/";

  const basePrefix = "CN2026_InfMnr_CDMX_";
  const datePart = "_0319_";

  const start = 1;
  const end = 200;

  // 👇 ONLY REAL rivals here
  const rivals = ["GRO", "NLE"];

  const gallery = document.getElementById("gallery");
  const filterContainer = document.getElementById("filters");

  function pad(num) {
    return num.toString().padStart(3, "0");
  }

  function createFilters() {
    const allBtn = document.createElement("button");
    allBtn.innerText = "ALL";
    styleButton(allBtn);
    allBtn.onclick = () => loadGallery("ALL");
    filterContainer.appendChild(allBtn);

    rivals.forEach(rival => {
      const btn = document.createElement("button");
      btn.innerText = rival;
      styleButton(btn);
      btn.onclick = () => loadGallery(rival);
      filterContainer.appendChild(btn);
    });
  }

  function styleButton(btn) {
    btn.style.margin = "5px";
    btn.style.padding = "8px 14px";
    btn.style.border = "none";
    btn.style.borderRadius = "20px";
    btn.style.background = "#2f5d50";
    btn.style.color = "white";
    btn.style.cursor = "pointer";
  }

  function loadGallery(selectedRival) {
    gallery.innerHTML = "";

    for (let i = start; i <= end; i++) {

      const rivalsToLoad = selectedRival === "ALL" ? rivals : [selectedRival];

      rivalsToLoad.forEach(rival => {

        const file = `${basePrefix}${rival}${datePart}${pad(i)}.jpg`;

        const imgUrl = `https://res.cloudinary.com/${cloudName}/image/upload/${basePathGallery}${file}`;
        const downloadUrl = `https://res.cloudinary.com/${cloudName}/image/upload/${basePathDownload}${file}`;

        const img = new Image();

        img.onload = () => {
          const card = document.createElement("div");
          card.className = "card";

          const imageElement = document.createElement("img");
          imageElement.src = imgUrl;

          const link = document.createElement("a");
          link.href = downloadUrl;
          link.className = "btn";
          link.innerText = "Descargar";

          card.appendChild(imageElement);
          card.appendChild(link);
          gallery.appendChild(card);
        };

        img.src = imgUrl;
      });
    }
  }

  createFilters();
  loadGallery("ALL");
</script>
