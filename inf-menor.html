<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería INF-MENOR</title>

  <!-- FIX favicon -->
  <link rel="icon" href="data:,">

  <style>
    body { font-family: Arial; background:#f5f5f5; margin:0; text-align:center; }
    h1 { margin:30px 0 10px; }

    .filters { margin-bottom:20px; }
    .filters button {
      padding:8px 14px; margin:4px;
      border:none; border-radius:20px;
      cursor:pointer; font-weight:bold;
      background:#e0e0e0;
    }
    .filters .active { background:#2f5d50; color:#fff; }

    .gallery {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:15px; padding:20px; max-width:1100px; margin:auto;
    }

    .card {
      background:#fff;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .card img { width:100%; display:block; }

    .card a {
      display:block;
      background:#2f5d50;
      color:#fff;
      text-decoration:none;
      padding:10px;
      font-size:14px;
    }
  </style>
</head>

<body>

<h1>GALERÍA INF-MENOR</h1>

<div class="filters">
  <button onclick="filterGallery('GRO', this)" class="active">GRO</button>
  <button onclick="filterGallery('NLE', this)">NLE</button>
  <button onclick="filterGallery('MIC', this)">MIC</button>
  <button onclick="filterGallery('GTO', this)">GTO</button>
</div>

<div class="gallery" id="gallery"></div>

<script>
const cloud = "du4pmuch7";
const base = "WP2026/CN2026/infmenor";

const rivals = ["GRO","NLE","MIC","GTO"];

// 🔥 DATE PER RIVAL (THIS FIXES EVERYTHING)
const rivalDates = {
  GRO: "0319",
  NLE: "0320",
  MIC: "0321",
  GTO: "0320" // adjust if needed
};

const gallery = document.getElementById("gallery");

// BUILD
rivals.forEach(rival => {
  const date = rivalDates[rival];

  for (let i = 1; i <= 200; i++) {

    const num = String(i).padStart(3,"0");

    const file = `CN2026_InfMnr_CDMX_${rival}_${date}_${num}.jpg`;

    const imgURL = `https://res.cloudinary.com/${cloud}/image/upload/${base}/gallery/${file}`;
    const dlURL  = `https://res.cloudinary.com/${cloud}/image/upload/fl_attachment/${base}/download/${file}`;

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.rival = rival;

    const img = document.createElement("img");
    img.src = imgURL;
    img.loading = "lazy";

    // REMOVE non-existing images
    img.onerror = () => card.remove();

    const a = document.createElement("a");
    a.href = dlURL;
    a.innerText = "Descargar";

    card.appendChild(img);
    card.appendChild(a);
    gallery.appendChild(card);
  }
});

// FILTER
function filterGallery(rival, btn){
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = (card.dataset.rival===rival) ? "block":"none";
  });

  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// DEFAULT
window.onload = ()=>{
  filterGallery("GRO", document.querySelector(".filters button"));
};
</script>

</body>
</html>
