<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería INF-MENOR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 32px;
    }

    .subtitle {
      display: inline-block;
      margin: 15px 0 40px;
      padding: 8px 16px;
      background: #2f5d50;
      color: white;
      border-radius: 20px;
      font-size: 14px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      padding: 0 20px 50px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .btn {
      display: block;
      padding: 12px;
      background: #2f5d50;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #24463c;
    }
  </style>
</head>

<body>

  <h1>GALERÍA INF-MENOR</h1>
  <div class="subtitle">vs GRO</div>

  <div class="gallery" id="gallery"></div>

  <script>
    // 🔧 CONFIGURATION (EDIT ONLY THIS PART)
    const cloudName = "du4pmuch7";

    const basePathGallery = "WP2026/CN2026/infmenor/gallery/";
    const basePathDownload = "WP2026/CN2026/infmenor/download/";

    const baseName = "CN2026_InfMnr_CDMX_GRO_0319_";

    const start = 1;
    const end = 120; // 👈 change this to total images

    // 🔢 FUNCTION TO FORMAT NUMBERS (001, 002, etc)
    function pad(num) {
      return num.toString().padStart(3, "0");
    }

    const gallery = document.getElementById("gallery");

    for (let i = start; i <= end; i++) {
      const file = baseName + pad(i) + ".jpg";

      const imgUrl = `https://res.cloudinary.com/${cloudName}/image/upload/${basePathGallery}${file}`;
      const downloadUrl = `https://res.cloudinary.com/${cloudName}/image/upload/${basePathDownload}${file}`;

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = imgUrl;

      // 🚫 Skip broken images automatically
      img.onerror = () => card.remove();

      const link = document.createElement("a");
      link.href = downloadUrl;
      link.className = "btn";
      link.innerText = "Descargar";

      card.appendChild(img);
      card.appendChild(link);
      gallery.appendChild(card);
    }
  </script>

</body>
</html>
