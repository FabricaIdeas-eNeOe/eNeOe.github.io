<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infantil Menor</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:,">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  overflow-x:hidden;
  background:linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15));
}

/* HEADER */
.header{
  text-align:center;
  padding:80px 20px 40px;
}

.title{
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:18px 60px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);
  border-radius:30px;
}

/* FILTERS */
.filters{
  text-align:center;
  margin:30px 0;
}

.filters button{
  margin:6px;
  padding:10px 20px;
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(12px);
  color:#0a4f73;
  font-weight:600;
  cursor:pointer;
}

.filters button.active{
  background:#0a4f73;
  color:white;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
  padding:30px;
}

/* 🔥 FIX PORTRAIT IMAGES */
.gallery img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:16px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.gallery img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:999;
}

.lightbox.active{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:90%;
  max-height:85%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  color:white;
  font-size:30px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">Galería INF-MENOR</div>
</div>

<div class="filters">
  <button onclick="setRival(this,'GRO')" class="active">GRO</button>
  <button onclick="setRival(this,'NLE')">NLE</button>
  <button onclick="setRival(this,'MIC')">MIC</button>
  <button onclick="setRival(this,'GTO')">GTO</button>
</div>

<div id="gallery" class="gallery"></div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <span class="close">✕</span>
  <img id="lightbox-img">
</div>

<script>

const cloud="du4pmuch7";
const base="WP2026/CN2026/infmenor/gallery";

let currentRival="GRO";
let images=[];

function buildImages(rival){

  let arr=[];

  // 🔥 scan multiple possible dates automatically
  const dates=["0319","0320","0321","0322"];

  dates.forEach(date=>{
    for(let i=1;i<=200;i++){

      let n=String(i).padStart(3,"0");

      let url=`https://res.cloudinary.com/${cloud}/image/upload/${base}/CN2026_InfMnr_CDMX_${rival}_${date}_${n}.jpg`;

      arr.push(url);
    }
  });

  return arr;
}

function loadGallery(){

  const g=document.getElementById("gallery");
  g.innerHTML="";
  images=buildImages(currentRival);

  images.forEach((src,index)=>{

    let img=new Image();
    img.src=src;
    img.loading="lazy";

    img.onerror=()=>img.remove();

    img.onclick=()=>{
      document.getElementById("lightbox-img").src=src;
      document.getElementById("lightbox").classList.add("active");
    };

    g.appendChild(img);
  });
}

function closeLightbox(){
  document.getElementById("lightbox").classList.remove("active");
}

function setRival(btn,rival){

  currentRival=rival;

  document.querySelectorAll(".filters button")
    .forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");

  loadGallery();
}

window.onload=loadGallery;

</script>

</body>
</html>
