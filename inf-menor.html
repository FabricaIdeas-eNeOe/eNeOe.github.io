<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería INF-MENOR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Fix favicon error -->
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 32px;
    }

    .filters {
      margin: 20px 0;
    }

    .filters button {
      margin: 5px;
      padding: 8px 14px;
      border: none;
      border-radius: 20px;
      background: #ccc;
      color: #000;
      cursor: pointer;
      font-weight: bold;
    }

    .filters button.active {
      background: #2f5d50;
      color: white;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      padding: 0 20px 50px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .btn {
      display: block;
      padding: 12px;
      background: #2f5d50;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #24463c;
    }
  </style>
</head>

<body>

  <h1>GALERÍA INF-MENOR</h1>

  <!-- ✅ Filters -->
  <div class="filters" id="filters"></div>

  <!-- ✅ Gallery -->
  <div class="gallery" id="gallery"></div>

  <script>
    const cloudName = "du4pmuch7";

    const basePathGallery = "WP2026/CN2026/infmenor/gallery/";
    const basePathDownload = "WP2026/CN2026/infmenor/download/";

    const basePrefix = "CN2026_InfMnr_CDMX_";
    const datePart = "_0319_";

    const start = 1;
    const end = 200;

    // ✅ ONLY real rivals here
    const rivals = ["GRO", "NLE", "GTO"];

    const gallery = document.getElementById("gallery");
    const filterContainer = document.getElementById("filters");

    function pad(num) {
      return num.toString().padStart(3, "0");
    }

    // 🔥 Create buttons
    function createFilters() {
      rivals.forEach((rival, index) => {
        const btn = document.createElement("button");
        btn.innerText = rival;

        if (index === 0) btn.classList.add("active");

        btn.onclick = () => {
          document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          loadGallery(rival);
        };

        filterContainer.appendChild(btn);
      });
    }

    // 🚀 Optimized loader (lazy + clean)
    function loadGallery(selectedRival) {
      gallery.innerHTML = "";

      for (let i = start; i <= end; i++) {
        const file = `${basePrefix}${selectedRival}${datePart}${pad(i)}.jpg`;

        const imgUrl = `https://res.cloudinary.com/${cloudName}/image/upload/${basePathGallery}${file}`;
        const downloadUrl = `https://res.cloudinary.com/${cloudName}/image/upload/${basePathDownload}${file}`;

        const img = new Image();

        img.loading = "lazy"; // ⚡ performance boost

        img.onload = () => {
          const card = document.createElement("div");
          card.className = "card";

          const imageElement = document.createElement("img");
          imageElement.src = imgUrl;
          imageElement.loading = "lazy";

          const link = document.createElement("a");
          link.href = downloadUrl;
          link.className = "btn";
          link.innerText = "Descargar";

          card.appendChild(imageElement);
          card.appendChild(link);
          gallery.appendChild(card);
        };

        img.src = imgUrl;
      }
    }

    // INIT
    createFilters();
    loadGallery(rivals[0]);
  </script>

</body>
</html>
