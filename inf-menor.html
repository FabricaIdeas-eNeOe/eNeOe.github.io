<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería INF-MENOR</title>

  <!-- ✅ FIXED FAVICON -->
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin: 30px 0 10px;
    }

    .filters {
      margin-bottom: 20px;
    }

    .filters button {
      background: #e0e0e0;
      border: none;
      padding: 8px 14px;
      margin: 4px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .filters button.active {
      background: #2f5d50;
      color: white;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .card a {
      display: block;
      background: #2f5d50;
      color: white;
      text-decoration: none;
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>GALERÍA INF-MENOR</h1>

<div class="filters">
  <button onclick="filterGallery('GRO', this)" class="active">GRO</button>
  <button onclick="filterGallery('NLE', this)">NLE</button>
  <button onclick="filterGallery('MIC', this)">MIC</button>
  <button onclick="filterGallery('GTO', this)">GTO</button>
</div>

<div class="gallery" id="gallery"></div>

<script>
const cloudName = "du4pmuch7";
const basePath = "WP2026/CN2026/infmenor";

const rivals = ["GRO", "NLE", "MIC", "GTO"];
const start = 1;
const end = 200;

const gallery = document.getElementById("gallery");

// BUILD GALLERY
rivals.forEach(rival => {
  for (let i = start; i <= end; i++) {

    const num = String(i).padStart(3, "0");

    const filename = `CN2026_InfMnr_CDMX_${rival}_03${rival==="MIC" ? "21" : "19"}_${num}.jpg`;

    const imgURL = `https://res.cloudinary.com/${cloudName}/image/upload/${basePath}/gallery/${filename}`;
    const downloadURL = `https://res.cloudinary.com/${cloudName}/image/upload/fl_attachment/${basePath}/download/${filename}`;

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.rival = rival;

    const img = document.createElement("img");
    img.src = imgURL;
    img.loading = "lazy";

    // 🔥 KEY: hide broken images automatically
    img.onerror = () => {
      card.remove();
    };

    const link = document.createElement("a");
    link.href = downloadURL;
    link.innerText = "Descargar";

    card.appendChild(img);
    card.appendChild(link);
    gallery.appendChild(card);
  }
});

// FILTER SYSTEM
function filterGallery(rival, btn) {
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    card.style.display = (card.dataset.rival === rival) ? "block" : "none";
  });

  // ACTIVE BUTTON STYLE
  document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

// DEFAULT LOAD → GRO
window.onload = () => {
  filterGallery("GRO", document.querySelector(".filters button"));
};
</script>

</body>
</html>
