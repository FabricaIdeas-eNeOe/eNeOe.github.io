<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <title>Galería INF-MENOR</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin: 30px 0 10px;
      font-size: 36px;
    }

    .filters {
      margin-bottom: 30px;
    }

    .filters button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 20px;
      background: #ccc;
      cursor: pointer;
      font-weight: bold;
    }

    .filters button.active {
      background: #2f5d5a;
      color: white;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .photo {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .photo img {
      width: 100%;
      display: block;
    }

    .download {
      display: block;
      padding: 10px;
      background: #2f5d5a;
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .download:hover {
      background: #244746;
    }
  </style>
</head>

<body>

  <h1>GALERÍA INF-MENOR</h1>
