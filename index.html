<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>AOFM Waterpolo</title>

<!-- Fonts -->

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css"/>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #020617;
  color: white;
  max-width: 1400px;
  margin: auto;
}

/* ===== BACKGROUND ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("background.jpg") center/cover no-repeat;
  filter: blur(70px) brightness(0.6);
  opacity: 0.7;
  z-index: -1;
}

/* ===== HEADER ===== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;

  background: linear-gradient(180deg,
    rgba(0,150,255,0.25),
    rgba(0,40,80,0.6)
  );

  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,200,255,0.3);
}

/* ===== TITLE BLOCK ===== */
.header-content {
  text-align: center;
  padding: 30px 10px 10px;
}

/* Team */
.team {
  font-family: 'Orbitron';
  font-size: 40px;
  letter-spacing: 2px;

  background: linear-gradient(90deg,#7dd3fc,#38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Event */
.event {
  font-size: 16px;
  opacity: 0.8;
  margin-top: 6px;
}

/* Category */
.category {
  font-size: 14px;
  opacity: 0.6;
  margin-top: 4px;
}

/* ===== TABS ===== */
.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  padding: 15px 0 20px;
}

.tab {
  padding: 10px 18px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;

  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);

  transition: all 0.25s ease;
}

.tab:hover {
  background: rgba(0,200,255,0.25);
}

.tab.active {
  background: linear-gradient(90deg,#0ea5e9,#38bdf8);
  color: white;
  box-shadow: 0 0 20px rgba(0,200,255,0.6);
}

/* ===== GALLERY ===== */
.gallery {
  column-count: 4;
  column-gap: 12px;
  padding: 25px;
}

.gallery a {
  display: block;
  margin-bottom: 12px;
  break-inside: avoid;
}

.gallery img {
  width: 100%;
  border-radius: 12px;
  transition: transform 0.3s ease;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* Responsive */
@media (max-width: 1000px) {
  .gallery { column-count: 3; }
}
@media (max-width: 600px) {
  .gallery { column-count: 2; }
}
</style>

</head>

<body>

<div class="topbar">

  <div class="header-content">
    <div class="team">AOFM Waterpolo</div>
    <div class="event">Campeonato Nacional 2026</div>
    <div class="category">Infantil Mayor Varonil • CDMX</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="loadGallery('infmayor2026')">All Games</div>
    <div class="tab" onclick="loadGallery('infmayor2026_ags')">vs Ags</div>
    <div class="tab" onclick="loadGallery('infmayor2026_qroo')">vs QRoo</div>
    <div class="tab" onclick="loadGallery('infmayor2026_coahuila')">vs Coahuila</div>
    <div class="tab" onclick="loadGallery('infmayor2026_edomex')">vs EdoMex</div>
    <div class="tab" onclick="loadGallery('infmayor2026_guerrero')">vs Guerrero</div>
    <div class="tab" onclick="loadGallery('infmayor2026_nuevoleon')">vs Nvo León</div>
  </div>

</div>

<div id="gallery" class="gallery"></div>

<script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/lightgallery.min.js"></script>

<script>
const cloudName = "du4pmuch7";

function loadGallery(tag) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "Loading...";

  fetch(`https://res.cloudinary.com/${cloudName}/image/list/${tag}.json`)
    .then(res => res.json())
    .then(data => {
      gallery.innerHTML = "";

      data.resources.forEach(img => {
        const full = `https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.jpg`;
        const thumb = `https://res.cloudinary.com/${cloudName}/image/upload/w_500/${img.public_id}.jpg`;

        const a = document.createElement("a");
        a.href = full;

        const image = document.createElement("img");
        image.src = thumb;

        a.appendChild(image);
        gallery.appendChild(a);
      });

      lightGallery(gallery);
    });
}

loadGallery("infmayor2026");

/* Active tab */
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
  });
});
</script>

</body>
</html>
