<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AOFM Waterpolo</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

html, body {
  margin:0;
  height:100%;
}

body {
  font-family:'Montserrat',sans-serif;
  display:flex;
  flex-direction:column;
  min-height:100vh;

  background:
    linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.65)),
    url('background.png');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* CONTENT FLEX */
.page-content {
  flex:1;
}

/* HEADER */
.header {
  text-align:center;
  padding:80px 20px 60px;
}

/* iOS GLASS TITLE */
.title {
  display:inline-block;
  font-size:54px;
  font-weight:800;
  color:#0a4f73;

  padding:20px 40px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(12px);
  border-radius:20px;

  border:1px solid rgba(255,255,255,0.4);

  box-shadow:
    0 10px 25px rgba(0,0,0,0.1);

  transition:0.3s;
}

.title:hover {
  transform:scale(1.03);
  box-shadow:
    0 15px 35px rgba(0,150,255,0.2);
}

/* BIGGER SUBTITLE */
.subtitle {
  margin-top:25px;
  font-size:24px;
  font-weight:500;
  color:#0a4f73;
}

/* SECTION */
.section {
  padding:40px 60px;
}

.section h2 {
  font-size:26px;
  margin-bottom:30px;
  color:#0a4f73;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:40px;
}

/* CARD */
.card {
  height:220px;
  border-radius:18px;

  background-size:cover;
  background-position:center;

  position:relative;
  overflow:hidden;

  cursor:pointer;

  transition:0.3s;
}

.card:hover {
  transform:translateY(-6px) scale(1.03);
}

/* OVERLAY */
.card::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.35), transparent);
}

/* TAG */
.tag {
  position:absolute;
  top:10px;
  left:10px;

  background:#003f5c;
  color:white;

  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
}

/* TEXT */
.card-info {
  margin-top:12px;
}

.card-info h3 {
  margin:0;
  font-size:18px;
  color:#0a4f73;
}

.card-info p {
  margin:5px 0 0;
  font-size:14px;
  color:#3c6a80;
}

/* LOGOS FIXED BOTTOM */
.logos-section {
  background:white;
  padding:20px 0;
  text-align:center;
}

.logos img {
  height:50px;
  margin:0 25px;
}

/* FOOTER */
footer {
  text-align:center;
  font-size:12px;
  padding:10px;
  color:#5c7f91;
}

</style>
</head>

<body>

<div class="page-content">

  <div class="header">
    <div class="title">AOFM WATERPOLO</div>
    <div class="subtitle">Official Photo Gallery Platform</div>
  </div>

  <div class="section">
    <h2>Tournaments</h2>

    <div class="grid">

      <!-- MANY TEST CARDS -->

      <div>
        <div class="card" style="background-image:url('portada-campeonato.jpg')">
          <div class="tag">2026</div>
        </div>
        <div class="card-info">
          <h3>Campeonato Nacional</h3>
          <p>CDMX • 4 Categories</p>
        </div>
      </div>

      <!-- repeat -->
      <script>
        const container = document.currentScript.parentElement;
        for(let i=1;i<=9;i++){
          container.innerHTML += `
          <div>
            <div class="card" style="background-image:url('waterpolo.jpg')">
              <div class="tag">Upcoming</div>
            </div>
            <div class="card-info">
              <h3>Event ${i}</h3>
              <p>Next week</p>
            </div>
          </div>`;
        }
      </script>

    </div>

  </div>

</div>

<!-- ALWAYS BOTTOM -->
<div class="logos-section">
  <div class="logos">
    <img src="logo-olimpicos.png">
    <img src="logo-aofm.png">
    <img src="logo-club.png">
  </div>
</div>

<footer>
  © 2026 AOFM Waterpolo
</footer>

</body>
</html>
