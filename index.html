<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOFM Waterpolo</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  color: white;
  background:
    linear-gradient(135deg, rgba(0,40,80,0.95), rgba(0,10,30,0.98)),
    url('background.jpg');
  background-size: cover;
  background-position: center;
}

/* HEADER */
header {
  text-align:center;
  padding:80px 20px 40px;
}

h1 {
  font-family: 'Orbitron', sans-serif;
  font-size:60px;
  letter-spacing:2px;
  background: linear-gradient(90deg, #6ddcff, #3aa6ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  margin-top:10px;
  font-size:18px;
  opacity:0.7;
}

/* SECTION */
.section {
  padding:40px 10%;
}

.section h2 {
  margin-bottom:20px;
  font-size:22px;
  opacity:0.8;
}

/* CARDS */
.cards {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap:30px;
}

.card {
  position:relative;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
  opacity:0.9;
}

.card-content {
  padding:20px;
}

.badge {
  position:absolute;
  top:15px;
  left:15px;
  background:#2bd3ff;
  color:#001;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
  font-weight:bold;
}

.card h3 {
  font-size:20px;
  margin-bottom:5px;
}

.card p {
  font-size:14px;
  opacity:0.7;
}

/* LOGOS */
.logos {
  margin-top:80px;
  display:flex;
  justify-content:center;
  gap:50px;
  flex-wrap:wrap;
  opacity:0.8;
}

.logos img {
  height:70px;
  filter: grayscale(100%) brightness(1.2);
  transition:0.3s;
}

.logos img:hover {
  filter:none;
  transform:scale(1.1);
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  opacity:0.5;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <h1>AOFM Waterpolo</h1>
  <div class="subtitle">Official Photo Gallery Platform</div>
</header>

<section class="section">
  <h2>Tournaments</h2>

  <div class="cards">

    <!-- CAMPEONATO -->
    <a href="campeonato2026.html" class="card">
      <span class="badge">2026</span>
      <img src="https://images.unsplash.com/photo-1605296867304-46d5465a13f1">
      <div class="card-content">
        <h3>Campeonato Nacional</h3>
        <p>CDMX Teams • 4 Categories</p>
      </div>
    </a>

    <!-- FUTURE -->
    <div class="card">
      <span class="badge">Upcoming</span>
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
      <div class="card-content">
        <h3>Olimpiada CONADE</h3>
        <p>Coming soon</p>
      </div>
    </div>

  </div>

  <!-- LOGOS -->
  <div class="logos">
    <img src="logo-aofm.png">
    <img src="logo-club.png">
    <img src="logo-olimpicos.png">
  </div>

</section>

<footer>
  © 2026 AOFM Waterpolo
</footer>

</body>
</html>
