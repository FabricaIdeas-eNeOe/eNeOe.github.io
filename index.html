<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOFM Waterpolo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  color:white;
  background:#020617;
  overflow-x:hidden;
}

/* 🔥 IMPROVED BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("background.png") center/cover no-repeat;
  filter: blur(40px) brightness(0.7);
  opacity:0.6;
  z-index:-2;
}

/* DARK OVERLAY (DEPTH) */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, rgba(0,50,90,0.3), rgba(0,0,0,0.9));
  z-index:-1;
}

/* HEADER */
header{
  text-align:center;
  padding:120px 20px 80px;
}

/* 🔥 TITLE UPGRADE */
h1{
  font-family:'Orbitron',sans-serif;
  font-size:95px;
  letter-spacing:5px;

  background:linear-gradient(90deg,#8be9ff,#3aa6ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 10px rgba(0,200,255,0.9),
    0 0 40px rgba(0,120,255,0.6),
    0 0 80px rgba(0,120,255,0.4);
}

/* SUBTITLE */
.subtitle{
  margin-top:15px;
  font-size:20px;
  opacity:0.75;
}

/* SECTION */
.section{
  padding:40px 10%;
}

/* CARDS ROW */
.row{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
}

/* 🔥 CARD PREMIUM STYLE */
.card{
  flex:1;
  min-width:320px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  cursor:pointer;

  background:rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);

  border:1px solid rgba(0,180,255,0.2);

  transition:0.4s;
}

/* HOVER */
.card:hover{
  transform:translateY(-8px) scale(1.02);

  box-shadow:
    0 30px 80px rgba(0,0,0,0.8),
    0 0 30px rgba(0,150,255,0.5);
}

/* IMAGE */
.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

/* OVERLAY */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* CONTENT */
.card-content{
  position:absolute;
  bottom:0;
  padding:20px;
  z-index:2;
}

/* BADGE */
.badge{
  position:absolute;
  top:15px;
  left:15px;
  background:#0ea5e9;
  color:#001;
  padding:6px 14px;
  border-radius:12px;
  font-size:12px;
  font-weight:bold;
  z-index:2;
}

/* WHITE LOGO BAND */
.logo-band{
  margin-top:120px;
  padding:80px 20px;
  background:white;
}

.logos{
  display:flex;
  justify-content:center;
  gap:100px;
  flex-wrap:wrap;
}

.logos img{
  height:140px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>

<header>
  <h1>AOFM WATERPOLO</h1>
  <div class="subtitle">Official Photo Gallery Platform</div>
</header>

<section class="section">
  <h2>Tournaments</h2>

  <div class="row">

    <!-- CAMPEONATO -->
    <a href="campeonato2026.html" class="card">
      <span class="badge">2026</span>
      <img src="Portada-campeonato.jpg">
      <div class="card-content">
        <h3>Campeonato Nacional</h3>
        <p>CDMX • 4 Categories</p>
      </div>
    </a>

    <!-- OLIMPIADA (FIXED) -->
    <div class="card">
      <span class="badge">Upcoming</span>
      <img src="Portada-campeonato.jpg">
      <div class="card-content">
        <h3>Olimpiada CONADE 2026</h3>
        <p>Coming soon</p>
      </div>
    </div>

  </div>
</section>

<!-- LOGOS -->
<div class="logo-band">
  <div class="logos">
    <img src="logo-aofm.png">
    <img src="logo-club.png">
    <img src="logo-olimpicos.png">
  </div>
</div>

<footer>
  © 2026 AOFM Waterpolo
</footer>

</body>
</html>
