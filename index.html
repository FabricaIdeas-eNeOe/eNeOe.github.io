<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AOFM Waterpolo</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

html, body {
  height: 100%;
  margin: 0;
}

body {
  font-family: 'Montserrat', sans-serif;
  color: #0b2a3c;

  display: flex;
  flex-direction: column;

  background:
    linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.65)),
    url('background.png');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* CONTENT */
.page-content {
  flex: 1;
}

/* HEADER */
.header {
  text-align: center;
  padding: 80px 20px 50px;
}

/* TITLE with breathing glow */
.title {
  font-size: 64px;
  font-weight: 800;
  letter-spacing: 3px;
  color: #0a4f73;

  animation: breathingGlow 4s ease-in-out infinite;
}

@keyframes breathingGlow {
  0%, 100% {
    text-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }
  50% {
    text-shadow:
      0 6px 20px rgba(0,150,255,0.4),
      0 0 25px rgba(0,200,255,0.25);
  }
}

/* BIGGER animated subtitle band */
.subtitle {
  display: inline-block;
  margin-top: 25px;
  padding: 16px 50px;

  font-size: 22px;
  font-weight: 500;

  color: #0a4f73;

  background: linear-gradient(
    90deg,
    rgba(255,255,255,0.4),
    rgba(0,200,255,0.25),
    rgba(255,255,255,0.4)
  );

  backdrop-filter: blur(10px);
  border-radius: 40px;

  animation: slideBand 1.2s ease;
}

@keyframes slideBand {
  from { opacity: 0; transform: translateX(-60px); }
  to { opacity: 1; transform: translateX(0); }
}

/* SECTION */
.section {
  padding: 40px 60px;
}

.section h2 {
  font-size: 26px;
  margin-bottom: 30px;
  color: #0a4f73;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 45px;
}

/* CARD (taller now) */
.card {
  height: 210px;
  border-radius: 18px;

  background-size: cover;
  background-position: center;

  position: relative;
  overflow: hidden;

  box-shadow:
    0 12px 30px rgba(0,0,0,0.15);

  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow:
    0 20px 45px rgba(0,0,0,0.25);
}

/* LIGHT OVERLAY */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
}

/* TAG (marine blue now) */
.tag {
  position: absolute;
  top: 12px;
  left: 12px;

  background: #003f5c;
  color: white;

  padding: 6px 12px;
  font-size: 12px;
  border-radius: 20px;
  font-weight: 600;
}

/* TEXT OUTSIDE */
.card-info {
  margin-top: 12px;
}

.card-info h3 {
  margin: 0;
  font-size: 19px;
  font-weight: 600;
  color: #0a4f73;
}

.card-info p {
  margin: 5px 0 0;
  font-size: 14px;
  color: #3c6a80;
}

/* LOGOS */
.logos-section {
  background: white;
  padding: 20px 0;
  text-align: center;
}

.logos img {
  height: 50px;
  margin: 0 25px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 10px;
  font-size: 12px;
  color: #5c7f91;
}

</style>
</head>

<body>

<div class="page-content">

  <div class="header">
    <div class="title">AOFM WATERPOLO</div>
    <div class="subtitle">Official Photo Gallery Platform</div>
  </div>

  <div class="section">
    <h2>Tournaments</h2>

    <div class="grid">

      <div>
        <div class="card" style="background-image:url('portada-campeonato.jpg')">
          <div class="tag">2026</div>
        </div>
        <div class="card-info">
          <h3>Campeonato Nacional</h3>
          <p>CDMX • 4 Categories</p>
        </div>
      </div>

      <div>
        <div class="card" style="background-image:url('waterpolo.jpg')">
          <div class="tag">Upcoming</div>
        </div>
        <div class="card-info">
          <h3>Olimpiada CONADE 2026</h3>
          <p>Coming soon</p>
        </div>
      </div>

      <div>
        <div class="card" style="background-image:url('waterpolo.jpg')">
          <div class="tag">Upcoming</div>
        </div>
        <div class="card-info">
          <h3>Juvenil Varonil</h3>
          <p>Next week</p>
        </div>
      </div>

      <div>
        <div class="card" style="background-image:url('waterpolo.jpg')">
          <div class="tag">Upcoming</div>
        </div>
        <div class="card-info">
          <h3>Junior Varonil</h3>
          <p>Next week</p>
        </div>
      </div>

    </div>
  </div>

</div>

<div class="logos-section">
  <div class="logos">
    <img src="logo-olimpicos.png">
    <img src="logo-aofm.png">
    <img src="logo-club.png">
  </div>
</div>

<footer>
  © 2026 AOFM Waterpolo
</footer>

</body>
</html>
