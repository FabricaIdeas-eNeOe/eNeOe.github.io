<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOFM Waterpolo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  color:white;
  background: linear-gradient(180deg, #02142b, #032c4d);
}

/* HEADER */
.header {
  text-align:center;
  padding:80px 20px;
}

.title {
  font-family:'Orbitron', sans-serif;
  font-size:56px;
  color:#6fe3ff;
}

.subtitle {
  opacity:0.7;
  margin-top:10px;
}

/* SECTION */
.section {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* CARDS */
.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
  gap:20px;
}

.card {
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content {
  padding:15px;
  background:#062a47;
}

.logos {
  margin-top:50px;
  text-align:center;
}

.logos img {
  height:70px;
  margin:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">AOFM WATERPOLO</div>
  <div class="subtitle">Official Photo Gallery Platform</div>
</div>

<div class="section">

  <div class="cards">

    <div class="card" onclick="location.href='campeonato2026.html'">
      <img src="https://res.cloudinary.com/du4pmuch7/image/upload/w_800/infmayor2026/Campeonato_-_InfMayor_QRoo-8219_yqxgg8.jpg">
      <div class="card-content">
        <b>Campeonato Nacional</b><br>
        CDMX • 4 Categories
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
      <div class="card-content">
        <b>Olimpiada CONADE 2026</b><br>
        Coming soon
      </div>
    </div>

  </div>

  <div class="logos">
    <img src="logo-aofm.png">
    <img src="logo-olimpicos.png">
    <img src="logo-club.png">
  </div>

</div>

</body>
</html>
