<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOFM Waterpolo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  color: white;
  background:
    radial-gradient(circle at top, rgba(0,180,255,0.15), transparent 60%),
    linear-gradient(180deg, #001018, #001a2a 60%, #002a44);
}

/* HEADER */
header {
  text-align:center;
  padding:100px 20px 60px;
}

/* TITLE */
h1 {
  font-family: 'Orbitron', sans-serif;
  font-size:70px;
  letter-spacing:3px;
  background: linear-gradient(90deg, #8be9ff, #3aa6ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 0 20px rgba(58,166,255,0.4),
    0 0 40px rgba(0,200,255,0.2);
}

/* SUBTITLE */
.subtitle {
  margin-top:15px;
  font-size:20px;
  opacity:0.75;
  letter-spacing:1px;
}

/* SECTION */
.section {
  padding:40px 10%;
}

.section h2 {
  font-size:22px;
  margin-bottom:25px;
  opacity:0.8;
}

/* CARDS */
.cards {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap:30px;
}

/* CARD */
.card {
  position:relative;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.1);
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 20px 40px rgba(0,150,255,0.2);
}

/* IMAGE */
.card img {
  width:100%;
  height:220px;
  object-fit:cover;
  filter: brightness(0.85);
}

/* OVERLAY LIGHT */
.card::after {
  content:"";
  position:absolute;
  inset:0;
  background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
}

/* CONTENT */
.card-content {
  position:absolute;
  bottom:0;
  padding:20px;
  z-index:2;
}

/* BADGE */
.badge {
  position:absolute;
  top:15px;
  left:15px;
  background: linear-gradient(135deg, #00d4ff, #3aa6ff);
  color:#001;
  padding:6px 12px;
  border-radius:12px;
  font-size:12px;
  font-weight:bold;
  z-index:2;
}

/* TEXT */
.card h3 {
  font-size:22px;
}

.card p {
  font-size:14px;
  opacity:0.8;
}

/* LOGO BAND */
.logo-band {
  margin-top:100px;
  padding:60px 20px;

  background:
    linear-gradient(180deg, transparent, rgba(255,255,255,0.08)),
    linear-gradient(90deg, #e6f7ff, #bfefff);

  border-top:1px solid rgba(255,255,255,0.2);
}

/* LOGOS */
.logos {
  display:flex;
  justify-content:center;
  gap:60px;
  flex-wrap:wrap;
}

.logos img {
  height:80px;
  filter: grayscale(100%) brightness(0.7);
  transition:0.3s;
}

.logos img:hover {
  filter:none;
  transform:scale(1.1);
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>

<header>
  <h1>AOFM WATERPOLO</h1>
  <div class="subtitle">Official Photo Gallery Platform</div>
</header>

<section class="section">

  <h2>Tournaments</h2>

  <div class="cards">

    <!-- CAMPEONATO -->
    <a href="campeonato2026.html" class="card">
      <span class="badge">2026</span>
      <img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e">
      <div class="card-content">
        <h3>Campeonato Nacional</h3>
        <p>CDMX • 4 Categories</p>
      </div>
    </a>

    <!-- FUTURE -->
    <div class="card">
      <span class="badge">Upcoming</span>
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
      <div class="card-content">
        <h3>Olimpiada CONADE 2026</h3>
        <p>Coming soon</p>
      </div>
    </div>

  </div>

</section>

<!-- LOGO BAND -->
<div class="logo-band">
  <div class="logos">
    <img src="logo-club.png">
    <img src="logo-olimpicos.png">
    <img src="logo-aofm.png">
  </div>
</div>

<footer>
  © 2026 AOFM Waterpolo
</footer>

</body>
</html>
