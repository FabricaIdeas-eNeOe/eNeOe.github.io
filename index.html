<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AOFM Waterpolo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('background.png') no-repeat center center fixed;
  background-size: cover;
  color: #1b3b5f;
}

/* Overlay */
.overlay {
  background: rgba(255,255,255,0.65);
  min-height: 100vh;
  padding: 40px 20px;
}

/* Header */
.header-box {
  display: inline-block;
  background: rgba(255,255,255,0.8);
  padding: 20px 40px;
  border-radius: 20px;
  margin-bottom: 20px;
}

h1 {
  margin: 0;
  font-size: 42px;
}

.subtitle {
  margin-top: 10px;
  font-size: 18px;
}

/* Section */
.section {
  margin-top: 60px;
}

.section h2 {
  text-align: left;
  max-width: 1100px;
  margin: 0 auto 20px;
}

/* Cards grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  max-width: 1100px;
  margin: auto;
}

/* Card */
.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.badge {
  position: absolute;
  background: #1b3b5f;
  color: white;
  padding: 5px 10px;
  border-radius: 10px;
  margin: 10px;
  font-size: 12px;
}

/* Footer */
.footer {
  margin-top: 60px;
  text-align: center;
}

.footer img {
  height: 50px;
  margin: 0 15px;
}
</style>

</head>
<body>

<div class="overlay">

<!-- HEADER -->
<div class="header-box">
  <h1>AOFM WATERPOLO</h1>
</div>
<div class="subtitle">Official Photo Gallery Platform</div>

<!-- SECTION -->
<div class="section">
  <h2>Tournaments</h2>

  <div class="grid">

    <!-- MAIN EVENT -->
    <a href="campeonato2026.html">
      <div class="card">
        <div class="badge">2026</div>
        <img src="portada-campeonato.jpg">
        <div class="card-content">
          <h3>Campeonato Nacional</h3>
          <p>CDMX · 4 Categories</p>
        </div>
      </div>
    </a>

    <!-- FUTURE EVENTS -->
    <div class="card">
      <div class="badge">Upcoming</div>
      <img src="waterpolo.jpg">
      <div class="card-content">
        <h3>Event 1</h3>
        <p>Next week</p>
      </div>
    </div>

    <div class="card">
      <div class="badge">Upcoming</div>
      <img src="waterpolo.jpg">
      <div class="card-content">
        <h3>Event 2</h3>
        <p>Next week</p>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <img src="logo-aofm.png">
  <img src="logo-club.png">
  <img src="logo-olimpicos.png">
</div>

</div>

</body>
</html>
