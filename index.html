body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('background.png') no-repeat center center fixed;
  background-size: cover;
  color: #1f3b57;
}

/* OVERLAY */
.overlay {
  background: rgba(255,255,255,0.55);
  min-height: 100vh;
  padding: 40px 20px;
}

/* HEADER */
.header {
  text-align: center;
  margin-top: 40px;
}

.header-box {
  display: inline-block;
  background: rgba(255,255,255,0.9);
  padding: 25px 60px;
  border-radius: 25px;
}

.header h1 {
  margin: 0;
  font-size: 48px;
  letter-spacing: 2px;
}

.subtitle {
  margin-top: 15px;
  font-size: 20px;
}

/* SECTION */
.section {
  margin-top: 80px;
}

.section h2 {
  margin-left: 10%;
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
  max-width: 1200px;
  margin: auto;
}

/* CARD */
.card {
  background: white;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.card-content h3 {
  margin: 0;
}

.card-content p {
  margin: 5px 0 0;
  color: gray;
}

/* BADGE */
.badge {
  position: absolute;
  background: #1f3b57;
  color: white;
  padding: 5px 10px;
  border-radius: 12px;
  margin: 10px;
  font-size: 12px;
}

/* FOOTER */
.footer {
  margin-top: 80px;
  text-align: center;
}

.footer img {
  height: 40px;
  margin: 10px;
}

</style>

</head>
