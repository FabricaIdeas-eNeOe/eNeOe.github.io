<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOFM Waterpolo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  color: white;
  background: #020617;
  overflow-x: hidden;
}

/* BACKGROUND */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background: url("background.png") center/cover no-repeat;
  filter: blur(70px) brightness(0.7);
  opacity:0.6;
  z-index:-1;
}

/* HERO */
header {
  text-align:center;
  padding:120px 20px 80px;
}

/* TITLE */
h1 {
  font-family: 'Orbitron', sans-serif;
  font-size:80px;
  letter-spacing:4px;

  background: linear-gradient(90deg, #8be9ff, #3aa6ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 0 25px rgba(0,200,255,0.6),
    0 0 60px rgba(0,120,255,0.3);
}

/* SUBTITLE */
.subtitle {
  margin-top:20px;
  font-size:20px;
  opacity:0.75;
  letter-spacing:1px;
}

/* SECTION */
.section {
  padding:40px 10%;
}

.section h2 {
  font-size:24px;
  margin-bottom:30px;
  opacity:0.85;
}

/* GRID */
.cards {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(340px,1fr));
  gap:40px;
}

/* CARD */
.card {
  position:relative;
  border-radius:22px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;

  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 25px 60px rgba(0,150,255,0.25);
}

/* IMAGE */
.card img {
  width:100%;
  height:260px;
  object-fit:cover;
}

/* OVERLAY */
.card::after {
  content:"";
  position:absolute;
  inset:0;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
}

/* CONTENT */
.card-content {
  position:absolute;
  bottom:0;
  padding:25px;
  z-index:2;
}

/* BADGE */
.badge {
  position:absolute;
  top:20px;
  left:20px;
  background: linear-gradient(135deg, #00d4ff, #3aa6ff);
  color:#001;
  padding:6px 14px;
  border-radius:14px;
  font-size:12px;
  font-weight:bold;
  z-index:2;
}

/* TEXT */
.card h3 {
  font-size:26px;
  margin-bottom:5px;
}

.card p {
  font-size:15px;
  opacity:0.8;
}

/* LOGO BAND */
.logo-band {
  margin-top:120px;
  padding:70px 20px;
  background: white;
}

/* LOGOS */
.logos {
  display:flex;
  justify-content:center;
  gap:80px;
  flex-wrap:wrap;
}

.logos img {
  height:110px;
  transition:0.3s;
}

.logos img:hover {
  transform:scale(1.1);
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>

<header>
  <h1>AOFM WATERPOLO</h1>
  <div class="subtitle">Official Photo Gallery Platform</div>
</header>

<section class="section">

  <h2>Tournaments</h2>

  <div class="cards">

    <!-- CAMPEONATO -->
    <a href="campeonato2026.html" class="card">
      <span class="badge">2026</span>
      <img src="Portada-campeonato.jpg">
      <div class="card-content">
        <h3>Campeonato Nacional</h3>
        <p>CDMX • 4 Categories</p>
      </div>
    </a>

    <!-- OLIMPIADA -->
    <div class="card">
      <span class="badge">Upcoming</span>
      <img src="waterpolo.jpg">
      <div class="card-content">
        <h3>Olimpiada CONADE 2026</h3>
        <p>Coming soon</p>
      </div>
    </div>

  </div>

</section>

<!-- LOGOS -->
<div class="logo-band">
  <div class="logos">
    <img src="logo-club.png">
    <img src="logo-olimpicos.png">
    <img src="logo-aofm.png">
  </div>
</div>

<footer>
  © 2026 AOFM Waterpolo
</footer>

</body>
</html>
