<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AOFM Waterpolo</title>

<style>

/* COLORS */
:root {
  --primary:#0a4f73;
  --secondary:#1f7ea1;
  --accent:#00a8cc;
  --light:#e6f4f9;
  --dark:#003f5c;
}

/* BASE */
html, body {
  margin:0;
  height:100%;
}

body {
  font-family:'Montserrat',sans-serif;
  display:flex;
  flex-direction:column;
  min-height:100vh;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');

  background-size:cover;
  background-position:center top;
  background-attachment:fixed;
}

/* LAYOUT */
.page-content {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* HEADER */
.header {
  text-align:center;
  padding:60px 20px 40px;
}

/* GLASS TITLE */
.title {
  position:relative;
  display:inline-block;

  font-size:52px;
  font-weight:800;
  color:var(--primary);

  padding:20px 60px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);

  border-radius:30px;
  border:1px solid rgba(255,255,255,0.6);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.6);

  overflow:hidden;
}

/* WATER RIPPLE EFFECT */
.title::before {
  content:"";
  position:absolute;
  inset:-50%;
  background:
    radial-gradient(circle at center, rgba(0,168,204,0.25), transparent 60%);
  animation:waterMove 6s linear infinite;
}

@keyframes waterMove {
  0% { transform:translateX(-10%) translateY(-10%) scale(1); }
  50% { transform:translateX(10%) translateY(10%) scale(1.2); }
  100% { transform:translateX(-10%) translateY(-10%) scale(1); }
}

/* SUBTITLE */
.subtitle {
  margin-top:25px;
  font-size:26px;
  font-weight:700;
  color:var(--primary);
}

/* SECTION */
.section {
  width:100%;
  max-width:1100px;
  padding:40px 20px;
}

.section h2 {
  font-size:26px;
  color:var(--primary);
  margin-bottom:25px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:40px;
}

/* CARD WRAPPER */
.card-wrapper {
  cursor:pointer;
}

/* CARD */
.card {
  height:220px;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card:hover {
  transform:translateY(-8px) scale(1.04);
}

/* OVERLAY */
.card::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.35), transparent);
}

/* TAG */
.tag {
  position:absolute;
  top:10px;
  left:10px;
  background:var(--dark);
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  z-index:2;
}

/* TEXT */
.card-info h3 {
  margin:10px 0 0;
  color:var(--primary);
}

.card-info p {
  margin:4px 0 0;
  color:#3c6a80;
}

/* LOGOS */
.logos-section {
  background:white;
  padding:20px 0;
  text-align:center;
  margin-top:60px;
}

.logos img {
  height:50px;
  margin:0 25px;
}

/* FOOTER */
footer {
  text-align:center;
  font-size:12px;
  padding:10px;
  color:#5c7f91;
}

</style>

</head>

<body>

<div class="page-content">

  <div class="header">
    <div class="title">AOFM WATERPOLO</div>
    <div class="subtitle">Official Photo Gallery Platform</div>
  </div>

  <div class="section">
