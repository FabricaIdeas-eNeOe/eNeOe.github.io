<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AOFM Waterpolo</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

html, body {
  height: 100%;
  margin: 0;
}

body {
  font-family: 'Montserrat', sans-serif;
  color: #0b2a3c;
  display: flex;
  flex-direction: column;

  background:
    linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.65)),
    url('background.png');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* HEADER */
.header {
  text-align: center;
  padding: 80px 20px 50px;
}

.title {
  font-size: 64px;
  font-weight: 800;
  color: #0a4f73;
  animation: breathingGlow 4s ease-in-out infinite;
}

@keyframes breathingGlow {
  0%,100% { text-shadow: 0 4px 10px rgba(0,0,0,0.15); }
  50% { text-shadow: 0 0 30px rgba(0,200,255,0.4); }
}

.subtitle {
  display: inline-block;
  margin-top: 25px;
  padding: 16px 50px;
  font-size: 22px;

  background: linear-gradient(90deg, transparent, rgba(0,200,255,0.3), transparent);
  border-radius: 40px;

  animation: slideBand 1.2s ease;
}

@keyframes slideBand {
  from { opacity:0; transform:translateX(-60px); }
  to { opacity:1; transform:translateX(0); }
}

/* GRID */
.section {
  padding: 40px 60px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 45px;
}

/* CARD */
.card {
  height: 210px;
  border-radius: 18px;
  background-size: cover;
  background-position: center;

  position: relative;
  overflow: hidden;
  cursor: pointer;

  transition: all 0.4s ease;
}

.card:hover {
  transform: scale(1.05);
}

/* ZOOM + PAN */
.card:hover {
  background-size: 115%;
}

/* RIPPLE EFFECT */
.card::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;

  background: radial-gradient(circle, rgba(255,255,255,0.2) 10%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s ease;
}

.card:hover::before {
  opacity: 1;
}

/* DARK OVERLAY */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
}

/* TAG */
.tag {
  position: absolute;
  top: 12px;
  left: 12px;

  background: #003f5c;
  color: white;

  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
}

/* TEXT OUTSIDE */
.card-info {
  margin-top: 12px;
}

.card-info h3 {
  margin: 0;
  font-size: 18px;
}

.card-info p {
  margin: 5px 0 0;
  font-size: 14px;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);

  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;

  transition: 0.4s;
}

.modal.active {
  opacity: 1;
  pointer-events: all;
}

.modal img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 10px;
  animation: zoomIn 0.4s ease;
}

@keyframes zoomIn {
  from { transform: scale(0.8); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

/* LOGOS */
.logos-section {
  background: white;
  padding: 20px 0;
  text-align: center;
}

.logos img {
  height: 50px;
  margin: 0 25px;
}

footer {
  text-align: center;
  padding: 10px;
  font-size: 12px;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">AOFM WATERPOLO</div>
  <div class="subtitle">Official Photo Gallery Platform</div>
</div>

<div class="section">
  <h2>Tournaments</h2>

  <div class="grid">

    <div onclick="openModal('portada-campeonato.jpg')">
      <div class="card" style="background-image:url('portada-campeonato.jpg')">
        <div class="tag">2026</div>
      </div>
      <div class="card-info">
        <h3>Campeonato Nacional</h3>
        <p>CDMX • 4 Categories</p>
      </div>
    </div>

    <div onclick="openModal('waterpolo.jpg')">
      <div class="card" style="background-image:url('waterpolo.jpg')">
        <div class="tag">Upcoming</div>
      </div>
      <div class="card-info">
        <h3>Olimpiada CONADE</h3>
        <p>Coming soon</p>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<div class="logos-section">
  <div class="logos">
    <img src="logo-olimpicos.png">
    <img src="logo-aofm.png">
    <img src="logo-club.png">
  </div>
</div>

<footer>© 2026 AOFM Waterpolo</footer>

<script>

function openModal(src) {
  const modal = document.getElementById("modal");
  const img = document.getElementById("modalImg");

  img.src = src;
  modal.classList.add("active");
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
}

document.addEventListener("keydown", function(e){
  if(e.key === "Escape") closeModal();
});

</script>

</body>
</html>
