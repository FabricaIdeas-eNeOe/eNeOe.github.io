<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOFM Waterpolo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  color:white;
  background:#020617;
  overflow-x:hidden;
}

/* ✅ BACKGROUND FIX */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("background.png") center/cover no-repeat;
  filter: blur(20px) brightness(0.85);
  opacity:0.8;
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, rgba(0,70,120,0.2), rgba(0,0,0,0.85));
  z-index:-1;
}

/* HEADER */
header{
  text-align:center;
  padding:120px 20px 80px;
}

/* TITLE */
h1{
  font-family:'Orbitron',sans-serif;
  font-size:95px;
  letter-spacing:5px;

  background:linear-gradient(90deg,#8be9ff,#3aa6ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 15px rgba(0,200,255,0.9),
    0 0 60px rgba(0,120,255,0.5);
}

/* SUBTITLE */
.subtitle{
  margin-top:15px;
  font-size:20px;
  opacity:0.75;
}

/* SECTION */
.section{
  padding:40px 10%;
}

/* SCROLL */
.scroll-row{
  display:flex;
  gap:25px;
  overflow-x:auto;
  padding-bottom:10px;
}

.scroll-row::-webkit-scrollbar{
  height:6px;
}

.scroll-row::-webkit-scrollbar-thumb{
  background:#0ea5e9;
  border-radius:10px;
}

/* CARD */
.card{
  min-width:320px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  cursor:pointer;

  background:rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
  border:1px solid rgba(0,180,255,0.2);

  transition:0.4s;
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:
    0 25px 70px rgba(0,0,0,0.8),
    0 0 25px rgba(0,150,255,0.5);
}

/* IMAGE */
.card img{
  width:100%;
  height:240px;
  object-fit:cover;
}

/* OVERLAY */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

/* CONTENT */
.card-content{
  position:absolute;
  bottom:0;
  padding:20px;
  z-index:2;
}

/* ✅ TEXT FIX (NO MORE PURPLE) */
.card-content h3{
  color:white;
  font-weight:600;
  text-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* BADGE */
.badge{
  position:absolute;
  top:15px;
  left:15px;
  background:#0ea5e9;
  color:#001;
  padding:6px 14px;
  border-radius:12px;
  font-size:12px;
  font-weight:bold;
  z-index:2;
}

/* ✅ SMALLER WHITE BAND */
.logo-band{
  margin-top:80px;
  padding:40px 20px;
  background:white;
}

/* ✅ SMALLER LOGOS */
.logos{
  display:flex;
  justify-content:center;
  gap:60px;
  flex-wrap:wrap;
}

.logos img{
  height:100px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>

<header>
  <h1>AOFM WATERPOLO</h1>
  <div class="subtitle">Official Photo Gallery Platform</div>
</header>

<section class="section">

  <h2>Tournaments</h2>

  <div class="scroll-row">

    <a href="campeonato2026.html" class="card">
      <span class="badge">2026</span>
      <img src="waterpolo.jpg">
      <div class="card-content">
        <h3>Campeonato Nacional</h3>
        <p>CDMX • 4 Categories</p>
      </div>
    </a>

    <div class="card">
      <span class="badge">Upcoming</span>
      <img src="waterpolo.jpg">
      <div class="card-content">
        <h3>Olimpiada CONADE 2026</h3>
        <p>Coming soon</p>
      </div>
    </div>

    <div class="card">
      <span class="badge">Upcoming</span>
      <img src="waterpolo.jpg">
      <div class="card-content">
        <h3>Juvenil Varonil</h3>
        <p>Next week</p>
      </div>
    </div>

    <div class="card">
      <span class="badge">Upcoming</span>
      <img src="waterpolo.jpg">
      <div class="card-content">
        <h3>Junior Varonil</h3>
        <p>Next week</p>
      </div>
    </div>

  </div>

</section>

<div class="logo-band">
  <div class="logos">
    <img src="logo-aofm.png">
    <img src="logo-club.png">
    <img src="logo-olimpicos.png">
  </div>
</div>

<footer>
  © 2026 AOFM Waterpolo
</footer>

</body>
</html>
