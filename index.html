<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waterpolo Gallery</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css"/>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #111;
  color: white;
}

h1 {
  text-align: center;
  padding: 20px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  padding: 10px;
}

.gallery img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

.gallery img:hover {
  opacity: 0.8;
}
</style>

</head>

<body>

<h1>Inf Mayor CDMX 2026</h1>

<div id="gallery" class="gallery"></div>

<script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/lightgallery.min.js"></script>

<script>
const cloudName = "du4pmuch7";
const tag = "infmayor2026"; // ⚠️ MUST match your Cloudinary tag

fetch(`https://res.cloudinary.com/${cloudName}/image/list/${tag}.json`)
  .then(response => response.json())
  .then(data => {
    const gallery = document.getElementById("gallery");

    if (!data.resources || data.resources.length === 0) {
      gallery.innerHTML = "<p style='text-align:center;'>No images found. Check your tag.</p>";
      return;
    }

    data.resources.forEach(img => {
      const full = `https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.jpg`;
      const thumb = `https://res.cloudinary.com/${cloudName}/image/upload/w_400/${img.public_id}.jpg`;

      const a = document.createElement("a");
      a.href = full;

      const image = document.createElement("img");
      image.src = thumb;

      a.appendChild(image);
      gallery.appendChild(a);
    });

    lightGallery(gallery);
  })
  .catch(error => {
    document.getElementById("gallery").innerHTML =
      "<p style='text-align:center;'>Error loading images. Check Cloudinary setup.</p>";
    console.error(error);
  });
</script>

</body>
</html>
