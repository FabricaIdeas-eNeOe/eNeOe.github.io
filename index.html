<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>AOFM Waterpolo Media</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #020617;
  color: white;
}

/* ===== BACKGROUND ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("background.jpg") center/cover no-repeat;
  filter: blur(80px) brightness(0.5);
  opacity: 0.8;
  z-index: -1;
}

/* ===== HEADER ===== */
header {
  text-align: center;
  padding: 50px 20px 20px;
}

h1 {
  font-family: 'Orbitron';
  font-size: 42px;
  margin: 0;

  background: linear-gradient(90deg,#7dd3fc,#38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  margin-top: 10px;
  opacity: 0.7;
}

/* ===== GRID ===== */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 30px;
}

/* Section title */
.section-title {
  font-size: 18px;
  margin-bottom: 15px;
  opacity: 0.8;
}

/* Cards */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
  gap: 20px;
}

/* Card */
.card {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.card:hover {
  transform: scale(1.04);
}

/* Image */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* Overlay */
.card-content {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent, rgba(0,0,0,0.7));
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 15px;
}

/* Title */
.card-title {
  font-size: 18px;
  font-weight: 600;
}

/* Subtitle */
.card-sub {
  font-size: 13px;
  opacity: 0.7;
}

/* Badge */
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,200,255,0.9);
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
</style>

</head>

<body>

<header>
  <h1>AOFM Waterpolo</h1>
  <div class="subtitle">Official Photo Gallery Platform</div>
</header>

<div class="container">

  <div class="section-title">Tournaments</div>

  <div class="grid">
