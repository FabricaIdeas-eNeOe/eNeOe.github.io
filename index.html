<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AOFM Waterpolo</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* COLORS */
:root {
  --primary:#0a4f73;
  --secondary:#1f7ea1;
  --accent:#00a8cc;
  --light:#e6f4f9;
  --dark:#003f5c;
}

/* BASE */
body {
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* HEADER */
.header {
  text-align:center;
  padding:60px 20px 40px;
}

/* GLASS RIPPLE TITLE */
.title {
  position:relative;
  display:inline-block;
  font-size:52px;
  font-weight:800;
  color:#0a4f73;

  padding:20px 60px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);

  border-radius:30px;
  border:1px solid rgba(255,255,255,0.6);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.15),
    inset 0 2px 6px rgba(255,255,255,0.4);

  overflow:hidden;
}

/* WATER RIPPLE EFFECT */
.title::before {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;

  background:
    radial-gradient(circle, rgba(0,168,204,0.25) 10%, transparent 60%),
    radial-gradient(circle, rgba(255,255,255,0.3) 10%, transparent 60%);

  animation:rippleMove 8s infinite linear;
}

@keyframes rippleMove {
  0% { transform:translate(0,0) scale(1); }
  50% { transform:translate(5%,5%) scale(1.1); }
  100% { transform:translate(0,0) scale(1); }
}

/* SUBTITLE */
.subtitle {
  margin-top:20px;
  font-size:24px;
  font-weight:600;
  color:#1f7ea1;
}

/* SECTION */
.section {
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

.section h2 {
  color:#0a4f73;
  margin-bottom:30px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:40px;
  justify-items:center;
}

/* CARD */
.card-wrapper {
  width:100%;
  max-width:360px;
  cursor:pointer;
}

.card {
  height:250px;
  border-radius:20px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

.card:hover {
  transform:translateY(-8px) scale(1.05);
}

.card::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.5), transparent);
}

/* TAG */
.tag {
  position:absolute;
  top:12px;
  left:12px;
  background:#003f5c;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  z-index:2;
}

/* PLAYER ICON */
.player-icon {
  position:absolute;
  bottom:15px;
  right:15px;
  width:40px;
  height:40px;
  z-index:3;
}

.player-icon svg {
  width:100%;
  height:100%;
  fill:#00a8cc;
  stroke:#00a8cc;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));
}

/* TEXT */
.card-info {
  text-align:left;
  margin-top:10px;
}

.card-info h3 {
  margin:5px 0;
  color:#0a4f73;
}

.card-info p {
  margin:0;
  color:#3c6a80;
  font-size:14px;
  line-height:1.4;
}

/* LOGOS */
.logos-section {
  background:white;
  text-align:center;
  padding:20px;
  margin-top:60px;
}

.logos img {
  height:50px;
  margin:0 25px;
}

/* FOOTER */
footer {
  text-align:center;
  font-size:12px;
  padding:10px;
  color:#5c7f91;
}

</style>

</head>

<body>

</html>
