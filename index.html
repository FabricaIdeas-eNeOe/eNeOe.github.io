<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AOFM Waterpolo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('background.png') no-repeat center center fixed;
  background-size: cover;
  text-align: center;
  color: #1b3b5f;
}

.overlay {
  background: rgba(255,255,255,0.75);
  min-height: 100vh;
  padding: 40px 20px;
}

h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

h2 {
  font-weight: normal;
  margin-bottom: 50px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.card {
  width: 320px;
  border-radius: 16px;
  overflow: hidden;
  background: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  padding: 20px;
}

a {
  text-decoration: none;
  color: inherit;
}

.footer {
  margin-top: 60px;
}

.footer img {
  height: 50px;
  margin: 0 15px;
}
</style>

</head>
<body>

<div class="overlay">

<h1>AOFM WATERPOLO</h1>
<h2>Official Photo Gallery Platform</h2>

<div class="container">

  <a href="campeonato2026.html">
    <div class="card">
      <img src="portada-campeonato.jpg">
      <h3>Campeonato Nacional 2026</h3>
    </div>
  </a>

</div>

<div class="footer">
  <img src="logo-aofm.png">
  <img src="logo-club.png">
  <img src="logo-olimpicos.png">
</div>

</div>

</body>
</html>
