<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infantil Mayor</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#e9f3ff,#b9d6ff);
}

.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

h1{
  text-align:center;
  color:#0a3d62;
}

.filters{
  text-align:center;
  margin:20px 0;
}

.filters button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#dfe6e9;
  cursor:pointer;
}

.filters button.active{
  background:#0a3d62;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  display:block;
}

.download{
  padding:10px;
  text-align:center;
  cursor:pointer;
  color:#0a3d62;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>Infantil Mayor</h1>

  <div class="filters">
    <button class="active" onclick="filterTeam('ALL')">ALL</button>
    <button onclick="filterTeam('AGS')">AGS</button>
    <button onclick="filterTeam('NL')">NL</button>
    <button onclick="filterTeam('QROO')">QROO</button>
    <button onclick="filterTeam('EDOMEX')">EDOMEX</button>
    <button onclick="filterTeam('COAH')">COAH</button>
    <button onclick="filterTeam('GRO')">GRO</button>
  </div>

  <div class="grid" id="gallery"></div>
</div>

<script>
const cloudName = "du4pmuch7";

// ✅ SAFE base path (your real structure)
const BASE_PATH = "WP%202026/Campeonato%20Nacional%202026/inf-mayor-cdmx/gallery/";

// ✅ YOUR REAL FILES (extend later safely)
const images = [
  {id:"CN2026_InfMyr_CDMX_AGS_0320_025",team:"AGS"},
  {id:"CN2026_InfMyr_CDMX_AGS_0320_024",team:"AGS"},
  {id:"CN2026_InfMyr_CDMX_AGS_0320_023",team:"AGS"},
  {id:"CN2026_InfMyr_CDMX_AGS_0320_022",team:"AGS"},
  {id:"CN2026_InfMyr_CDMX_AGS_0320_021",team:"AGS"},
];

const gallery = document.getElementById("gallery");

function render(team){
  gallery.innerHTML="";

  const list = team==="ALL"
    ? images
    : images.filter(i=>i.team===team);

  list.forEach(img=>{
    const url = `https://res.cloudinary.com/${cloudName}/image/upload/${BASE_PATH}${img.id}.jpg`;

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <img src="${url}" loading="lazy">
      <div class="download" onclick="window.open('${url}')">Download</div>
    `;

    gallery.appendChild(div);
  });
}

function filterTeam(team){
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  render(team);
}

render("ALL");
</script>

</body>
</html>
