<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infantil Mayor</title>

<style>

body{
  margin:0;
  font-family: Arial;
  background: url('background.jpg') no-repeat center/cover;
  color:#0f3d57;
}

.back{
  position:absolute;
  top:20px;
  left:30px;
  cursor:pointer;
  font-weight:bold;
}

.title-box{
  margin:60px auto;
  width:fit-content;
  padding:20px 60px;
  border-radius:30px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(14px);
  position:relative;
  overflow:hidden;
}

.title-box::after{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background: radial-gradient(circle, rgba(255,255,255,0.25), transparent);
  animation:ripple 6s infinite linear;
}

@keyframes ripple{
  0%{ transform:scale(0.8);}
  50%{ transform:scale(1.2);}
  100%{ transform:scale(0.8);}
}

h1{ margin:0; }

.filters{
  display:flex;
  justify-content:center;
  gap:10px;
}

.filter-btn{
  padding:8px 15px;
  border-radius:20px;
  background: rgba(255,255,255,0.5);
  cursor:pointer;
}

.filter-btn.active{
  background:#0f3d57;
  color:white;
}

.gallery{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px 60px 100px;
}

.card{
  background: rgba(255,255,255,0.25);
  border-radius:20px;
  overflow:hidden;
  backdrop-filter: blur(10px);
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.download{
  text-align:center;
  padding:10px;
  cursor:pointer;
  font-weight:bold;
}

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  text-align:center;
  padding:10px;
}

</style>

</head>

<body>

<div class="back" onclick="history.back()">← Back</div>

<div class="title-box">
  <h1>Infantil Mayor</h1>
</div>

<div class="filters" id="filters"></div>

<div class="gallery" id="gallery"></div>

<div class="footer">© 2026 AOFM Waterpolo</div>

<script>

const cloudName = "du4pmuch7";

/* 🔥 REAL IDs (ONLY VALID ONES) */
const images = [

/* AGS */
{ id:"inf-mayor-cdmx/gallery/CN2026_InfMyr_CDMX_AGS_0320_001", team:"AGS"},
{ id:"inf-mayor-cdmx/gallery/CN2026_InfMyr_CDMX_AGS_0320_002", team:"AGS"},
{ id:"inf-mayor-cdmx/gallery/CN2026_InfMyr_CDMX_AGS_0320_003", team:"AGS"},
{ id:"inf-mayor-cdmx/gallery/CN2026_InfMyr_CDMX_AGS_0320_004", team:"AGS"},
{ id:"inf-mayor-cdmx/gallery/CN2026_InfMyr_CDMX_AGS_0320_005", team:"AGS"},

/* ADD MORE HERE EXACTLY AS YOU EXPORTED */

];

const teams = ["AGS","NL","QROO","EDOMEX","COAH","GRO"];

const gallery = document.getElementById("gallery");
const filtersContainer = document.getElementById("filters");

/* FILTER BUTTONS */
function createFilters(){

  const allBtn = document.createElement("div");
  allBtn.innerText="ALL";
  allBtn.className="filter-btn active";
  allBtn.onclick=()=>filter("ALL",allBtn);
  filtersContainer.appendChild(allBtn);

  teams.forEach(t=>{
    const btn=document.createElement("div");
    btn.innerText=t;
    btn.className="filter-btn";
    btn.onclick=()=>filter(t,btn);
    filtersContainer.appendChild(btn);
  });
}

/* FILTER */
function filter(team,el){

  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

  render(team);
}

/* RENDER */
function render(team){

  gallery.innerHTML="";

  const list = team==="ALL"
    ? images
    : images.filter(i=>i.team===team);

  list.forEach(img=>{

    const url=`https://res.cloudinary.com/${cloudName}/image/upload/${img.id}.jpg`;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${url}">
      <div class="download" onclick="window.open('${url}')">Download</div>
    `;

    gallery.appendChild(div);
  });
}

/* INIT */
createFilters();
render("ALL");

</script>

</body>
</html>
