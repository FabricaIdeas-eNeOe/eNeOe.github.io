<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infantil Mayor</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: 'Segoe UI', sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:
    radial-gradient(circle at 20% 40%, rgba(0,140,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 60%, rgba(0,140,255,0.2), transparent 40%),
    linear-gradient(135deg,#e9f3ff,#b9d6ff);
}

/* BACK BUTTON */
.back{
  position:absolute;
  top:20px;
  left:20px;
  color:#0a3d62;
  font-weight:600;
  text-decoration:none;
}

/* HEADER */
.header{
  text-align:center;
  margin-top:80px;
}

.title{
  display:inline-block;
  padding:15px 40px;
  border-radius:30px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  font-size:32px;
  font-weight:700;
  color:#0a3d62;
}

/* FILTERS */
.filters{
  margin-top:25px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}

.filters button{
  border:none;
  padding:10px 18px;
  border-radius:20px;
  background:#dfe6e9;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.filters button.active{
  background:#0a3d62;
  color:white;
}

/* GRID */
.grid{
  max-width:1200px;
  margin:40px auto;
  padding:0 20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(10px);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
  transition:0.25s;
}

.card:hover{
  transform:translateY(-5px);
}

/* IMAGE */
.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* DOWNLOAD */
.download{
  padding:12px;
  text-align:center;
  font-weight:700;
  color:#0a3d62;
  cursor:pointer;
}

/* FOOTER */
.footer{
  margin-top:auto;
  background:white;
  padding:15px;
  text-align:center;
}

.footer img{
  height:40px;
  margin:0 10px;
}
</style>
</head>

<body>

<a href="campeonato2026.html" class="back">← Back</a>

<div class="header">
  <div class="title">Infantil Mayor</div>

  <div class="filters">
    <button class="active" onclick="filterTeam(event,'ALL')">ALL</button>
    <button onclick="filterTeam(event,'AGS')">AGS</button>
    <button onclick="filterTeam(event,'NL')">NL</button>
    <button onclick="filterTeam(event,'QROO')">QROO</button>
    <button onclick="filterTeam(event,'EDOMEX')">EDOMEX</button>
    <button onclick="filterTeam(event,'COAH')">COAH</button>
    <button onclick="filterTeam(event,'GRO')">GRO</button>
  </div>
</div>

<div class="grid" id="gallery"></div>

<div class="footer">
  <img src="logo1.png">
  <img src="logo2.png">
  <img src="logo3.png">
</div>

<script>
const cloudName = "du4pmuch7";

const BASE_PATH = "WP%202026/Campeonato%20Nacional%202026/inf-mayor-cdmx/gallery/";

/* 🔥 SAFE DATA STRUCTURE */
const images = [

/* AGS */
{id:"CN2026_InfMyr_CDMX_AGS_0320_025",team:"AGS"},
{id:"CN2026_InfMyr_CDMX_AGS_0320_024",team:"AGS"},
{id:"CN2026_InfMyr_CDMX_AGS_0320_023",team:"AGS"},
{id:"CN2026_InfMyr_CDMX_AGS_0320_022",team:"AGS"},
{id:"CN2026_InfMyr_CDMX_AGS_0320_021",team:"AGS"},

/* NL */
{id:"CN2026_InfMyr_CDMX_NL_0320_001",team:"NL"},

/* QROO */
{id:"CN2026_InfMyr_CDMX_ROO_0322_060",team:"QROO"},

/* EDOMEX */
{id:"CN2026_InfMyr_CDMX_EDOMEX_0320_001",team:"EDOMEX"},

/* COAH */
{id:"CN2026_InfMyr_CDMX_COAH_0320_001",team:"COAH"},

/* GRO */
{id:"CN2026_InfMyr_CDMX_GRO_0320_001",team:"GRO"}

];

const gallery = document.getElementById("gallery");

function render(team){
  gallery.innerHTML="";

  const list = team==="ALL"
    ? images
    : images.filter(i=>i.team===team);

  list.forEach(img=>{
    const url=`https://res.cloudinary.com/${cloudName}/image/upload/${BASE_PATH}${img.id}.jpg`;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${url}">
      <div class="download" onclick="window.open('${url}')">Download</div>
    `;

    gallery.appendChild(div);
  });
}

function filterTeam(e,team){
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  render(team);
}

render("ALL");
</script>

</body>
</html>
