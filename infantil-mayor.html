<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infantil Mayor</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:url('background.png') no-repeat center/cover fixed;
overflow-x:hidden;
}

.container{padding:40px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
}

.grid img{
width:100%;
border-radius:16px;
cursor:pointer;
transition:.3s;
}
.grid img:hover{transform:scale(1.03);}

.lightbox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

.close{
position:absolute;
top:20px;right:20px;
color:white;
font-size:30px;
cursor:pointer;
}

.counter{
position:absolute;
bottom:20px;
color:white;
}
</style>
</head>

<body>

<div class="container">
<div class="grid" id="gallery"></div>
</div>

<div class="lightbox" id="lightbox">
<span class="close" onclick="closeLB()">×</span>
<img id="lbImg">
<div class="counter" id="counter"></div>
</div>

<script>

const base = "https://res.cloudinary.com/YOUR_CLOUD_NAME/image/upload/vXXXX/inf-mayor-cdmx";

const images = [
"CN2026_InfMyr_CDMX_AGS_0402_001.jpg",
"CN2026_InfMyr_CDMX_AGS_0402_002.jpg"
// 👉 keep your full list here
];

const gallery = document.getElementById("gallery");

images.forEach((img,i)=>{
let el=document.createElement("img");
el.src = `${base}/gallery/${img}`;
el.loading="lazy";
el.onclick=()=>openLB(i);
gallery.appendChild(el);
});

let current=0;

function openLB(i){
current=i;
document.getElementById("lightbox").style.display="flex";
updateLB();
}

function closeLB(){
document.getElementById("lightbox").style.display="none";
}

function updateLB(){
document.getElementById("lbImg").src =
`${base}/downloads/${images[current]}`;

document.getElementById("counter").innerText =
`${current+1} / ${images.length}`;

// preload next
let next = new Image();
next.src = `${base}/downloads/${images[(current+1)%images.length]}`;
}

document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowRight"){current=(current+1)%images.length;updateLB();}
if(e.key==="ArrowLeft"){current=(current-1+images.length)%images.length;updateLB();}
});

</script>

</body>
</html>
