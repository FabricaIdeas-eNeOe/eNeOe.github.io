<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infantil Mayor</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* BACK */
.back{
  position:fixed;
  top:20px;
  left:20px;
  color:#0a4f73;
  text-decoration:none;
  font-weight:600;
  z-index:10;
}

/* HEADER */
.header{
  text-align:center;
  padding:80px 20px 40px;
}

/* TITLE */
.title{
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:18px 60px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.6);
  position:relative;
  overflow:hidden;
}

.title::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.6) 50%,transparent 70%);
  animation:wave 3s infinite linear;
}

@keyframes wave{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

/* FILTERS */
.filters{
  text-align:center;
  margin:30px 0;
}

.filters button{
  margin:6px;
  padding:10px 18px;
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(10px);
  color:#0a4f73;
  font-weight:600;
  cursor:pointer;
}

.filters button.active{
  background:#0a4f73;
  color:white;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:18px;
  padding:30px 60px 60px;
}

.gallery img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:16px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.gallery img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:999;
}

.lightbox.active{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:90%;
  max-height:85%;
  border-radius:10px;
  cursor:grab;
  transition:transform 0.1s;
}

/* UI */
.lightbox-ui{
  position:absolute;
  inset:0;
  transition:opacity 0.3s;
}

.lightbox-ui.hidden{
  opacity:0;
}

.lightbox-btn{
  position:absolute;
  color:white;
  font-size:30px;
  cursor:pointer;
  user-select:none;
}

.close{top:20px; right:30px;}
.prev{left:30px;}
.next{right:30px;}

.counter{
  position:absolute;
  bottom:20px;
  right:30px;
  color:white;
  font-size:14px;
  background:rgba(0,0,0,0.4);
  padding:6px 12px;
  border-radius:20px;
}

/* LOGOS */
.logos-section{
  background:white;
  text-align:center;
  padding:20px;
}

.logos img{
  height:50px;
  margin:0 25px;
}

footer{
  text-align:center;
  font-size:12px;
  padding:10px;
  color:#5c7f91;
}
</style>
</head>

<body>

<a href="campeonato2026.html" class="back">← Back</a>

<div class="header">
  <div class="title">Infantil Mayor</div>
</div>

<div class="filters">
  <button onclick="setTeam(this,'AGS')" class="active">vs AGS</button>
  <button onclick="setTeam(this,'NL')">vs NL</button>
  <button onclick="setTeam(this,'QROO')">vs QROO</button>
  <button onclick="setTeam(this,'EDOMEX')">vs EDOMEX</button>
  <button onclick="setTeam(this,'COAH')">vs COAH</button>
  <button onclick="setTeam(this,'GRO')">vs GRO</button>
</div>

<div id="gallery" class="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">

  <div id="lightbox-ui" class="lightbox-ui">
    <span class="lightbox-btn close" onclick="closeLightbox()">✕</span>
    <span class="lightbox-btn prev" onclick="prevImage()">‹</span>
    <span class="lightbox-btn next" onclick="nextImage()">›</span>
    <div id="counter" class="counter"></div>
  </div>

  <img id="lightbox-img">

</div>

<div class="logos-section">
  <div class="logos">
    <img src="logo-olimpicos.png">
    <img src="logo-aofm.png">
    <img src="logo-club.png">
  </div>
</div>

<footer>© 2026 AOFM Waterpolo</footer>

<script>

const cloudName="du4pmuch7";
let currentImages=[];
let currentIndex=0;

let scale=1, moveX=0, moveY=0;
let lastTap=0;
let hideTimeout;

/* CONFIG */
const teamConfig={
  AGS:{prefix:"CN2026_InfMyr_CDMX_AGS_0320_",count:50},
  COAH:{prefix:"CN2026_InfMyr_CDMX_COA_0320_",count:51},
  EDOMEX:{prefix:"CN2026_InfMyr_CDMX_EDM_0319_",count:44},
  GRO:{prefix:"CN2026_InfMyr_CDMX_GRO_0319_",count:113},
  NL:{prefix:"CN2026_InfMyr_CDMX_NLE_0321_",count:107},
  QROO:{prefix:"CN2026_InfMyr_CDMX_ROO_0322_",count:60}
};

function generateImages(team){
  const c=teamConfig[team];
  let arr=[];
  for(let i=1;i<=c.count;i++){
    let n=String(i).padStart(3,"0");
    arr.push({
      thumb:`https://res.cloudinary.com/${cloudName}/image/upload/w_400/f_auto/q_auto/WP 2026/Campeonato Nacional 2026/inf-mayor-cdmx/gallery/${c.prefix}${n}.jpg`,
      full:`https://res.cloudinary.com/${cloudName}/image/upload/f_auto/q_auto/WP 2026/Campeonato Nacional 2026/inf-mayor-cdmx/downloads/${c.prefix}${n}.jpg`
    });
  }
  return arr;
}

function loadTeam(team){
  const g=document.getElementById("gallery");
  g.innerHTML="";
  currentImages=generateImages(team);

  currentImages.forEach((img,i)=>{
    let el=document.createElement("img");
    el.src=img.thumb;
    el.onclick=()=>openLightbox(i);
    g.appendChild(el);
  });
}

/* LIGHTBOX */
function openLightbox(i){
  currentIndex=i;
  document.getElementById("lightbox-img").src=currentImages[i].full;
  document.getElementById("lightbox").classList.add("active");
  updateCounter();
  preloadNext();
  resetZoom();
  resetUI();
}

function closeLightbox(){
  document.getElementById("lightbox").classList.remove("active");
}

/* COUNTER */
function updateCounter(){
  document.getElementById("counter").innerText =
    `${currentIndex+1} / ${currentImages.length}`;
}

/* PRELOAD */
function preloadNext(){
  let next=(currentIndex+1)%currentImages.length;
  let img=new Image();
  img.src=currentImages[next].full;
}

/* NAV */
function nextImage(){currentIndex=(currentIndex+1)%currentImages.length;openLightbox(currentIndex);}
function prevImage(){currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;openLightbox(currentIndex);}

/* ZOOM */
document.getElementById("lightbox-img").addEventListener("wheel",e=>{
  e.preventDefault();
  scale+=e.deltaY*-0.001;
  scale=Math.min(Math.max(1,scale),4);
  applyTransform();
});

/* DOUBLE TAP */
document.getElementById("lightbox-img").addEventListener("touchend",()=>{
  let now=Date.now();
  if(now-lastTap<300){
    scale=scale>1?1:2;
    applyTransform();
  }
  lastTap=now;
});

/* DRAG */
document.getElementById("lightbox-img").addEventListener("mousedown",e=>{
  let startX=e.clientX,startY=e.clientY;
  document.onmousemove=e=>{
    moveX+=e.clientX-startX;
    moveY+=e.clientY-startY;
    startX=e.clientX;
    startY=e.clientY;
    applyTransform();
  };
  document.onmouseup=()=>document.onmousemove=null;
});

function applyTransform(){
  document.getElementById("lightbox-img")
    .style.transform=`scale(${scale}) translate(${moveX}px,${moveY}px)`;
}

function resetZoom(){
  scale=1; moveX=0; moveY=0;
  applyTransform();
}

/* UI AUTO HIDE */
function resetUI(){
  const ui=document.getElementById("lightbox-ui");
  ui.classList.remove("hidden");
  clearTimeout(hideTimeout);
  hideTimeout=setTimeout(()=>ui.classList.add("hidden"),2000);
}

document.getElementById("lightbox").addEventListener("mousemove",resetUI);
document.getElementById("lightbox").addEventListener("click",resetUI);

/* KEYS */
document.addEventListener("keydown",e=>{
  if(!document.getElementById("lightbox").classList.contains("active"))return;
  if(e.key==="ArrowRight")nextImage();
  if(e.key==="ArrowLeft")prevImage();
  if(e.key==="Escape")closeLightbox();
});

/* FILTER */
function setTeam(btn,team){
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  loadTeam(team);
}

/* INIT */
loadTeam("AGS");

</script>

</body>
</html>
