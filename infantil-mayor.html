<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infantil Mayor</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at 20% 30%, #cfe3f5, #7fa6c9);
  min-height: 100vh;
}

/* BACK */
.back {
  position: absolute;
  top: 20px;
  left: 20px;
  text-decoration: none;
  font-weight: bold;
  color: #1b3c59;
}

/* TITLE */
.title-container {
  text-align: center;
  margin-top: 80px;
}

.title {
  display: inline-block;
  padding: 16px 40px;
  font-size: 28px;
  font-weight: bold;
  color: #1b3c59;
  background: rgba(255,255,255,0.4);
  border-radius: 30px;
  backdrop-filter: blur(6px);
}

/* FILTERS */
.filters {
  text-align: center;
  margin: 25px 0;
}

.filters button {
  margin: 5px;
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,0.6);
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.filters button.active {
  background: #1b3c59;
  color: white;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
  padding: 40px;
}

/* IMAGE STYLE */
.gallery img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 18px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.gallery img:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<a href="campeonato2026.html" class="back">← Back</a>

<div class="title-container">
  <div class="title">Infantil Mayor</div>
</div>

<div class="filters">
  <button onclick="setTeam(this,'AGS')" class="active">AGS</button>
  <button onclick="setTeam(this,'NL')">NL</button>
  <button onclick="setTeam(this,'QROO')">QROO</button>
  <button onclick="setTeam(this,'EDOMEX')">EDOMEX</button>
  <button onclick="setTeam(this,'COAH')">COAH</button>
  <button onclick="setTeam(this,'GRO')">GRO</button>
</div>

<div id="gallery" class="gallery"></div>

<script>
const cloudName = "du4pmuch7";

const teamConfig = {
  AGS: { prefix: "CN2026_InfMyr_CDMX_AGS_0320_", count: 50 },
  COAH: { prefix: "CN2026_InfMyr_CDMX_COA_0320_", count: 51 },
  EDOMEX: { prefix: "CN2026_InfMyr_CDMX_EDM_0319_", count: 44 },
  GRO: { prefix: "CN2026_InfMyr_CDMX_GRO_0319_", count: 113 },
  NL: { prefix: "CN2026_InfMyr_CDMX_NLE_0321_", count: 107 },
  QROO: { prefix: "CN2026_InfMyr_CDMX_ROO_0322_", count: 60 }
};

function generateImages(team) {
  const config = teamConfig[team];
  if (!config) return [];

  let images = [];

  for (let i = 1; i <= config.count; i++) {
    let number = String(i).padStart(3, "0");

    images.push({
      thumb: `https://res.cloudinary.com/${cloudName}/image/upload/w_400/f_auto/q_auto/WP 2026/Campeonato Nacional 2026/inf-mayor-cdmx/gallery/${config.prefix}${number}.jpg`,
      full: `https://res.cloudinary.com/${cloudName}/image/upload/f_auto/q_auto/WP 2026/Campeonato Nacional 2026/inf-mayor-cdmx/downloads/${config.prefix}${number}.jpg`
    });
  }

  return images;
}

function loadTeam(team) {
  const container = document.getElementById("gallery");
  container.innerHTML = "";

  const images = generateImages(team);

  images.forEach(img => {
    const image = document.createElement("img");

    image.src = img.thumb;
    image.loading = "lazy";

    image.onclick = () => {
      window.open(img.full, "_blank");
    };

    container.appendChild(image);
  });
}

function setTeam(button, team) {
  document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
  button.classList.add("active");
  loadTeam(team);
}

/* INITIAL LOAD */
loadTeam("AGS");
</script>

</body>
</html>
