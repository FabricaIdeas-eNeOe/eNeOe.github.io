<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infantil Mayor - AOFM</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: url('background.jpg') no-repeat center/cover fixed;
  color:#0a3c55;
}

/* HEADER */
.header{
  text-align:center;
  margin-top:40px;
}

.title-box{
  display:inline-block;
  padding:18px 50px;
  border-radius:20px;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.25);
  box-shadow: inset 0 0 20px rgba(255,255,255,0.4);
}

.title-box h1{
  margin:0;
  font-size:32px;
}

/* FILTERS */
.filters{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:30px;
  flex-wrap:wrap;
}

.filter-btn{
  padding:10px 18px;
  border-radius:20px;
  background: rgba(255,255,255,0.5);
  cursor:pointer;
  transition:0.2s;
}

.filter-btn.active{
  background:#0a3c55;
  color:white;
}

/* GRID */
.gallery{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
  gap:25px;
  padding:40px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.4);
  border-radius:16px;
  overflow:hidden;
  backdrop-filter: blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.download{
  text-align:center;
  padding:12px;
  font-weight:bold;
  cursor:pointer;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <div class="title-box">
    <h1>Infantil Mayor</h1>
  </div>
</div>

<div class="filters" id="filters"></div>

<div class="gallery" id="gallery"></div>

<div class="footer">
  © 2026 AOFM Waterpolo
</div>

<script>
const cloudName = "du4pmuch7";
const folder = "inf-mayor-cdmx/gallery";

const gallery = document.getElementById("gallery");
const filtersContainer = document.getElementById("filters");

let allImages = [];
let teams = new Set();

/* LOAD FROM CLOUDINARY */
fetch(`https://res.cloudinary.com/${cloudName}/image/list/${folder}.json`)
.then(res => res.json())
.then(data => {

  data.resources.forEach(img => {

    const id = img.public_id;

    // EXTRACT TEAM (AGS, NL, etc.)
    const parts = id.split('_');
    const team = parts[3]; // AGS, NL, etc.

    teams.add(team);

    const url = `https://res.cloudinary.com/${cloudName}/image/upload/${id}.jpg`;

    allImages.push({ url, team });
  });

  createFilters();
  renderGallery("ALL");
});

/* CREATE FILTER BUTTONS */
function createFilters(){

  const allBtn = document.createElement("div");
  allBtn.innerText = "ALL";
  allBtn.className = "filter-btn active";
  allBtn.onclick = () => filterImages("ALL");
  filtersContainer.appendChild(allBtn);

  teams.forEach(team => {
    const btn = document.createElement("div");
    btn.innerText = team;
    btn.className = "filter-btn";

    btn.onclick = () => filterImages(team);

    filtersContainer.appendChild(btn);
  });
}

/* FILTER */
function filterImages(team){

  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');

  renderGallery(team);
}

/* RENDER */
function renderGallery(team){

  gallery.innerHTML = "";

  const filtered = team === "ALL"
    ? allImages
    : allImages.filter(img => img.team === team);

  filtered.forEach(img => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${img.url}">
      <div class="download" onclick="downloadImage('${img.url}')">Download</div>
    `;

    gallery.appendChild(div);
  });
}

/* DOWNLOAD */
function downloadImage(url){
  window.open(url, '_blank');
}
</script>

</body>
</html>
