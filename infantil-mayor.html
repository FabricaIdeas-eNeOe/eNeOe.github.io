<script>
const cloudName = "du4pmuch7";

// FULL FOLDER PATH (already verified working)
const base = "WP%202026/Campeonato%20Nacional%202026/inf-mayor-cdmx/gallery/";

// TOTAL IMAGES
const TOTAL = 425;

// TEAM DETECTION (based on filename)
function detectTeam(id){
  if(id.includes("_AGS_")) return "AGS";
  if(id.includes("_NL_")) return "NL";
  if(id.includes("_ROO_")) return "QROO";
  if(id.includes("_EDOMEX_")) return "EDOMEX";
  if(id.includes("_COAH_")) return "COAH";
  if(id.includes("_GRO_")) return "GRO";
  return "OTHER";
}

// BUILD LIST AUTOMATICALLY
const images = [];

// AGS (0320)
for(let i=1;i<=25;i++){
  const num = String(i).padStart(3,"0");
  images.push({
    id:`CN2026_InfMyr_CDMX_AGS_0320_${num}`,
    team:"AGS"
  });
}

// NL (adjust count if needed)
for(let i=1;i<=40;i++){
  const num = String(i).padStart(3,"0");
  images.push({
    id:`CN2026_InfMyr_CDMX_NL_0320_${num}`,
    team:"NL"
  });
}

// QROO (ROO)
for(let i=1;i<=80;i++){
  const num = String(i).padStart(3,"0");
  images.push({
    id:`CN2026_InfMyr_CDMX_ROO_0322_${num}`,
    team:"QROO"
  });
}

// EDOMEX
for(let i=1;i<=80;i++){
  const num = String(i).padStart(3,"0");
  images.push({
    id:`CN2026_InfMyr_CDMX_EDOMEX_${num}`,
    team:"EDOMEX"
  });
}

// COAH
for(let i=1;i<=80;i++){
  const num = String(i).padStart(3,"0");
  images.push({
    id:`CN2026_InfMyr_CDMX_COAH_${num}`,
    team:"COAH"
  });
}

// GRO
for(let i=1;i<=80;i++){
  const num = String(i).padStart(3,"0");
  images.push({
    id:`CN2026_InfMyr_CDMX_GRO_${num}`,
    team:"GRO"
  });
}

const gallery = document.getElementById("gallery");

function render(team){
  gallery.innerHTML="";

  const list = team==="ALL" ? images : images.filter(i=>i.team===team);

  list.forEach(img=>{
    const url = `https://res.cloudinary.com/${cloudName}/image/upload/${base}${img.id}.jpg`;

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${url}" onerror="this.parentElement.style.display='none'">
      <div class="label" onclick="window.open('${url}')">Full Image</div>
    `;

    gallery.appendChild(card);
  });
}

function filterTeam(e,team){
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  render(team);
}

render("ALL");
</script>
