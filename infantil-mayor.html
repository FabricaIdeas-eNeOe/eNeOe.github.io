<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infantil Mayor</title>

<style>

/* ===== BACKGROUND ===== */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: url('background.jpg') no-repeat center center/cover;
  color:#0f3d57;
}

/* ===== BACK BUTTON ===== */
.back{
  position:absolute;
  top:20px;
  left:30px;
  font-weight:bold;
  cursor:pointer;
}

/* ===== TITLE GLASS + RIPPLE ===== */
.title-box{
  margin:60px auto 10px;
  width:fit-content;
  padding:20px 60px;
  border-radius:30px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(14px);
  position:relative;
  overflow:hidden;
}

.title-box::after{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 60%);
  animation:ripple 6s infinite linear;
}

@keyframes ripple{
  0%{ transform: scale(0.8) rotate(0deg);}
  50%{ transform: scale(1.2) rotate(180deg);}
  100%{ transform: scale(0.8) rotate(360deg);}
}

h1{
  margin:0;
  font-size:38px;
  letter-spacing:2px;
}

/* ===== FILTERS ===== */
.filters{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:25px auto;
  flex-wrap:wrap;
}

.filter-btn{
  padding:10px 18px;
  border-radius:20px;
  background: rgba(255,255,255,0.5);
  cursor:pointer;
  transition:0.3s;
}

.filter-btn.active{
  background:#0f3d57;
  color:white;
}

/* ===== GALLERY ===== */
.gallery{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:20px 60px;
}

/* ===== CARD ===== */
.card{
  background: rgba(255,255,255,0.25);
  border-radius:20px;
  overflow:hidden;
  backdrop-filter: blur(10px);
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
  transition:0.3s;
}

.card:hover{
  transform: translateY(-5px);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.download{
  text-align:center;
  padding:12px;
  font-weight:bold;
  cursor:pointer;
}

/* ===== FOOTER ===== */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
  text-align:center;
}

</style>

</head>

<body>

<div class="back" onclick="history.back()">← Back</div>

<div class="title-box">
  <h1>Infantil Mayor</h1>
</div>

<div class="filters" id="filters"></div>

<div class="gallery" id="gallery"></div>

<div class="footer">
  © 2026 AOFM Waterpolo
</div>

<script>

const cloudName = "du4pmuch7";
const folder = "inf-mayor-cdmx/gallery";

const gallery = document.getElementById("gallery");
const filtersContainer = document.getElementById("filters");

let allImages = [];
let teams = ["AGS","NL","QROO","EDOMEX","COAH","GRO"];

/* PAD NUMBERS */
function pad(num){
  return num.toString().padStart(3,'0');
}

/* GENERATE IMAGES */
teams.forEach(team => {

  for(let i=1; i<=120; i++){

    const publicId = `CN2026_InfMyr_CDMX_${team}_0320_${pad(i)}`;
    const url = `https://res.cloudinary.com/${cloudName}/image/upload/${folder}/${publicId}.jpg`;

    allImages.push({ url, team });
  }

});

/* CREATE FILTERS */
function createFilters(){

  const allBtn = document.createElement("div");
  allBtn.innerText = "ALL";
  allBtn.className = "filter-btn active";
  allBtn.onclick = () => filterImages("ALL", allBtn);
  filtersContainer.appendChild(allBtn);

  teams.forEach(team => {
    const btn = document.createElement("div");
    btn.innerText = team;
    btn.className = "filter-btn";

    btn.onclick = () => filterImages(team, btn);

    filtersContainer.appendChild(btn);
  });
}

/* FILTER */
function filterImages(team, element){

  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  element.classList.add('active');

  renderGallery(team);
}

/* RENDER */
function renderGallery(team){

  gallery.innerHTML = "";

  const filtered = team === "ALL"
    ? allImages
    : allImages.filter(img => img.team === team);

  filtered.forEach(img => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${img.url}" onerror="this.parentElement.remove()">
      <div class="download" onclick="window.open('${img.url}')">Download</div>
    `;

    gallery.appendChild(div);
  });
}

/* INIT */
createFilters();
renderGallery("ALL");

</script>

</body>
</html>
