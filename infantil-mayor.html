<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infantil Mayor</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body {
  margin:0;
  font-family:'Montserrat',sans-serif;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* ===== BACK ===== */
.back {
  position:fixed;
  top:20px;
  left:20px;
  color:#0a4f73;
  font-weight:600;
  text-decoration:none;
}

/* ===== HEADER ===== */
.header {
  text-align:center;
  padding:80px 20px 40px;
}

/* ===== TITLE (MATCH INDEX) ===== */
.title {
  position:relative;
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;

  padding:18px 60px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);

  border-radius:30px;
  border:1px solid rgba(255,255,255,0.6);
  overflow:hidden;
}

/* ANIMATED WAVE */
.title::before {
  content:"";
  position:absolute;
  inset:0;

  background:linear-gradient(
    120deg,
    transparent 30%,
    rgba(255,255,255,0.6) 50%,
    transparent 70%
  );

  animation:wave 3s infinite linear;
}

@keyframes wave {
  0% { transform:translateX(-100%); }
  100% { transform:translateX(100%); }
}

/* ===== FILTERS (GLASS STYLE) ===== */
.filters {
  text-align:center;
  margin:30px 0;
}

.filters button {
  margin:6px;
  padding:10px 18px;
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.5);

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(10px);

  color:#0a4f73;
  font-weight:600;
  cursor:pointer;

  transition:0.3s;
}

/* hover glow */
.filters button:hover {
  background:rgba(255,255,255,0.4);
  box-shadow:0 0 12px rgba(0,168,204,0.3);
}

/* active */
.filters button.active {
  background:#0a4f73;
  color:white;
}

/* ===== GALLERY ===== */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
  gap:18px;
  padding:30px 60px 60px;
}

.gallery img {
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:16px;

  cursor:pointer;
  transition:0.3s;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.2),
    0 0 10px rgba(0,168,204,0.2);
}

.gallery img:hover {
  transform:scale(1.05);
}

/* ===== LOGOS (MATCH INDEX) ===== */
.logos-section {
  background:white;
  text-align:center;
  padding:20px;
  margin-top:40px;
}

.logos img {
  height:50px;
  margin:0 25px;
}

/* ===== FOOTER ===== */
footer {
  text-align:center;
  font-size:12px;
  padding:10px;
  color:#5c7f91;
}

</style>
</head>

<body>

<a href="campeonato2026.html" class="back">← Back</a>

<div class="header">
  <div class="title">Infantil Mayor</div>
</div>

<div class="filters">
  <button onclick="setTeam(this,'AGS')" class="active">vs AGS</button>
  <button onclick="setTeam(this,'NL')">vs NL</button>
  <button onclick="setTeam(this,'QROO')">vs QROO</button>
  <button onclick="setTeam(this,'EDOMEX')">vs EDOMEX</button>
  <button onclick="setTeam(this,'COAH')">vs COAH</button>
  <button onclick="setTeam(this,'GRO')">vs GRO</button>
</div>

<div id="gallery" class="gallery"></div>

<!-- LOGOS -->
<div class="logos-section">
  <div class="logos">
    <img src="logo-olimpicos.png">
    <img src="logo-aofm.png">
    <img src="logo-club.png">
  </div>
</div>

<footer>
© 2026 AOFM Waterpolo
</footer>

<script>

const cloudName = "du4pmuch7";

const teamConfig = {
  AGS: { prefix: "CN2026_InfMyr_CDMX_AGS_0320_", count: 50 },
  COAH: { prefix: "CN2026_InfMyr_CDMX_COA_0320_", count: 51 },
  EDOMEX: { prefix: "CN2026_InfMyr_CDMX_EDM_0319_", count: 44 },
  GRO: { prefix: "CN2026_InfMyr_CDMX_GRO_0319_", count: 113 },
  NL: { prefix: "CN2026_InfMyr_CDMX_NLE_0321_", count: 107 },
  QROO: { prefix: "CN2026_InfMyr_CDMX_ROO_0322_", count: 60 }
};

function generateImages(team) {
  const config = teamConfig[team];
  let images = [];

  for (let i = 1; i <= config.count; i++) {
    let number = String(i).padStart(3, "0");

    images.push({
      thumb: `https://res.cloudinary.com/${cloudName}/image/upload/w_400/f_auto/q_auto/WP 2026/Campeonato Nacional 2026/inf-mayor-cdmx/gallery/${config.prefix}${number}.jpg`,
      full: `https://res.cloudinary.com/${cloudName}/image/upload/f_auto/q_auto/WP 2026/Campeonato Nacional 2026/inf-mayor-cdmx/downloads/${config.prefix}${number}.jpg`
    });
  }

  return images;
}

function loadTeam(team) {
  const container = document.getElementById("gallery");
  container.innerHTML = "";

  const images = generateImages(team);

  images.forEach(img => {
    const image = document.createElement("img");
    image.src = img.thumb;
    image.loading = "lazy";

    image.onclick = () => window.open(img.full, "_blank");

    container.appendChild(image);
  });
}

function setTeam(button, team) {
  document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
  button.classList.add("active");
  loadTeam(team);
}

loadTeam("AGS");

</script>

</body>
</html>
