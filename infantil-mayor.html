<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infantil Mayor</title>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: url('https://www.transparenttextures.com/patterns/cubes.png'),
              radial-gradient(circle at 20% 30%, #cfe3f5, #7fa6c9);
  background-attachment: fixed;
  min-height: 100vh;
}

/* ===== BACK BUTTON ===== */
.back {
  position: fixed;
  top: 20px;
  left: 20px;
  text-decoration: none;
  font-weight: 600;
  color: #1b3c59;
  z-index: 10;
}

/* ===== TITLE ===== */
.title-container {
  text-align: center;
  margin-top: 90px;
}

.title {
  display: inline-block;
  padding: 18px 50px;
  font-size: 34px;
  font-weight: 800;
  color: #1b4f6b;
  background: rgba(255,255,255,0.35);
  border-radius: 40px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px);}
  to { opacity: 1; transform: translateY(0);}
}

/* ===== FILTERS ===== */
.filters {
  text-align: center;
  margin: 25px 0;
}

.filters button {
  margin: 6px;
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  background: rgba(255,255,255,0.6);
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.filters button.active {
  background: #1b3c59;
  color: white;
}

/* ===== GALLERY ===== */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 22px;
  padding: 40px 60px 120px;
}

.gallery img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.gallery img:hover {
  transform: scale(1.05);
}

/* ===== FOOTER LOGOS ===== */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 10px;
}

.footer img {
  height: 40px;
  opacity: 0.8;
  transition: 0.2s;
}

.footer img:hover {
  opacity: 1;
}

</style>
</head>

<body>

<a href="campeonato2026.html" class="back">← Back</a>

<div class="title-container">
  <div class="title">Infantil Mayor</div>
</div>

<div class="filters">
  <button onclick="setTeam(this,'AGS')" class="active">vs AGS</button>
  <button onclick="setTeam(this,'NL')">vs NL</button>
  <button onclick="setTeam(this,'QROO')">vs QROO</button>
  <button onclick="setTeam(this,'EDOMEX')">vs EDOMEX</button>
  <button onclick="setTeam(this,'COAH')">vs COAH</button>
  <button onclick="setTeam(this,'GRO')">vs GRO</button>
</div>

<div id="gallery" class="gallery"></div>

<!-- FOOTER LOGOS -->
<div class="footer">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Logo_placeholder.svg/512px-Logo_placeholder.svg.png">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Logo_placeholder.svg/512px-Logo_placeholder.svg.png">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Logo_placeholder.svg/512px-Logo_placeholder.svg.png">
</div>

<script>
const cloudName = "du4pmuch7";

const teamConfig = {
  AGS: { prefix: "CN2026_InfMyr_CDMX_AGS_0320_", count: 50 },
  COAH: { prefix: "CN2026_InfMyr_CDMX_COA_0320_", count: 51 },
  EDOMEX: { prefix: "CN2026_InfMyr_CDMX_EDM_0319_", count: 44 },
  GRO: { prefix: "CN2026_InfMyr_CDMX_GRO_0319_", count: 113 },
  NL: { prefix: "CN2026_InfMyr_CDMX_NLE_0321_", count: 107 },
  QROO: { prefix: "CN2026_InfMyr_CDMX_ROO_0322_", count: 60 }
};

function generateImages(team) {
  const config = teamConfig[team];
  if (!config) return [];

  let images = [];

  for (let i = 1; i <= config.count; i++) {
    let number = String(i).padStart(3, "0");

    images.push({
      thumb: `https://res.cloudinary.com/${cloudName}/image/upload/w_400/f_auto/q_auto/WP 2026/Campeonato Nacional 2026/inf-mayor-cdmx/gallery/${config.prefix}${number}.jpg`,
      full: `https://res.cloudinary.com/${cloudName}/image/upload/f_auto/q_auto/WP 2026/Campeonato Nacional 2026/inf-mayor-cdmx/downloads/${config.prefix}${number}.jpg`
    });
  }

  return images;
}

function loadTeam(team) {
  const container = document.getElementById("gallery");
  container.innerHTML = "";

  const images = generateImages(team);

  images.forEach(img => {
    const image = document.createElement("img");

    image.src = img.thumb;
    image.loading = "lazy";

    image.onclick = () => {
      window.open(img.full, "_blank");
    };

    container.appendChild(image);
  });
}

function setTeam(button, team) {
  document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
  button.classList.add("active");
  loadTeam(team);
}

loadTeam("AGS");
</script>

</body>
</html>
