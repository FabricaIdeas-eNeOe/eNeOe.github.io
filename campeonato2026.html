<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campeonato Nacional 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body {
  overflow-x:hidden;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png'); /* ✅ LOCAL */
  background-size:cover;
  background-position:center;
}

/* CONTAINER */
.container {
  padding:40px 20px;
  text-align:center;
}

/* TITLE */
.title-box {
  display:inline-block;
  padding:20px 40px;
  border-radius:50px;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(12px);
  margin-bottom:15px;
}

.title-box h1 {
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
}

.subtitle {
  color:#3c6e85;
  margin-bottom:40px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  max-width:1000px;
  margin:auto;
}

/* CARD */
.card {
  text-decoration:none;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(12px);
  transition:0.3s;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.card:hover {
  transform:translateY(-6px) scale(1.03);
}

/* IMAGE */
.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

/* TEXT */
.card-content {
  padding:15px;
  text-align:left;
}

.card-content h3 {
  color:#0a4f73;
  font-size:20px;
}

.card-content p {
  color:#5c7f91;
  font-size:14px;
}

/* LOGOS */
.logos {
  margin-top:60px;
  display:flex;
  justify-content:center;
  gap:30px;
}

.logos img {
  height:40px;
  opacity:0.9;
}

/* MOBILE */
@media(max-width:600px){
  .title-box h1 {
    font-size:28px;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="title-box">
    <h1>Campeonato Nacional 2026</h1>
  </div>

  <div class="subtitle">Select Category</div>

  <div class="grid">

    <!-- INFANTIL MENOR (LOCAL IMAGE ✅) -->
    <a href="infantil-menor.html" class="card">
      <img src="CN2026_InfMnr.jpg">
      <div class="card-content">
        <h3>Infantil Menor</h3>
        <p>CDMX Teams</p>
      </div>
    </a>

    <!-- INFANTIL MAYOR (LOCAL IMAGE ✅) -->
    <a href="infantil-mayor.html" class="card">
      <img src="CN2026_InfMyr.jpg">
      <div class="card-content">
        <h3>Infantil Mayor</h3>
        <p>Official Matches</p>
      </div>
    </a>

    <!-- JUVENIL -->
    <div class="card">
      <img src="waterpolo.jpg">
      <div class="card-content">
        <h3>Juvenil</h3>
        <p>Coming Soon</p>
      </div>
    </div>

    <!-- JUNIOR -->
    <div class="card">
      <img src="waterpolo.jpg">
      <div class="card-content">
        <h3>Junior</h3>
        <p>Coming Soon</p>
      </div>
    </div>

  </div>

  <!-- LOGOS (LOCAL ✅) -->
  <div class="logos">
    <img src="logo-aofm.png">
    <img src="logo-club.png">
    <img src="logo-olimpicos.png">
  </div>

</div>

</body>
</html>
