<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campeonato Nacional 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin:0;
  font-family:'Montserrat',sans-serif;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-attachment:fixed;
}

/* HEADER */
.header {
  padding:25px;
}

.back {
  color:#0a4f73;
  text-decoration:none;
  font-weight:600;
}

/* TITLE */
.title-container {
  text-align:center;
  margin-top:10px;
}

.title {
  display:inline-block;
  font-size:38px;
  font-weight:800;
  color:#0a4f73;

  padding:16px 50px;
  border-radius:35px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.6);

  position:relative;
  overflow:hidden;
}

.title::after {
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:200%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.5),
    transparent
  );
  animation:shine 6s infinite;
}

@keyframes shine {
  0% { left:-100%; }
  50% { left:100%; }
  100% { left:100%; }
}

/* SUBTITLE */
.subtitle {
  text-align:center;
  margin-top:10px;
  color:#0a4f73;
  font-weight:600;
}

/* GRID */
.categories {
  max-width:1200px;
  margin:50px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
  padding:20px;
}

/* CARD */
.card {
  border-radius:22px;
  overflow:hidden;
  cursor:pointer;
  transition:0.35s;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(15px);

  box-shadow:
    0 12px 30px rgba(0,0,0,0.25),
    0 0 20px rgba(0,168,204,0.2);
}

/* IMAGE */
.card img {
  width:100%;
  height:200px;
  object-fit:cover;
  display:block;
  transition:0.4s;
}

/* CONTENT */
.card-content {
  padding:18px;
}

.card-title {
  font-weight:700;
  color:#0a4f73;
  font-size:18px;
}

.card-sub {
  font-size:14px;
  color:#5c7c8a;
}

/* HOVER */
.card:hover {
  transform:translateY(-8px) scale(1.04);
  box-shadow:
    0 18px 40px rgba(0,0,0,0.35),
    0 0 25px rgba(0,168,204,0.35);
}

.card:hover img {
  transform:scale(1.1);
}

/* FOOTER */
.footer {
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  padding:15px;
  background:rgba(255,255,255,0.9);
}

.footer img {
  height:40px;
  margin:0 15px;
}

</style>

</head>

<body>

<!-- BACK -->
<div class="header">
  <a href="index.html" class="back">← Back</a>
</div>

<!-- TITLE -->
<div class="title-container">
  <div class="title">Campeonato Nacional 2026</div>
  <div class="subtitle">Select Category</div>
</div>

<!-- CATEGORIES -->
<div class="categories">

  <!-- Infantil Menor -->
  <div class="card" onclick="location.href='infantil-menor.html'">
    <img src="CN2026_InfMnr.jpg">
    <div class="card-content">
      <div class="card-title">Infantil Menor</div>
      <div class="card-sub">CDMX Matches</div>
    </div>
  </div>

  <!-- Infantil Mayor -->
  <div class="card" onclick="location.href='infantil-mayor.html'">
    <img src="CN2026_InfMyr.jpg">
    <div class="card-content">
      <div class="card-title">Infantil Mayor</div>
      <div class="card-sub">Official Matches</div>
    </div>
  </div>

  <!-- Juvenil -->
  <div class="card">
    <img src="waterpolo.jpg">
    <div class="card-content">
      <div class="card-title">Juvenil</div>
      <div class="card-sub">Coming Soon</div>
    </div>
  </div>

  <!-- Junior -->
  <div class="card">
    <img src="waterpolo.jpg">
    <div class="card-content">
      <div class="card-title">Junior</div>
      <div class="card-sub">Coming Soon</div>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <img src="logo-aofm.png">
  <img src="logo-club.png">
  <img src="logo-olimpicos.png">
</div>

</body>
</html>
