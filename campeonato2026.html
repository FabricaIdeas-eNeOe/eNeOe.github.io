<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campeonato Nacional 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin:0;
  font-family:'Montserrat',sans-serif;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-attachment:fixed;
}

/* HEADER */
.header {
  padding:30px;
}

.back {
  color:#0a4f73;
  text-decoration:none;
  font-weight:600;
}

/* TITLE */
.title {
  text-align:center;
  font-size:40px;
  font-weight:800;
  color:#0a4f73;
  margin-top:10px;
}

/* FILTERS */
.filters {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:30px;
}

.filter-btn {
  padding:10px 18px;
  border-radius:20px;
  border:none;
  background:#e3edf3;
  cursor:pointer;
  font-weight:600;
}

.filter-btn.active {
  background:#0a4f73;
  color:white;
}

/* GALLERY */
.gallery {
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* IMAGE CARD */
.photo {
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.photo img {
  width:100%;
  display:block;
}

.photo:hover {
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">
  <a href="index.html" class="back">← Back</a>
</div>

<div class="title">Campeonato Nacional 2026</div>

<!-- FILTERS -->

<div class="filters">

<button class="filter-btn active" onclick="filterGallery('all')">ALL</button> <button class="filter-btn" onclick="filterGallery('AGS')">vs AGS</button> <button class="filter-btn" onclick="filterGallery('COAH')">vs Coahuila</button> <button class="filter-btn" onclick="filterGallery('EDOMEX')">vs EdoMex</button> <button class="filter-btn" onclick="filterGallery('GRO')">vs Guerrero</button> <button class="filter-btn" onclick="filterGallery('NL')">vs Nuevo León</button> <button class="filter-btn" onclick="filterGallery('QROO')">vs QROO</button>

</div>

<!-- GALLERY -->

<div class="gallery" id="gallery">

<!-- SAMPLE IMAGES (replace with your Cloudinary URLs later) -->

<div class="photo AGS" onclick="openLightbox(this)">
  <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg">
</div>

<div class="photo COAH" onclick="openLightbox(this)">
  <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg">
</div>

<div class="photo EDOMEX" onclick="openLightbox(this)">
  <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg">
</div>

<div class="photo GRO" onclick="openLightbox(this)">
  <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg">
</div>

<div class="photo NL" onclick="openLightbox(this)">
  <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg">
</div>

<div class="photo QROO" onclick="openLightbox(this)">
  <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg">
</div>

</div>

<!-- LIGHTBOX -->

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>

/* FILTER FUNCTION */
function filterGallery(category) {

  let photos = document.querySelectorAll('.photo');

  photos.forEach(photo => {
    if (category === 'all' || photo.classList.contains(category)) {
      photo.style.display = "block";
    } else {
      photo.style.display = "none";
    }
  });

  /* active button */
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
}

/* LIGHTBOX */
function openLightbox(el) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = el.querySelector("img").src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

</script>

</body>
</html>
