<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato Nacional 2026</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('background.png') no-repeat center center/cover;
  color: #0b3c5d;
}

/* CONTAINER */
.container {
  padding: 40px 20px 120px;
  max-width: 1200px;
  margin: auto;
}

/* BACK BUTTON */
.back {
  margin-bottom: 20px;
  display: inline-block;
  color: #0b3c5d;
  text-decoration: none;
  font-weight: bold;
}

/* TITLE (GLASS STYLE) */
.title-box {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.4);
  padding: 20px 40px;
  border-radius: 20px;
  text-align: center;
  margin-bottom: 30px;
}

h1 {
  margin: 0;
  font-size: 42px;
}

/* SUBTITLE */
.subtitle {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 40px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 30px;
}

/* CARD */
.card {
  text-decoration: none;
  color: inherit;
}

.card-img {
  position: relative;
  overflow: hidden;
  border-radius: 16px;
}

.card-img img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.card:hover img {
  transform: scale(1.05);
}

/* BADGE */
.badge {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 12px;
}

/* TEXT */
.card-title {
  margin-top: 10px;
  font-weight: bold;
  font-size: 18px;
}

.card-sub {
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<div class="title-box">
  <h1>Campeonato Nacional 2026</h1>
</div>

<div class="subtitle">Select Category</div>

<div class="grid">

  <!-- INFANTIL MAYOR -->
  <a href="inf-mayor-cdmx.html" class="card">
    <div class="card-img">
      <img src="waterpolo.jpg">
      <div class="badge">CDMX</div>
    </div>
    <div class="card-title">Infantil Mayor</div>
    <div class="card-sub">CDMX Teams</div>
  </a>

  <!-- INFANTIL MENOR -->
  <a href="inf-menor-cdmx.html" class="card">
    <div class="card-img">
      <img src="waterpolo.jpg">
      <div class="badge">CDMX</div>
    </div>
    <div class="card-title">Infantil Menor</div>
    <div class="card-sub">CDMX Teams</div>
  </a>

  <!-- FUTURE: JUVENIL -->
  <div class="card">
    <div class="card-img">
      <img src="waterpolo.jpg">
      <div class="badge">Coming</div>
    </div>
    <div class="card-title">Juvenil Varonil</div>
    <div class="card-sub">Next week</div>
  </div>

  <!-- FUTURE: JUNIOR -->
  <div class="card">
    <div class="card-img">
      <img src="waterpolo.jpg">
      <div class="badge">Coming</div>
    </div>
    <div class="card-title">Junior Varonil</div>
    <div class="card-sub">Next week</div>
  </div>

</div>

</div>

</body>
</html>
