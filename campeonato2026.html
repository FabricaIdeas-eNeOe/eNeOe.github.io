<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato Nacional 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-position:center;
}

/* HEADER */
.header{
  text-align:center;
  padding:90px 20px 50px;
}

.title{
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:18px 60px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);

  border-radius:30px;
  border:1px solid rgba(255,255,255,0.6);

  position:relative;
  overflow:hidden;
}

.title::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.6) 50%,transparent 70%);
  animation:wave 3s infinite linear;
}

@keyframes wave{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

/* GRID */
.grid{
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
  padding:40px 40px 120px;
}

/* CARD */
.card{
  width:320px;
  text-decoration:none;
  color:inherit;

  border-radius:24px;
  overflow:hidden;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(15px);

  box-shadow:
    0 15px 35px rgba(0,0,0,0.2),
    inset 0 1px 4px rgba(255,255,255,0.5);

  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{
  padding:20px;
  text-align:center;
}

.card-content h3{
  margin:0;
  font-size:20px;
  color:#0a4f73;
}

.card-content p{
  margin:8px 0 0;
  font-size:14px;
  opacity:0.8;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">Campeonato Nacional 2026</div>
</div>

<div class="grid">

<a href="gallery.html?event=cn2026&cat=inf-menor" class="card">
  <img src="infantil-menor.jpg">
  <div class="card-content">
    <h3>Infantil Menor</h3>
    <p>Matches & Gallery</p>
  </div>
</a>

<a href="gallery.html?event=cn2026&cat=inf-mayor" class="card">
  <img src="infantil-mayor.jpg">
  <div class="card-content">
    <h3>Infantil Mayor</h3>
    <p>Matches & Gallery</p>
  </div>
</a>

<a href="gallery.html?event=cn2026&cat=junior" class="card">
  <img src="waterpolo.jpg">
  <div class="card-content">
    <h3>Junior</h3>
    <p>Matches & Gallery</p>
  </div>
</a>

</div>

</body>
</html>
