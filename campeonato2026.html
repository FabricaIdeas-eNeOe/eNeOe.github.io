<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campeonato Nacional 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin:0;
  font-family:'Montserrat',sans-serif;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');

  background-size:cover;
  background-position:center top;
  background-attachment:fixed;
}

/* HEADER */
.header {
  text-align:center;
  padding:60px 20px 30px;
}

/* TITLE GLASS */
.title {
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;

  padding:16px 40px;

  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(18px);

  border-radius:20px;
  border:1px solid rgba(255,255,255,0.6);

  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* SUBTITLE */
.subtitle {
  margin-top:20px;
  font-size:20px;
  font-weight:600;
  color:#0a4f73;
}

/* BACK BUTTON */
.back {
  position:absolute;
  left:20px;
  top:20px;
  font-size:14px;
  color:#0a4f73;
  text-decoration:none;
}

/* SECTION */
.section {
  padding:40px 60px;
}

.section h2 {
  color:#0a4f73;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:35px;
}

/* CARD */
.card {
  height:220px;
  border-radius:18px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-8px) scale(1.05);
}

/* OVERLAY */
.card::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.4), transparent);
}

/* TAG */
.tag {
  position:absolute;
  top:10px;
  left:10px;
  background:#003f5c;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  z-index:2;
}

/* TEXT */
.card-info h3 {
  margin:10px 0 0;
  color:#0a4f73;
}

.card-info p {
  margin:4px 0 0;
  color:#3c6a80;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  color:#5c7f91;
}

</style>
</head>

<body>

<a class="back" href="index.html">← Back</a>

<div class="header">
  <div class="title">Campeonato Nacional 2026</div>
  <div class="subtitle">Select Category</div>
</div>

<div class="section">

  <div class="grid">

    <!-- INF MAYOR -->
    <div onclick="window.location.href='inf-mayor-cdmx.html'">
      <div class="card" style="background-image:url('waterpolo.jpg')">
        <div class="tag">CDMX</div>
      </div>
      <div class="card-info">
        <h3>Infantil Mayor</h3>
        <p>CDMX Teams</p>
      </div>
    </div>

    <!-- INF MENOR -->
    <div onclick="window.location.href='inf-menor-cdmx.html'">
      <div class="card" style="background-image:url('waterpolo.jpg')">
        <div class="tag">CDMX</div>
      </div>
      <div class="card-info">
        <h3>Infantil Menor</h3>
        <p>CDMX Teams</p>
      </div>
    </div>

  </div>

</div>

<footer>
  © 2026 AOFM Waterpolo
</footer>

</body>
</html>
