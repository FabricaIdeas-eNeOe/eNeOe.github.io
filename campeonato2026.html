<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campeonato Nacional 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  overflow-x:hidden;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* BACK */
.back{
  position:fixed;
  top:20px;
  left:20px;
  color:#0a4f73;
  text-decoration:none;
  font-weight:600;
  z-index:10;
}

/* HEADER */
.header{
  text-align:center;
  padding:80px 20px 40px;
}

/* TITLE (MASTER STYLE FROM INFANTIL MAYOR) */
.title{
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:18px 60px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.6);

  position:relative;
  overflow:hidden;
}

.title::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.6) 50%,transparent 70%);
  animation:wave 3s infinite linear;
}

@keyframes wave{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

.subtitle{
  margin-top:15px;
  color:#3c6e85;
}

/* GRID */
.grid{
  margin:60px auto 120px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
  max-width:1000px;
  padding:0 20px;
}

/* CARD */
.card{
  text-decoration:none;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(12px);
  transition:0.3s;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.card:hover{
  transform:translateY(-6px) scale(1.03);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.card-content h3{
  color:#0a4f73;
  font-size:20px;
}

.card-content p{
  color:#5c7f91;
  font-size:14px;
}

/* FOOTER (MASTER FROM INFANTIL MENOR) */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  padding:12px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(10px);
}

.footer img{
  height:40px;
  margin:0 12px;
}

</style>
</head>

<body>

<a href="index.html" class="back">← Back</a>

<div class="header">
  <div class="title">Campeonato Nacional 2026</div>
  <div class="subtitle">Select Category</div>
</div>

<div class="grid">

  <a href="infantil-menor.html" class="card">
    <img src="CN2026_InfMnr.jpg">
    <div class="card-content">
      <h3>Infantil Menor</h3>
      <p>CDMX Teams</p>
    </div>
  </a>

  <a href="infantil-mayor.html" class="card">
    <img src="CN2026_InfMyr.jpg">
    <div class="card-content">
      <h3>Infantil Mayor</h3>
      <p>Official Matches</p>
    </div>
  </a>

  <div class="card">
    <img src="waterpolo.jpg">
    <div class="card-content">
      <h3>Juvenil</h3>
      <p>Coming Soon</p>
    </div>
  </div>

  <div class="card">
    <img src="waterpolo.jpg">
    <div class="card-content">
      <h3>Junior</h3>
      <p>Coming Soon</p>
    </div>
  </div>

</div>

<div class="footer">
  <img src="logo-aofm.png">
  <img src="logo-club.png">
  <img src="logo-olimpicos.png">
</div>

</body>
</html>
