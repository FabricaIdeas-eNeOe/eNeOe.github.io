<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato Nacional 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-position:center;
}

/* HEADER */
.header{
  text-align:center;
  padding:100px 20px 60px;
}

.title{
  display:inline-block;
  font-size:44px;
  font-weight:800;
  color:#0a4f73;
  padding:20px 70px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);

  border-radius:35px;
  border:1px solid rgba(255,255,255,0.6);

  position:relative;
  overflow:hidden;
}

.title::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.6) 50%,transparent 70%);
  animation:wave 3s infinite linear;
}

@keyframes wave{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

/* GRID */
.grid{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:50px;
  flex-wrap:wrap;

  padding:40px 40px 140px;
}

/* CARD */
.card{
  width:360px;
  text-decoration:none;
  color:inherit;

  border-radius:28px;
  overflow:hidden;

  background:rgba(255,255,255,0.28);
  backdrop-filter:blur(18px);

  box-shadow:
    0 20px 45px rgba(0,0,0,0.25),
    inset 0 1px 6px rgba(255,255,255,0.6);

  transition:0.35s;
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
}

/* IMAGE */
.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* CONTENT */
.card-content{
  padding:22px;
  text-align:center;
}

.card-content h3{
  margin:0;
  font-size:22px;
  color:#0a4f73;
}

.card-content p{
  margin:10px 0 0;
  font-size:14px;
  opacity:0.75;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">Campeonato Nacional 2026</div>
</div>

<div class="grid">

<a href="gallery.html?event=cn2026&cat=inf-menor" class="card">
  <img src="infantil-menor.jpg">
  <div class="card-content">
    <h3>Infantil Menor</h3>
    <p>Matches & Gallery</p>
  </div>
</a>

<a href="gallery.html?event=cn2026&cat=inf-mayor" class="card">
  <img src="infantil-mayor.jpg">
  <div class="card-content">
    <h3>Infantil Mayor</h3>
    <p>Matches & Gallery</p>
  </div>
</a>

<a href="gallery.html?event=cn2026&cat=junior" class="card">
  <img src="waterpolo.jpg">
  <div class="card-content">
    <h3>Junior</h3>
    <p>Matches & Gallery</p>
  </div>
</a>

</div>

</body>
</html>
