<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campeonato Nacional 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin:0;
  font-family:'Montserrat',sans-serif;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-attachment:fixed;
}

/* HEADER */
.header {
  padding:30px;
}

.back {
  color:#0a4f73;
  text-decoration:none;
  font-weight:600;
}

/* TITLE */
.title {
  text-align:center;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  margin-top:10px;
}

/* FILTER CONTAINER (NEW GLASS EFFECT) */
.filters-container {
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.filters {
  display:flex;
  flex-wrap:wrap;
  gap:10px;

  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(20px);

  padding:12px 20px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.5);
}

/* FILTER BUTTON */
.filter-btn {
  padding:8px 16px;
  border-radius:20px;
  border:none;
  background:#e3edf3;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.filter-btn:hover {
  transform:scale(1.05);
}

.filter-btn.active {
  background:#0a4f73;
  color:white;
}

/* GALLERY */
.gallery {
  max-width:1200px;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:20px;
}

/* CARD */
.photo {
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.2),
    0 0 15px rgba(0,168,204,0.2);
}

.photo img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* HOVER */
.photo:hover {
  transform:translateY(-6px) scale(1.04);
  box-shadow:
    0 15px 35px rgba(0,0,0,0.3),
    0 0 25px rgba(0,168,204,0.35);
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">
  <a href="index.html" class="back">← Back</a>
</div>

<div class="title">Campeonato Nacional 2026</div>

<!-- FILTERS -->

<div class="filters-container">
  <div class="filters">

```
<button class="filter-btn active" onclick="filterGallery(event,'all')">ALL</button>
<button class="filter-btn" onclick="filterGallery(event,'AGS')">vs AGS</button>
<button class="filter-btn" onclick="filterGallery(event,'COAH')">vs Coahuila</button>
<button class="filter-btn" onclick="filterGallery(event,'EDOMEX')">vs EdoMex</button>
<button class="filter-btn" onclick="filterGallery(event,'GRO')">vs Guerrero</button>
<button class="filter-btn" onclick="filterGallery(event,'NL')">vs Nuevo León</button>
<button class="filter-btn" onclick="filterGallery(event,'QROO')">vs QROO</button>
```

  </div>
</div>

<!-- GALLERY -->

<div class="gallery" id="gallery">

<!-- EXAMPLES (replace later with Cloudinary images) -->

<div class="photo AGS" onclick="openLightbox(this)">
  <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg">
</div>

<div class="photo COAH" onclick="openLightbox(this)">
  <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg">
</div>

<div class="photo EDOMEX" onclick="openLightbox(this)">
  <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg">
</div>

<div class="photo GRO" onclick="openLightbox(this)">
  <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg">
</div>

<div class="photo NL" onclick="openLightbox(this)">
  <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg">
</div>

<div class="photo QROO" onclick="openLightbox(this)">
  <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg">
</div>

</div>

<!-- LIGHTBOX -->

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>

function filterGallery(event, category) {

  let photos = document.querySelectorAll('.photo');

  photos.forEach(photo => {
    if (category === 'all' || photo.classList.contains(category)) {
      photo.style.display = "block";
    } else {
      photo.style.display = "none";
    }
  });

  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
}

function openLightbox(el) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = el.querySelector("img").src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

</script>

</body>
</html>
