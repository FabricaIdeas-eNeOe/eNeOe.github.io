<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería INF-MAYOR</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: 'Montserrat', sans-serif;
  background:url('background.png') no-repeat center center fixed;
  background-size:cover;
  text-align:center;
}

h1{
  margin-top:60px;
  font-size:42px;
  color:#1c4e63;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.35);
  display:inline-block;
  padding:14px 40px;
  border-radius:20px;
}

.tabs{
  margin:20px 0 30px;
}

.tabs button{
  border:none;
  padding:10px 20px;
  margin:5px;
  border-radius:20px;
  background:rgba(255,255,255,0.4);
  cursor:pointer;
  font-weight:600;
}

.tabs button.active{
  background:#1c4e63;
  color:#fff;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
  padding:20px;
}

.gallery img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
}
</style>
</head>

<body>

<h1>Galería INF-MAYOR</h1>

<div class="tabs">
  <button onclick="setRival('GRO')">GRO</button>
  <button onclick="setRival('NLE')">NLE</button>
  <button onclick="setRival('MIC')">MIC</button>
  <button onclick="setRival('GTO')">GTO</button>
</div>

<div class="gallery" id="gallery"></div>

<script>
const CLOUD_NAME = "du4pmuch7";
const BASE = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/WP2026/CN2026/infmayor/gallery/`;

let currentRival = "GRO";

function setRival(rival){
  currentRival = rival;

  document.querySelectorAll(".tabs button").forEach(btn=>{
    btn.classList.remove("active");
  });

  event.target.classList.add("active");

  loadImages();
}

function loadImages(){
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  // loop images 1 → 200 (auto system)
  for(let i=1;i<=200;i++){

    let num = String(i).padStart(3,'0');

    // 🔥 FIX IS HERE (InfMyr instead of InfMnr)
    let url = `${BASE}CN2026_InfMyr_CDMX_${currentRival}_03${String(Math.floor(i/30)+19)}_${num}.jpg`;

    let img = document.createElement("img");

    img.src = url;

    // skip missing images automatically
    img.onerror = ()=> img.remove();

    gallery.appendChild(img);
  }
}

// default load
setTimeout(()=>setRival("GRO"),100);
</script>

</body>
</html>
