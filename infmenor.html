<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:url('background.png') center/cover fixed;
}

.header{text-align:center;padding:80px 20px 40px;}
.title{
  font-size:42px;font-weight:800;color:#0a4f73;
  background:rgba(255,255,255,0.3);
  padding:18px 60px;border-radius:30px;
}

.filters{
  text-align:center;
  margin:30px 0;
}

.filters button{
  margin:6px;
  padding:10px 20px;
  border-radius:25px;
  border:none;
  background:#ddd;
  cursor:pointer;
}

.filters button.active{
  background:#0a4f73;
  color:white;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
  padding:30px;
}

.gallery img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title" id="title">Gallery</div>
</div>

<div class="filters" id="filters"></div>

<div id="gallery" class="gallery"></div>

<script>
const cloud="du4pmuch7";
const base="WP2026/CN2026";

/* 🔥 ONLY CHANGE THIS PER PAGE */
const CATEGORY = "InfMnr";

/* INTERNAL */
let currentRival=null;
let detectedRivals = {};

/* SCAN IMAGES */
function scanImages(){

  const maxScan = 400;

  for(let i=1;i<=maxScan;i++){

    let n = String(i).padStart(3,"0");

    const rivals = ["AGS","GRO","NLE","MIC","GTO","JAL","BCN","UNAM","IPN"];

    rivals.forEach(rival=>{
      const dates = ["0319","0320","0321","0322","0402","0404","0405"];

      dates.forEach(date=>{

        let src=`https://res.cloudinary.com/${cloud}/image/upload/${base}/infmenor/gallery/CN2026_${CATEGORY}_CDMX_${rival}_${date}_${n}.jpg`;

        let img=new Image();

        img.onload=()=>{
          if(!detectedRivals[rival]) detectedRivals[rival]=new Set();
          detectedRivals[rival].add(date);
          buildFilters();
        };

        img.src=src;

      });

    });

  }
}

/* BUILD FILTER BUTTONS */
function buildFilters(){

  const f=document.getElementById("filters");
  f.innerHTML="";

  Object.keys(detectedRivals).forEach(rival=>{

    const btn=document.createElement("button");
    btn.textContent=rival;

    btn.onclick=()=>{
      document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      currentRival=rival;
      loadImages();
    };

    f.appendChild(btn);
  });

}

/* LOAD IMAGES */
function loadImages(){

  const g=document.getElementById("gallery");
  g.innerHTML="";

  const dates = detectedRivals[currentRival] || [];

  dates.forEach(date=>{

    for(let i=1;i<=300;i++){

      let n = String(i).padStart(3,"0");

      let src=`https://res.cloudinary.com/${cloud}/image/upload/f_auto,q_auto/${base}/infmenor/gallery/CN2026_${CATEGORY}_CDMX_${currentRival}_${date}_${n}.jpg`;

      let img=new Image();
      img.src=src;
      img.loading="lazy";

      img.onerror=()=>img.remove();

      g.appendChild(img);
    }

  });

}

window.onload=()=>{
  document.getElementById("title").textContent=CATEGORY;
  scanImages();
};
</script>

</body>
</html>
