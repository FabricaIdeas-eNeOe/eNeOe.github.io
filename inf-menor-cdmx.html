<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inf Menor CDMX 2026</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050b14 url('background.png') no-repeat center top;
  background-size:cover;
  color:white;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(6px);
  z-index:-1;
}

header{text-align:center;padding:40px;}

.back{
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  text-decoration:none;
}

.filters{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.filter-btn{
  padding:10px 18px;
  border-radius:20px;
  background:#1a2230;
  cursor:pointer;
}

.filter-btn.active{background:#00aaff;}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.card img{
  width:100%;
  border-radius:12px;
  cursor:pointer;
}

#lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}
#lightbox img{max-width:90%;}
</style>
</head>

<body>

<a class="back" href="campeonato2026.html">← Back</a>

<header>
  <h1>AOFM Waterpolo</h1>
  <h2>Infantil Menor CDMX 2026</h2>
</header>

<div class="filters">
  <div class="filter-btn active" onclick="filterGallery('all', event)">ALL</div>
  <div class="filter-btn" onclick="filterGallery('guanajuato', event)">vs Guanajuato</div>
  <div class="filter-btn" onclick="filterGallery('guerrero', event)">vs Guerrero</div>
  <div class="filter-btn" onclick="filterGallery('michoacan', event)">vs Michoacán</div>
  <div class="filter-btn" onclick="filterGallery('nuevoleon', event)">vs Nuevo León</div>
</div>

<div class="gallery" id="gallery"></div>

<div id="lightbox">
  <span onclick="prevImage()" style="position:absolute;left:20px;font-size:40px;">‹</span>
  <span onclick="nextImage()" style="position:absolute;right:20px;font-size:40px;">›</span>
  <div id="counter" style="position:absolute;top:20px;left:50%;transform:translateX(-50%);"></div>
  <img id="lightbox-img">
</div>

<script>
const CLOUD_NAME="du4pmuch7";
const TAG="infmenor2026";

let images=[];
let currentIndex=0;

async function loadImages(){
  const res=await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${TAG}.json`);
  const data=await res.json();
  images=data.resources;
  displayImages(images);
}

function displayImages(list){
  const gallery=document.getElementById("gallery");
  gallery.innerHTML="";
  list.forEach((img,i)=>{
    const url=`https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${img.public_id}`;
    gallery.innerHTML+=`<div class="card"><img src="${url}" onclick="openLightbox(${i})"></div>`;
  });
}

function filterGallery(tag,e){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");

  if(tag==="all") return displayImages(images);

  displayImages(images.filter(img=>img.public_id.includes(tag)));
}

function openLightbox(i){
  currentIndex=i;
  document.getElementById("lightbox").style.display="flex";
  updateLightbox();
}

function updateLightbox(){
  const img=images[currentIndex];
  document.getElementById("lightbox-img").src=
    `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${img.public_id}`;
  document.getElementById("counter").innerText=`${currentIndex+1}/${images.length}`;
}

function nextImage(){currentIndex=(currentIndex+1)%images.length;updateLightbox();}
function prevImage(){currentIndex=(currentIndex-1+images.length)%images.length;updateLightbox();}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")nextImage();
  if(e.key==="ArrowLeft")prevImage();
  if(e.key==="Escape")document.getElementById("lightbox").style.display="none";
});

document.getElementById("lightbox").onclick=()=>document.getElementById("lightbox").style.display="none";

loadImages();
</script>

</body>
</html>
