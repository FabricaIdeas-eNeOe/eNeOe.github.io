<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infantil Menor CDMX 2026</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 20px 20px;
}

.header h1 {
  margin: 0;
  font-size: 32px;
}

.header p {
  opacity: 0.7;
}

/* FILTERS */
.filters {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  margin: 20px;
}

.filter-btn {
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  background: #1c2430;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.filter-btn.active,
.filter-btn:hover {
  background: #00aaff;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  padding: 20px;
}

.card img {
  width: 100%;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.card img:hover {
  transform: scale(1.05);
}

/* LIGHTBOX */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
}

#close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <h1>AOFM Waterpolo</h1>
  <p>Infantil Menor CDMX 2026</p>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterGallery('all')">ALL</button>
  <button class="filter-btn" onclick="filterGallery('guanajuato')">Guanajuato</button>
  <button class="filter-btn" onclick="filterGallery('guerrero')">Guerrero</button>
  <button class="filter-btn" onclick="filterGallery('michoacan')">Michoacán</button>
  <button class="filter-btn" onclick="filterGallery('nvoleon')">Nvo León</button>
</div>

<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="close">&times;</span>
  <img id="lightbox-img">
</div>

<script>
const CLOUD_NAME = "du4pmuch7";

let images = [];

/* LOAD FROM CLOUDINARY */
async function loadImages() {
  const res = await fetch(
    `https://res.cloudinary.com/${CLOUD_NAME}/image/list/infmenor2026.json`
  );
  const data = await res.json();
  images = data.resources;
  displayImages(images);
}

/* DISPLAY IMAGES */
function displayImages(list) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  list.forEach(img => {
    const div = document.createElement("div");
    div.className = "card";

    const imageUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${img.public_id}.jpg`;

    div.innerHTML = `
      <img src="${imageUrl}" onclick="openLightbox('${imageUrl}')">
    `;

    gallery.appendChild(div);
  });
}

/* FILTER */
function filterGallery(tag) {
  document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");

  if (tag === "all") {
    displayImages(images);
  } else {
    const filtered = images.filter(img =>
      img.public_id.toLowerCase().includes(tag)
    );
    displayImages(filtered);
  }
}

/* LIGHTBOX */
function openLightbox(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

document.getElementById("close").onclick = () => {
  document.getElementById("lightbox").style.display = "none";
};

document.getElementById("lightbox").onclick = () => {
  document.getElementById("lightbox").style.display = "none";
};

/* INIT */
loadImages();
</script>

</body>
</html>
