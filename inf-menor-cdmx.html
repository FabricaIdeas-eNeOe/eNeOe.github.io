<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infantil Menor CDMX 2026</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:url('background.png') center/cover no-repeat fixed;
  color:white;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(5,15,25,0.65);
  backdrop-filter:blur(8px);
  z-index:-1;
}

.back{
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  text-decoration:none;
  opacity:0.7;
}
.back:hover{opacity:1}

.header{
  text-align:center;
  padding:40px;
}

.title{
  display:inline-block;
  padding:15px 40px;
  border-radius:20px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(12px);
  font-size:28px;
  font-weight:700;
}

/* FILTERS */
.filters{
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  padding:15px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

.filter-btn{
  padding:8px 16px;
  border-radius:20px;
  background:#1a2230;
  cursor:pointer;
  transition:0.25s;
}

.filter-btn.active{
  background:#00aaff;
  box-shadow:0 0 12px rgba(0,170,255,0.6);
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
  padding:20px;
}

.card{
  border-radius:14px;
  overflow:hidden;
  transition:0.3s;
}

.card img{
  width:100%;
  cursor:pointer;
  transition:0.4s;
}

.card:hover img{transform:scale(1.08);}
.card:hover{box-shadow:0 20px 40px rgba(0,0,0,0.5);}

/* LIGHTBOX */
#lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}

.arrow{
  position:absolute;
  font-size:40px;
  cursor:pointer;
}

.left{left:20px;}
.right{right:20px;}

.counter{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
}
</style>
</head>

<body>

<a class="back" href="campeonato2026.html">← Back</a>

<div class="header">
  <div class="title">Infantil Menor CDMX 2026</div>
</div>

<div class="filters">
  <div class="filter-btn active" onclick="filterGallery('all', event)">ALL</div>
  <div class="filter-btn" onclick="filterGallery('guanajuato', event)">vs Guanajuato</div>
  <div class="filter-btn" onclick="filterGallery('guerrero', event)">vs Guerrero</div>
  <div class="filter-btn" onclick="filterGallery('michoacan', event)">vs Michoacán</div>
  <div class="filter-btn" onclick="filterGallery('nuevoleon', event)">vs Nuevo León</div>
</div>

<div class="gallery" id="gallery"></div>

<div id="lightbox">
  <div class="arrow left" onclick="prevImage()">‹</div>
  <div class="arrow right" onclick="nextImage()">›</div>
  <div class="counter" id="counter"></div>
  <img id="lightbox-img">
</div>

<script>
const CLOUD_NAME="du4pmuch7";
const TAG="infmenor2026";

let images=[];
let currentIndex=0;

async function loadImages(){
  const res=await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${TAG}.json`);
  const data=await res.json();
  images=data.resources;
  displayImages(images);
}

function displayImages(list){
  const gallery=document.getElementById("gallery");
  gallery.innerHTML="";
  list.forEach((img,i)=>{
    const url=`https://res.cloudinary.com/${CLOUD_NAME}/image/upload/f_auto,q_auto/${img.public_id}`;
    gallery.innerHTML+=`<div class="card"><img src="${url}" onclick="openLightbox(${i})"></div>`;
  });
}

function filterGallery(tag,e){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");

  if(tag==="all") return displayImages(images);
  displayImages(images.filter(img=>img.public_id.includes(tag)));
}

function openLightbox(i){
  currentIndex=i;
  document.getElementById("lightbox").style.display="flex";
  updateLightbox();
}

function updateLightbox(){
  const img=images[currentIndex];
  document.getElementById("lightbox-img").src=`https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${img.public_id}`;
  document.getElementById("counter").innerText=`${currentIndex+1} / ${images.length}`;
}

function nextImage(){currentIndex=(currentIndex+1)%images.length;updateLightbox();}
function prevImage(){currentIndex=(currentIndex-1+images.length)%images.length;updateLightbox();}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")nextImage();
  if(e.key==="ArrowLeft")prevImage();
  if(e.key==="Escape")document.getElementById("lightbox").style.display="none";
});

document.getElementById("lightbox").onclick=()=>document.getElementById("lightbox").style.display="none";

loadImages();
</script>

</body>
</html>
