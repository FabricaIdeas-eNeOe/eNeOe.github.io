<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:,">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* HEADER */
.header{
  text-align:center;
  padding:80px 20px 40px;
}

.title{
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:18px 60px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);
  border-radius:30px;
}

/* FILTERS */
.filters{
  text-align:center;
  margin:30px 0;
}

.filters button{
  margin:6px;
  padding:10px 20px;
  border-radius:25px;
  border:none;
  background:rgba(255,255,255,0.3);
  cursor:pointer;
  font-weight:600;
}

.filters button.active{
  background:#0a4f73;
  color:white;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
  padding:30px 60px 100px;
}

.gallery img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:16px;
  cursor:pointer;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.lightbox.active{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:90%;
  max-height:85%;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  padding:12px;
  background:rgba(255,255,255,0.85);
}

.footer img{
  height:40px;
  margin:0 12px;
}

</style>
</head>

<body>

<div class="header">
  <div id="title" class="title">Galería</div>
</div>

<div id="filters" class="filters"></div>

<div id="gallery" class="gallery"></div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<div class="footer">
  <img src="logo-aofm.png">
  <img src="logo-club.png">
  <img src="logo-olimpicos.png">
</div>

<script>

// 🔥 CONFIG
const cloud = "du4pmuch7";

// 🔥 GET CATEGORY FROM URL
const params = new URLSearchParams(window.location.search);
const category = params.get("cat") || "infmenor";

// TITLE
document.getElementById("title").innerText =
  category.replace(/^\w/, c => c.toUpperCase());

// API
const API = `https://wp-aofm-cdmx.vercel.app/api/images?folder=WP2026/CN2026/${category}/gallery`;

let ALL_IMAGES = [];
let currentRival = "";

// LOAD
async function load(){
  const res = await fetch(API);
  ALL_IMAGES = await res.json();

  buildFilters();
}

// BUILD FILTER BUTTONS AUTOMATICALLY
function buildFilters(){

  const rivals = new Set();

  ALL_IMAGES.forEach(img=>{
    const parts = img.split("_");
    const rival = parts[3];
    rivals.add(rival);
  });

  const container = document.getElementById("filters");
  container.innerHTML = "";

  let first = true;

  rivals.forEach(rival => {

    const btn = document.createElement("button");
    btn.innerText = rival;

    btn.onclick = () => setRival(btn, rival);

    if(first){
      btn.classList.add("active");
      currentRival = rival;
      first = false;
    }

    container.appendChild(btn);
  });

  render();
}

// RENDER
function render(){

  const g = document.getElementById("gallery");
  g.innerHTML = "";

  const filtered = ALL_IMAGES.filter(img =>
    img.includes(`_${currentRival}_`)
  );

  filtered.forEach(public_id => {

    const url = `https://res.cloudinary.com/${cloud}/image/upload/f_auto,q_auto,w_400/${public_id}.jpg`;

    let img = new Image();
    img.src = url;
    img.loading = "lazy";

    img.onclick = () => {
      document.getElementById("lightbox-img").src =
        url.replace("w_400","w_1200");
      document.getElementById("lightbox").classList.add("active");
    };

    g.appendChild(img);
  });
}

// FILTER CHANGE
function setRival(btn, rival){

  currentRival = rival;

  document.querySelectorAll(".filters button")
    .forEach(b => b.classList.remove("active"));

  btn.classList.add("active");

  render();
}

// LIGHTBOX
function closeLightbox(){
  document.getElementById("lightbox").classList.remove("active");
}

// START
window.onload = load;

</script>

</body>
</html>
