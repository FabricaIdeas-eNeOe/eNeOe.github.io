<script>

const cloudName = "du4pmuch7";

/* ✅ UPDATED BASE PATHS (NO SPACES) */
const BASE_PATHS = {
  "inf-menor": "WP2026/Campeonato-Nacional-2026/inf-menor-cdmx",
  "inf-mayor": "WP2026/Campeonato-Nacional-2026/inf-mayor-cdmx",
  "junior": "WP2026/Campeonato-Nacional-2026/junior-cdmx"
};

/* CATEGORY → PREFIX + COUNT */
const CONFIG = {
  "inf-menor": {
    GTO: { prefix: "CN2026_InfMnr_CDMX_GTO_0322_", count: 80 },
    MIC: { prefix: "CN2026_InfMnr_CDMX_MIC_0321_", count: 50 },
    NLE: { prefix: "CN2026_InfMnr_CDMX_NLE_0320_", count: 70 },
    GRO: { prefix: "CN2026_InfMnr_CDMX_GRO_0319_", count: 90 }
  },
  "inf-mayor": {
    ROO: { prefix: "CN2026_InfMyr_CDMX_ROO_0322_", count: 60 },
    COAH: { prefix: "CN2026_InfMyr_CDMX_COA_0320_", count: 60 }
  },
  "junior": {
    GTO: { prefix: "CN2026_JNR_CDMX_GTO_0403_", count: 120 },
    UNAM2: { prefix: "CN2026_JNR_CDMX_UNAM2_0404_", count: 80 }
  }
};

/* GET URL PARAM */
const params = new URLSearchParams(window.location.search);
const category = params.get("cat");

/* DOM */
const gallery = document.getElementById("gallery");
const filters = document.getElementById("filters");

/* BUILD FILTER BUTTONS */
Object.keys(CONFIG[category]).forEach((team, i) => {
  const btn = document.createElement("button");
  btn.innerText = "vs " + team;

  if (i === 0) btn.classList.add("active");

  btn.onclick = () => {
    document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadTeam(team);
  };

  filters.appendChild(btn);
});

/* LOAD TEAM */
function loadTeam(team) {
  gallery.innerHTML = "";

  const base = BASE_PATHS[category];
  const config = CONFIG[category][team];

  for (let i = 1; i <= config.count; i++) {
    const num = String(i).padStart(3, "0");

    const url = `https://res.cloudinary.com/${cloudName}/image/upload/${base}/gallery/${config.prefix}${num}.jpg`;

    const img = document.createElement("img");
    img.src = url;
    img.loading = "lazy";

    gallery.appendChild(img);
  }
}

/* INIT */
loadTeam(Object.keys(CONFIG[category])[0]);

</script>
