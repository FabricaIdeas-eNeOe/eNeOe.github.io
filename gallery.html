<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-attachment:fixed;
}

/* TITLE */
.header{
  text-align:center;
  padding:60px 20px 20px;
}

.title{
  display:inline-block;
  font-size:32px;
  font-weight:800;
  color:#0a4f73;
  padding:14px 40px;
  background:rgba(255,255,255,0.25);
  border-radius:25px;
  animation:float 6s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

/* FILTERS */
.filters{
  text-align:center;
  margin-bottom:10px;
}

.filters button{
  margin:5px;
  padding:8px 18px;
  border-radius:20px;
  border:none;
  background:#ffffff60;
  color:#0a4f73;
  font-weight:600;
  cursor:pointer;
}

.filters button.active{
  background:#0a4f73;
  color:white;
}

/* MATCH */
.match{
  margin:30px 20px;
}

/* COVER */
.cover{
  height:200px;
  border-radius:16px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  overflow:hidden;
  position:relative;
}

.cover::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
}

.cover span{
  position:relative;
  margin:10px;
  padding:8px 16px;
  border-radius:20px;
  background:rgba(255,255,255,0.3);
  color:white;
  font-weight:600;
}

/* GRID */
.grid{
  margin-top:10px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
}

.grid img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;

  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s ease;
}

.lightbox.active{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:95%;
  max-height:85%;
  border-radius:10px;
}

/* LOCK SCROLL */
body.lightbox-open{
  overflow:hidden;
}

</style>
</head>

<body>

<div class="header">
  <div id="title" class="title"></div>
</div>

<div id="filters" class="filters"></div>
<div id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <img id="lightbox-img">
</div>

<script>

const cloud="du4pmuch7";

const params=new URLSearchParams(window.location.search);
const category=params.get("cat");

if(!category){
  document.body.innerHTML="";
  throw new Error("Blocked");
}

document.getElementById("title").innerText=category.toUpperCase();

const API=`https://wp-aofm-cdmx.vercel.app/api/images?folder=WP2026/CN2026/${category}/gallery`;

let ALL=[];
let currentRival="";
let matches=[];
let loadedIndex=0;
let currentImages=[];
let currentIndex=0;

async function load(){
  const res=await fetch(API);
  ALL=await res.json();
  buildFilters();
}

function buildFilters(){
  const rivals=new Set();

  ALL.forEach(img=>{
    rivals.add(img.split("_")[3]);
  });

  const f=document.getElementById("filters");
  let first=true;

  rivals.forEach(r=>{
    const btn=document.createElement("button");
    btn.innerText=r;

    btn.onclick=()=>setRival(btn,r);

    if(first){
      btn.classList.add("active");
      currentRival=r;
      first=false;
    }

    f.appendChild(btn);
  });

  prepareMatches();
}

function prepareMatches(){
  const filtered=ALL.filter(img=>img.includes(`_${currentRival}_`));
  const groups={};

  filtered.forEach(img=>{
    const date=img.split("_")[4];
    if(!groups[date]) groups[date]=[];
    groups[date].push(img);
  });

  matches=Object.keys(groups).sort().map(date=>({
    date,
    images:groups[date]
  }));

  loadedIndex=0;
  document.getElementById("gallery").innerHTML="";
  loadMore();
}

function loadMore(){
  const container=document.getElementById("gallery");

  if(loadedIndex>=matches.length) return;

  const match=matches[loadedIndex++];

  const section=document.createElement("div");
  section.className="match";

  const cover=document.createElement("div");
  cover.className="cover";

  cover.style.backgroundImage=
    `url(https://res.cloudinary.com/${cloud}/image/upload/w_800/${match.images[0]}.jpg)`;

  cover.innerHTML=`<span>${currentRival} · ${match.date}</span>`;

  const grid=document.createElement("div");
  grid.className="grid";

  match.images.forEach((id,i)=>{
    const url=`https://res.cloudinary.com/${cloud}/image/upload/w_400/${id}.jpg`;

    const img=new Image();
    img.src=url;

    img.onclick=()=>{
      openLightbox(match.images,i);
    };

    grid.appendChild(img);
  });

  section.appendChild(cover);
  section.appendChild(grid);
  container.appendChild(section);
}

function setRival(btn,r){
  currentRival=r;
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  prepareMatches();
}

/* LIGHTBOX LOGIC */

const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

function openLightbox(images,index){
  currentImages=images;
  currentIndex=index;
  showImage();
  lightbox.classList.add("active");
  document.body.classList.add("lightbox-open");
}

function closeLightbox(){
  lightbox.classList.remove("active");
  document.body.classList.remove("lightbox-open");
}

function showImage(){
  const id=currentImages[currentIndex];
  const url=`https://res.cloudinary.com/${cloud}/image/upload/w_1200/${id}.jpg`;
  lightboxImg.src=url;

  // preload next
  const next=new Image();
  const nextIndex=(currentIndex+1)%currentImages.length;
  next.src=`https://res.cloudinary.com/${cloud}/image/upload/w_1200/${currentImages[nextIndex]}.jpg`;
}

lightbox.onclick=closeLightbox;

/* SWIPE SUPPORT */

let startX=0;

lightbox.addEventListener("touchstart",(e)=>{
  startX=e.touches[0].clientX;
});

lightbox.addEventListener("touchend",(e)=>{
  let endX=e.changedTouches[0].clientX;

  if(endX < startX - 50){
    nextImage();
  }else if(endX > startX + 50){
    prevImage();
  }
});

function nextImage(){
  currentIndex=(currentIndex+1)%currentImages.length;
  showImage();
}

function prevImage(){
  currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;
  showImage();
}

window.onload=load;

</script>

</body>
</html>
