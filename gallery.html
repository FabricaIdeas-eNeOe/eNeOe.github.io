<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:url('background.png') no-repeat center center fixed;
  background-size:cover;
}

.hotspot{position:fixed;width:40px;height:40px;z-index:9999;}
#home{top:0;left:0;}
#camp{top:0;right:0;}
#admin{top:0;left:50%;transform:translateX(-50%);}

.header{text-align:center;padding:60px 20px 10px;}

.title{
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:20px 70px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);
  border-radius:35px;
}

.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:20px;
}

.tab{
  padding:10px 18px;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  cursor:pointer;
}

.tab.active{
  background:#0a4f73;
  color:white;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:16px;
  padding:40px;
}

.gallery img{
  width:100%;
  border-radius:14px;
  cursor:pointer;
}

.viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.viewer img{
  max-width:90%;
  max-height:85%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

.footer{
  background:rgba(255,255,255,0.85);
  text-align:center;
  padding:12px;
}
</style>
</head>

<body>

<div id="home" class="hotspot" onclick="location.href='index.html'"></div>
<div id="camp" class="hotspot" onclick="location.href='campeonato2026.html'"></div>
<div id="admin" class="hotspot" onclick="location.href='admin.html'"></div>

<div class="header">
  <div class="title" id="title"></div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
  <div class="close" onclick="closeViewer()">✕</div>
  <img id="viewerImg">
</div>

<div class="footer">
  <img src="logo-aofm.png" height="40">
  <img src="logo-club.png" height="40">
  <img src="logo-olimpicos.png" height="40">
</div>

<script>

/* 🔥 FIXED BASE */
const BASE = "https://res.cloudinary.com/du4pmuch7/image/upload/";

/* 🔥 FULL PUBLIC ID ROOT */
const ROOT = "WP 2026/Campeonato Nacional 2026/";

const params = new URLSearchParams(window.location.search);
const cat = params.get("cat");

const gallery = document.getElementById("gallery");
const tabsDiv = document.getElementById("tabs");
const title = document.getElementById("title");

const CONFIG = {
  "junior":{
    prefix:"Junr",
    folder:"junior-cdmx/gallery",
    tabs:["GTO","GTO2","UNAM","UNAM2","3RD"]
  },
  "inf-mayor":{
    prefix:"InfMyr",
    folder:"inf-mayor-cdmx/gallery",
    tabs:["AGS","COAH","EDOMEX","GRO","NL","ROO"]
  },
  "inf-menor":{
    prefix:"InfMnr",
    folder:"inf-menor-cdmx/gallery",
    tabs:["GRO","GTO","MIC","NL"]
  }
};

const current = CONFIG[cat];
title.innerText = cat.replace("-"," ").toUpperCase();

/* 🔥 FIXED LOADER */
function load(rival){

  gallery.innerHTML="";
  let index = 1;
  let fails = 0;

  function scan(){

    let num = String(index).padStart(3,"0");
    const dates = ["0319","0320","0321","0322","0404"];

    dates.forEach(date=>{

      let publicId = `${ROOT}${current.folder}/CN2026_${current.prefix}_CDMX_${rival}_${date}_${num}`;

      let url = `${BASE}q_auto,f_auto,w_400/${encodeURI(publicId)}.jpg`;

      let img = new Image();
      img.src = url;

      img.onload = ()=>{
        fails=0;
        img.onclick=()=>open(url.replace("w_400/",""));
        gallery.appendChild(img);
      };

      img.onerror = ()=>fails++;
    });

    index++;

    if(fails < 60){
      requestAnimationFrame(scan);
    }
  }

  scan();
}

/* TABS */
current.tabs.forEach((r,i)=>{

  let tab = document.createElement("div");
  tab.className="tab";
  if(i===0) tab.classList.add("active");

  tab.innerText = r==="3RD" ? "Premiación" : "vs "+r;

  tab.onclick=()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    load(r);
  };

  tabsDiv.appendChild(tab);
});

/* INIT */
load(current.tabs[0]);

function open(src){
  viewer.style.display="flex";
  viewerImg.src=src;
}

function closeViewer(){
  viewer.style.display="none";
}

</script>

</body>
</html>
