<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería Junior</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
}

h1 {
    margin: 40px 0 10px;
    font-size: 36px;
}

.tabs {
    margin-bottom: 30px;
}

.tab {
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    margin: 5px;
    cursor: pointer;
    background: #ddd;
}

.tab.active {
    background: #1f5c63;
    color: white;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    padding: 0 40px 40px;
}

.gallery img {
    width: 100%;
    border-radius: 12px;
    object-fit: cover;
}
</style>
</head>

<body>

<h1>GALERÍA JUNIOR</h1>

<div class="tabs">
    <button class="tab active">3RD</button>
</div>

<div class="gallery" id="gallery"></div>

<script>
const cloudName = "du4pmuch7";

// ✅ CORRECT PATH (WITH %20 FOR SPACES)
const basePath = "WP%202026/Campeonato%20Nacional%202026/junior-cdmx/gallery";

const images = [
"CN2026_JNR_CDMX_3RD_0405_001",
"CN2026_JNR_CDMX_3RD_0405_002",
"CN2026_JNR_CDMX_3RD_0405_003",
"CN2026_JNR_CDMX_3RD_0405_004",
"CN2026_JNR_CDMX_3RD_0405_005"
];

const gallery = document.getElementById("gallery");

images.forEach(name => {
    const url = `https://res.cloudinary.com/${cloudName}/image/upload/${basePath}/${name}.jpg`;

    const img = document.createElement("img");
    img.src = url;

    gallery.appendChild(img);
});
</script>

</body>
</html>
