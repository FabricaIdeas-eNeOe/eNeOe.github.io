<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#f5f5f5;
  text-align:center;
}

h1{
  margin:40px 0 10px;
  font-size:36px;
  color:#0a4f73;
}

.tabs{
  margin-bottom:30px;
}

.tab{
  padding:10px 18px;
  border-radius:20px;
  border:none;
  margin:5px;
  cursor:pointer;
  background:#ddd;
  font-weight:600;
}

.tab.active{
  background:#1f5c63;
  color:white;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
  gap:20px;
  padding:0 40px 40px;
}

.card img{
  width:100%;
  border-radius:12px;
  object-fit:cover;
}

</style>

</head>

<body>

<h1 id="title">GALERÍA</h1>

<div class="tabs" id="tabs"></div>

<div class="gallery" id="gallery"></div>

<script>

/* =========================
   CONFIG
========================= */

const CLOUD = "https://res.cloudinary.com/du4pmuch7/image/upload/";

/* =========================
   CATEGORY FROM URL
========================= */

const params = new URLSearchParams(window.location.search);
const category = params.get("cat");

const title = document.getElementById("title");
const tabs = document.getElementById("tabs");
const gallery = document.getElementById("gallery");

title.innerText = "GALERÍA " + category.toUpperCase();

/* =========================
   STRUCTURE (AUTO RULES)
========================= */

const CONFIG = {

  junior: {
    GTO: { prefix: "CN2026_JNR_CDMX_GTO_0402_", max: 200 },
    "3RD": { prefix: "CN2026_JNR_CDMX_3RD_0405_", max: 200 }
  },

  "inf-mayor": {
    COAH: { prefix: "CN2026_InfMyr_CDMX_COAH_", max: 300 },
    ROO:  { prefix: "CN2026_InfMyr_CDMX_ROO_",  max: 300 }
  },

  "inf-menor": {
    MIC: { prefix: "CN2026_InfMnr_CDMX_MIC_", max: 300 }
  }

};

/* =========================
   CREATE TABS
========================= */

Object.keys(CONFIG[category]).forEach((rival,i)=>{

  const tab = document.createElement("button");
  tab.className = "tab" + (i===0 ? " active" : "");

  tab.innerText = rival === "3RD" ? "Premiación" : "vs " + rival;

  tab.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    loadImages(rival);
  };

  tabs.appendChild(tab);
});

/* =========================
   LOAD IMAGES (AUTO)
========================= */

function loadImages(rival){

  gallery.innerHTML = "";

  const { prefix, max } = CONFIG[category][rival];

  for(let i = 1; i <= max; i++){

    const num = String(i).padStart(3,'0');
    const url = CLOUD + prefix + num + ".jpg";

    const img = document.createElement("img");

    img.src = url;

    img.onload = ()=>{
      const card = document.createElement("div");
      card.className = "card";
      card.appendChild(img);
      gallery.appendChild(card);
    };

    // silently ignore missing images
    img.onerror = ()=>{};
  }
}

/* =========================
   INIT
========================= */

const first = Object.keys(CONFIG[category])[0];
loadImages(first);

</script>

</body>
</html>
