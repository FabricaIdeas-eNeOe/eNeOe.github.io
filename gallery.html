<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* HEADER */
.header{
  text-align:center;
  padding:80px 20px 30px;
}

.title{
  position:relative;
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:20px 70px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);

  border-radius:35px;
  border:1px solid rgba(255,255,255,0.6);

  overflow:hidden;
}

.title::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.6) 50%,transparent 70%);
  animation:wave 3s infinite linear;
}

@keyframes wave{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:20px;
}

.tab{
  position:relative;
  padding:10px 18px;
  border-radius:20px;
  cursor:pointer;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.5);

  overflow:hidden;
  transition:0.25s;
}

.tab::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    120deg,
    transparent 30%,
    rgba(255,255,255,0.6) 50%,
    transparent 70%
  );
  opacity:0;
}

.tab:hover::before{
  opacity:1;
  animation:wave 2s linear infinite;
}

.tab.active{
  background:#0a4f73;
  color:white;
}

/* GALLERY */
.gallery{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:14px;
  padding:20px 20px 120px;
}

/* IMAGE CARD (FIX PORTRAIT) */
.card{
  width:220px;
  height:150px;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  cursor:pointer;
  transition:0.2s;
}

.card img:hover{
  transform:scale(1.05);
}

/* VIEWER */
.viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10;
}

.viewer img{
  max-width:90%;
  max-height:90%;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(10px);
  text-align:center;
  padding:10px;
}

.footer img{
  height:40px;
  margin:0 10px;
}

</style>
</head>

<body>

<div class="header">
  <div class="title" id="title"></div>
  <div class="tabs" id="tabs"></div>
</div>

<div id="gallery" class="gallery"></div>

<div id="viewer" class="viewer" onclick="this.style.display='none'">
  <img id="full">
</div>

<div class="footer">
  <img src="logo-aofm.png">
  <img src="logo-club.png">
  <img src="logo-olimpicos.png">
</div>

<script>

/* =========================
   🔥 MANIFEST (EDIT ONLY THIS)
========================= */

const MANIFEST = {

  junior: {
    GTO: [
      "CN2026_Junr_CDMX_GTO_0402_001"
    ],
    GTO2: [
      "CN2026_Junr_CDMX2_GTO_0402_001"
    ],
    UNAM: [
      "CN2026_Junr_CDMX_UNAM_0404_072"
    ],
    UNAM2: [
      "CN2026_Junr_CDMX_UNAM2_0404_001"
    ],
    "3RD": [
      "CN2026_Junr_CDMX_3RD_0404_001"
    ]
  },

  "inf-mayor": {
    ROO: [
      "CN2026_InfMyr_CDMX_ROO_0322_060"
    ],
    COAH: [
      "CN2026_InfMyr_CDMX_COAH_0322_001"
    ]
  },

  "inf-menor": {
    MIC: [
      "CN2026_InfMnr_CDMX_MIC_0319_001"
    ]
  }

};

/* ========================= */

const CLOUD = "https://res.cloudinary.com/du4pmuch7/image/upload/";
const ROOT = "WP%202026/Campeonato%20Nacional%202026/";

const params = new URLSearchParams(window.location.search);
const category = params.get("cat");

const title = document.getElementById("title");
const tabs = document.getElementById("tabs");
const gallery = document.getElementById("gallery");
const full = document.getElementById("full");
const viewer = document.getElementById("viewer");

title.innerText = category.toUpperCase();

/* BUILD TABS */

Object.keys(MANIFEST[category]).forEach((rival,i)=>{

  const tab = document.createElement("div");
  tab.className = "tab" + (i===0 ? " active" : "");

  tab.innerText = rival === "3RD" ? "Premiación" : "vs " + rival;

  tab.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    loadImages(rival);
  };

  tabs.appendChild(tab);
});

/* LOAD IMAGES */

function loadImages(rival){

  gallery.innerHTML = "";

  const list = MANIFEST[category][rival];

  list.forEach(name => {

    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");

    const url = CLOUD + ROOT + category + "-cdmx/gallery/" + name + ".jpg";

    img.src = url;

    img.onclick = ()=>{
      full.src = url;
      viewer.style.display = "flex";
    };

    card.appendChild(img);
    gallery.appendChild(card);

  });
}

/* INIT */

const first = Object.keys(MANIFEST[category])[0];
loadImages(first);

</script>

</body>
</html>
