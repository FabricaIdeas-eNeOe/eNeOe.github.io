<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#f5f5f5;
  text-align:center;
}

h1{
  margin:40px 0 10px;
  font-size:36px;
  color:#0a4f73;
}

.tabs{
  margin-bottom:30px;
}

.tab{
  padding:10px 18px;
  border-radius:20px;
  border:none;
  margin:5px;
  cursor:pointer;
  background:#ddd;
  font-weight:600;
}

.tab.active{
  background:#1f5c63;
  color:white;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
  gap:20px;
  padding:0 40px 40px;
}

.card img{
  width:100%;
  border-radius:12px;
  object-fit:cover;
}
</style>

</head>

<body>

<h1 id="title">GALERÍA</h1>
<div class="tabs" id="tabs"></div>
<div class="gallery" id="gallery"></div>

<script>

/* =========================
   BASE CONFIG
========================= */

const CLOUD = "https://res.cloudinary.com/du4pmuch7/image/upload/";
const EVENT = "CN2026";
const TEAM = "CDMX";

/* CATEGORY MAP (your system) */

const CATEGORY_MAP = {
  "junior": "JNR",
  "inf-mayor": "InfMyr",
  "inf-menor": "InfMnr"
};

/* RIVALS + DATES */

const DATA = {

  junior: {
    GTO: "0402",
    "3RD": "0405"
  },

  "inf-mayor": {
    COAH: "0320",
    ROO:  "0321"
  },

  "inf-menor": {
    MIC: "0320"
  }

};

/* ========================= */

const params = new URLSearchParams(window.location.search);
const category = params.get("cat");

const gallery = document.getElementById("gallery");
const tabs = document.getElementById("tabs");
const title = document.getElementById("title");

title.innerText = "GALERÍA " + category.toUpperCase();

/* =========================
   CREATE TABS
========================= */

Object.keys(DATA[category]).forEach((rival,i)=>{

  const tab = document.createElement("button");
  tab.className = "tab" + (i===0 ? " active" : "");

  tab.innerText = rival === "3RD" ? "Premiación" : "vs " + rival;

  tab.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    loadImages(rival);
  };

  tabs.appendChild(tab);
});

/* =========================
   LOAD IMAGES (AUTO BUILD)
========================= */

function loadImages(rival){

  gallery.innerHTML = "";

  const catCode = CATEGORY_MAP[category];
  const date = DATA[category][rival];

  const prefix = `${EVENT}_${catCode}_${TEAM}_${rival}_${date}_`;

  for(let i = 1; i <= 300; i++){

    const num = String(i).padStart(3,'0');
    const url = CLOUD + prefix + num + ".jpg";

    const img = document.createElement("img");
    img.src = url;

    img.onload = ()=>{
      const card = document.createElement("div");
      card.className = "card";
      card.appendChild(img);
      gallery.appendChild(card);
    };

    img.onerror = ()=>{};
  }
}

/* =========================
   INIT
========================= */

const first = Object.keys(DATA[category])[0];
loadImages(first);

</script>

</body>
</html>
