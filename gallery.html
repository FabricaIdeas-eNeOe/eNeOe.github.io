<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-position:center;
}

.header{
  text-align:center;
  padding:80px 20px 30px;
}

.title{
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:18px 60px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);
  border-radius:30px;
}

.filters{
  text-align:center;
  margin:20px;
}

.filters button{
  margin:5px;
  padding:10px 18px;
  border-radius:25px;
  border:none;
  background:#ffffff70;
  cursor:pointer;
}

.filters button.active{
  background:#0a4f73;
  color:white;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.gallery img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:14px;
  cursor:pointer;
}

.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
}

.lightbox.active{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:95%;
  max-height:90%;
}

.close-btn{
  position:absolute;
  top:20px;
  right:20px;
  width:45px;
  height:45px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.footer{
  text-align:center;
  padding:12px;
  background:rgba(255,255,255,0.85);
}

.footer img{
  height:40px;
  margin:0 10px;
}

</style>
</head>

<body>

<div class="header">
  <div id="title" class="title">Gallery</div>
</div>

<div id="filters" class="filters"></div>
<div id="gallery" class="gallery"></div>

<div id="lightbox" class="lightbox">
  <div class="close-btn" onclick="closeLightbox()">✕</div>
  <img id="lightbox-img">
</div>

<div class="footer">
  <img src="logo-aofm.png">
  <img src="logo-club.png">
  <img src="logo-olimpicos.png">
</div>

<script>

const params = new URLSearchParams(window.location.search);
const event = params.get("event");
const category = params.get("cat");

const cloudName="du4pmuch7";

/* SAFE CONFIG */
const CONFIG = {
  cn2026: {
    "inf-menor":{
      title:"Infantil Menor",
      base:"WP%202026/Campeonato%20Nacional%202026/inf-menor-cdmx",
      teams:{
        GRO:{prefix:"CN2026_InfMnr_CDMX_GRO_0319_"},
        GTO:{prefix:"CN2026_InfMnr_CDMX_GTO_0322_"},
        MIC:{prefix:"CN2026_InfMnr_CDMX_MIC_0321_"},
        NLE:{prefix:"CN2026_InfMnr_CDMX_NLE_0320_"}
      }
    },
    "inf-mayor":{
      title:"Infantil Mayor",
      base:"WP%202026/Campeonato%20Nacional%202026/inf-mayor-cdmx",
      teams:{
        GRO:{prefix:"CN2026_InfMyr_CDMX_GRO_0319_"},
        COAH:{prefix:"CN2026_InfMyr_CDMX_COA_0320_"},
        EDOMEX:{prefix:"CN2026_InfMyr_CDMX_EDM_0319_"},
        NL:{prefix:"CN2026_InfMyr_CDMX_NLE_0321_"},
        QROO:{prefix:"CN2026_InfMyr_CDMX_ROO_0322_"}
      }
    },
    "junior":{
      title:"Junior",
      base:"WP%202026/Campeonato%20Nacional%202026/junior-cdmx",
      teams:{
        GTO1:{prefix:"CN2026_JNR_CDMX_GTO_0402_",label:"vs GTO - Game 1"},
        GTO2:{prefix:"CN2026_JNR_CDMX_GTO2_0402_",label:"vs GTO - Game 2"},
        UNAM1:{prefix:"CN2026_JNR_CDMX_UNAM_0403_",label:"vs UNAM - Game 1"},
        UNAM2:{prefix:"CN2026_JNR_CDMX_UNAM2_0403_",label:"vs UNAM - Game 2"},
        PREM:{prefix:"CN2026_JNR_CDMX_3RD_",label:"Premiación"}
      }
    }
  }
};

const config = CONFIG[event]?.[category];

document.getElementById("title").innerText=config.title;

/* FILTERS */
const filtersDiv=document.getElementById("filters");

Object.keys(config.teams).forEach((team,i)=>{
  const btn=document.createElement("button");
  btn.innerText=config.teams[team].label || ("vs "+team);

  if(i===0) btn.classList.add("active");

  btn.onclick=()=>{
    document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    startGallery(team);
  };

  filtersDiv.appendChild(btn);
});

/* LOAD SYSTEM */
let index=1;
let loaded=0;
let currentTeam=null;
const MAX_IMAGES = 600;

function loadMore(){
  if(index > MAX_IMAGES) return;

  for(let i=0;i<30;i++){
    loadOne();
  }
}

function loadOne(){
  const g=document.getElementById("gallery");
  const team=config.teams[currentTeam];

  let n=String(index).padStart(3,"0");

  let thumb=`https://res.cloudinary.com/${cloudName}/image/upload/w_250,q_auto:low/${config.base}/gallery/${team.prefix}${n}.jpg`;
  let full=`https://res.cloudinary.com/${cloudName}/image/upload/q_auto:good/${config.base}/gallery/${team.prefix}${n}.jpg`;

  let img=new Image();

  img.onload=()=>{
    let el=document.createElement("img");
    el.src=thumb;
    el.onclick=()=>openLightbox(full);
    g.appendChild(el);
  };

  img.onerror=()=>{}; // skip silently

  img.src=thumb;

  index++;
}

/* START */
function startGallery(team){
  document.getElementById("gallery").innerHTML="";
  index=1;
  currentTeam=team;
  loadMore();
}

/* SCROLL */
window.addEventListener("scroll",()=>{
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){
    loadMore();
  }
});

/* LIGHTBOX */
function openLightbox(src){
  document.getElementById("lightbox-img").src=src;
  document.getElementById("lightbox").classList.add("active");
}

function closeLightbox(){
  document.getElementById("lightbox").classList.remove("active");
}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
  startGallery(Object.keys(config.teams)[0]);
});

</script>

</body>
</html>
