<script>

/* =========================
   MANIFEST (PUT REAL FILES ONLY)
========================= */

const MANIFEST = {
  junior: {
    GTO: [],
    GTO2: [],
    UNAM: [],
    UNAM2: [],
    "3RD": []
  },
  "inf-mayor": {
    COAH: [],
    ROO: []
  },
  "inf-menor": {
    MIC: []
  }
};

const CLOUD = "https://res.cloudinary.com/du4pmuch7/image/upload/";
const ROOT = "WP%202026/Campeonato%20Nacional%202026/";

const params = new URLSearchParams(window.location.search);
const category = params.get("cat");

const gallery = document.getElementById("gallery");
const tabs = document.getElementById("tabs");
const title = document.getElementById("title");

title.innerText = category.toUpperCase();

/* BUILD TABS */

Object.keys(MANIFEST[category]).forEach((rival,i)=>{

  const tab = document.createElement("div");
  tab.className = "tab" + (i===0 ? " active" : "");

  tab.innerText = rival === "3RD" ? "Premiación" : "vs " + rival;

  tab.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    loadImages(rival);
  };

  tabs.appendChild(tab);
});

/* LOAD */

function loadImages(rival){

  gallery.innerHTML = "";

  const list = MANIFEST[category][rival];

  console.log("Loading:", category, rival, list);

  if(!list || list.length === 0){
    gallery.innerHTML = "<p style='color:#0a4f73'>No images yet</p>";
    return;
  }

  list.forEach(name => {

    const url = CLOUD + ROOT + category + "-cdmx/gallery/" + name + ".jpg";

    console.log("IMG:", url);

    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");

    img.src = url;

    img.onerror = () => {
      console.error("Missing:", url);
      card.remove();
    };

    card.appendChild(img);
    gallery.appendChild(card);
  });
}

/* INIT */

const first = Object.keys(MANIFEST[category])[0];
loadImages(first);

</script>
