<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:url('background.png') no-repeat center center fixed;
  background-size:cover;
}

/* 🔐 HIDDEN HOTSPOTS */
.hotspot{
  position:fixed;
  width:40px;height:40px;
  z-index:9999;
}
#home{top:0;left:0;}
#camp{top:0;right:0;}
#admin{top:0;left:50%;transform:translateX(-50%);}

/* HEADER */
.header{text-align:center;padding:60px 20px 10px;}

.title{
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:20px 70px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);
  border-radius:35px;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:20px;
}
.tab{
  padding:10px 18px;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  cursor:pointer;
}
.tab.active{
  background:#0a4f73;
  color:white;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:16px;
  padding:40px;
}
.gallery img{
  width:100%;
  border-radius:14px;
  cursor:pointer;
}

/* VIEWER */
.viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}
.viewer img{
  max-width:90%;
  max-height:85%;
}
.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

/* FOOTER */
.footer{
  background:rgba(255,255,255,0.85);
  text-align:center;
  padding:12px;
}

</style>
</head>

<body>

<!-- 🔐 HIDDEN NAV -->
<div id="home" class="hotspot" onclick="location.href='index.html'"></div>
<div id="camp" class="hotspot" onclick="location.href='campeonato2026.html'"></div>
<div id="admin" class="hotspot" onclick="location.href='admin.html'"></div>

<div class="header">
  <div class="title" id="title"></div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
  <div class="close" onclick="closeViewer()">✕</div>
  <img id="viewerImg">
</div>

<div class="footer">
  <img src="logo1.png" height="40">
  <img src="logo2.png" height="40">
  <img src="logo3.png" height="40">
</div>

<script>

const CLOUD = "https://res.cloudinary.com/du4pmuch7/image/upload/Leonardo/gallery/";

const params = new URLSearchParams(window.location.search);
const cat = params.get("cat");

const gallery = document.getElementById("gallery");
const tabsDiv = document.getElementById("tabs");

function tab(name, prefix){
  let t=document.createElement("div");
  t.className="tab";
  t.innerText=name;

  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    load(prefix);
  };

  tabsDiv.appendChild(t);
  return t;
}

function load(prefix){
  gallery.innerHTML="";
  let i=1,fail=0;

  function loop(){
    let num=String(i).padStart(3,'0');

    let img=new Image();
    img.src=`${CLOUD}q_auto,f_auto,w_400/${prefix}_${num}.jpg`;

    img.onload=()=>{
      fail=0;
      img.onclick=()=>open(`${CLOUD}${prefix}_${num}.jpg`);
      gallery.appendChild(img);
    };

    img.onerror=()=>fail++;

    i++;

    if(fail<12){
      requestAnimationFrame(loop);
    }
  }

  loop();
}

function open(src){
  viewer.style.display="flex";
  viewerImg.src=src;
}
function closeViewer(){
  viewer.style.display="none";
}

/* ⚡ AUTO CONFIG */

if(cat==="junior"){
  title.innerText="Junior";

  tab("vs GTO - Game 1","CN2026_Junr_CDMX_GTO_0402").classList.add("active");
  tab("vs GTO - Game 2","CN2026_Junr_CDMX2_GTO_0402");
  tab("vs UNAM - Game 1","CN2026_Junr_CDMX_UNAM_0404");
  tab("vs UNAM - Game 2","CN2026_Junr_CDMX_UNAM2_0404");
  tab("Premiación","CN2026_Junr_CDMX_3RD_0404");

  load("CN2026_Junr_CDMX_GTO_0402");
}

if(cat==="inf-mayor"){
  title.innerText="Infantil Mayor";

  tab("vs AGS","CN2026_INF_MAYOR_AGS").classList.add("active");
  tab("vs COAH","CN2026_INF_MAYOR_COAH");
  tab("vs EDOMEX","CN2026_INF_MAYOR_EDOMEX");
  tab("vs GRO","CN2026_INF_MAYOR_GRO");
  tab("vs NL","CN2026_INF_MAYOR_NL");
  tab("vs QROO","CN2026_INF_MAYOR_QROO");

  load("CN2026_INF_MAYOR_AGS");
}

if(cat==="inf-menor"){
  title.innerText="Infantil Menor";

  tab("vs GRO","CN2026_INF_MENOR_GRO").classList.add("active");
  tab("vs GTO","CN2026_INF_MENOR_GTO");
  tab("vs MIC","CN2026_INF_MENOR_MIC");
  tab("vs NL","CN2026_INF_MENOR_NL");

  load("CN2026_INF_MENOR_GRO");
}

</script>

</body>
</html>
