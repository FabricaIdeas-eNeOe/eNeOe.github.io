<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:url('background.png') no-repeat center center fixed;
  background-size:cover;
}

/* HEADER */
.header{
  text-align:center;
  padding:60px 20px 20px;
}

.title{
  display:inline-block;
  font-size:40px;
  font-weight:800;
  color:#0a4f73;
  padding:18px 60px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);
  border-radius:35px;
  border:1px solid rgba(255,255,255,0.6);
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin-top:20px;
}

.tab{
  padding:10px 18px;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  color:#0a4f73;
  cursor:pointer;
  transition:0.25s;
  font-size:14px;
}

.tab.active{
  background:#0a4f73;
  color:white;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:18px;
  padding:40px;
}

.gallery img{
  width:100%;
  border-radius:15px;
  cursor:pointer;
  transition:0.2s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* VIEWER */
.viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.viewer img{
  max-width:90%;
  max-height:85%;
  border-radius:10px;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

/* FOOTER */
.footer{
  background:rgba(255,255,255,0.8);
  padding:15px;
  text-align:center;
}

.footer img{
  height:40px;
  margin:0 10px;
}

</style>
</head>

<body>

<div class="header">
  <div class="title" id="title">Gallery</div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
  <div class="close" onclick="closeViewer()">✕</div>
  <img id="viewerImg">
</div>

<div class="footer">
  <img src="logo1.png">
  <img src="logo2.png">
  <img src="logo3.png">
</div>

<script>

const params = new URLSearchParams(window.location.search);
const cat = params.get("cat");

const gallery = document.getElementById("gallery");
const tabsContainer = document.getElementById("tabs");

const cloud = "https://res.cloudinary.com/YOUR_CLOUD/image/upload/";

function createTabs(tabs){
  tabsContainer.innerHTML="";
  tabs.forEach((t,i)=>{
    let el = document.createElement("div");
    el.className="tab"+(i===0?" active":"");
    el.innerText=t.name;
    el.onclick=()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      el.classList.add("active");
      loadGallery(t);
    };
    tabsContainer.appendChild(el);
  });
}

function loadGallery(config){

  gallery.innerHTML="";

  let i = 1;
  let fails = 0;

  function loadNext(){

    if(fails > 5) return;

    let img = new Image();

    let thumb = `${cloud}q_auto,f_auto,w_400/${config.prefix}_${String(i).padStart(3,'0')}.jpg`;

    img.src = thumb;

    img.onload = ()=>{
      fails = 0;

      img.onclick = ()=>{
        openViewer(`${cloud}q_auto,f_auto/${config.prefix}_${String(i).padStart(3,'0')}.jpg`);
      };

      gallery.appendChild(img);

      i++;
      loadNext();
    };

    img.onerror = ()=>{
      fails++;
      i++;
      loadNext();
    };
  }

  loadNext();
}

function openViewer(src){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src=src;
}

function closeViewer(){
  document.getElementById("viewer").style.display="none";
}

/* CONFIG PER CATEGORY */

if(cat==="junior"){

  document.getElementById("title").innerText="Junior";

  createTabs([
    {name:"vs GTO - Game 1", prefix:"CN2026_JNR_CDMX_GTO_0402"},
    {name:"vs GTO - Game 2", prefix:"CN2026_JNR_CDMX2_GTO_0402"},
    {name:"vs UNAM - Game 1", prefix:"CN2026_JNR_CDMX_UNAM_0403"},
    {name:"vs UNAM - Game 2", prefix:"CN2026_JNR_CDMX2_UNAM_0403"},
    {name:"Premiación", prefix:"CN2026_JNR_CDMX_3RD_0404"}
  ]);

}

if(cat==="inf-mayor"){

  document.getElementById("title").innerText="Infantil Mayor";

  createTabs([
    {name:"vs AGS", prefix:"CN2026_INF_MAYOR_AGS"},
    {name:"vs COAH", prefix:"CN2026_INF_MAYOR_COAH"},
    {name:"vs EDOMEX", prefix:"CN2026_INF_MAYOR_EDOMEX"},
    {name:"vs GRO", prefix:"CN2026_INF_MAYOR_GRO"},
    {name:"vs NL", prefix:"CN2026_INF_MAYOR_NL"},
    {name:"vs QROO", prefix:"CN2026_INF_MAYOR_QROO"}
  ]);

}

if(cat==="inf-menor"){

  document.getElementById("title").innerText="Infantil Menor";

  createTabs([
    {name:"vs GRO", prefix:"CN2026_INF_MENOR_GRO"},
    {name:"vs GTO", prefix:"CN2026_INF_MENOR_GTO"},
    {name:"vs MIC", prefix:"CN2026_INF_MENOR_MIC"},
    {name:"vs NL", prefix:"CN2026_INF_MENOR_NL"}
  ]);

}

/* LOAD FIRST TAB */
setTimeout(()=>{
  document.querySelector(".tab").click();
},100);

</script>

</body>
</html>
