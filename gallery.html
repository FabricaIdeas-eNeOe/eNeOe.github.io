<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:url('background.png') no-repeat center center fixed;
  background-size:cover;
}

.hotspot{position:fixed;width:40px;height:40px;z-index:9999;}
#home{top:0;left:0;}
#camp{top:0;right:0;}
#admin{top:0;left:50%;transform:translateX(-50%);}

.header{text-align:center;padding:60px 20px 10px;}

.title{
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:20px 70px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);
  border-radius:35px;
}

.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:20px;
}

.tab{
  padding:10px 18px;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  cursor:pointer;
}

.tab.active{
  background:#0a4f73;
  color:white;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:16px;
  padding:40px;
}

.gallery img{
  width:100%;
  border-radius:14px;
  cursor:pointer;
}

.viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.viewer img{
  max-width:90%;
  max-height:85%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

.footer{
  background:rgba(255,255,255,0.85);
  text-align:center;
  padding:12px;
}
</style>
</head>

<body>

<div id="home" class="hotspot" onclick="location.href='index.html'"></div>
<div id="camp" class="hotspot" onclick="location.href='campeonato2026.html'"></div>
<div id="admin" class="hotspot" onclick="location.href='admin.html'"></div>

<div class="header">
  <div class="title" id="title"></div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
  <div class="close" onclick="closeViewer()">✕</div>
  <img id="viewerImg">
</div>

<div class="footer">
  <img src="logo1.png" height="40">
  <img src="logo2.png" height="40">
  <img src="logo3.png" height="40">
</div>

<script>

const BASE = "https://res.cloudinary.com/du4pmuch7/image/upload/";
const FOLDER = "WP%202026/Campeonato%20Nacional%202026/";

const params = new URLSearchParams(window.location.search);
const cat = params.get("cat");

const gallery = document.getElementById("gallery");
const tabsDiv = document.getElementById("tabs");
const title = document.getElementById("title");

/* CATEGORY CONFIG */
let config = {
  "junior":{
    code:"Junr",
    folder:"junior-cdmx/gallery",
    tabs:["GTO","UNAM","3RD"]
  },
  "inf-mayor":{
    code:"InfMyr",
    folder:"inf-mayor-cdmx/gallery",
    tabs:["AGS","COAH","EDOMEX","GRO","NL","ROO"]
  },
  "inf-menor":{
    code:"InfMnr",
    folder:"inf-menor-cdmx/gallery",
    tabs:["GRO","GTO","MIC","NL"]
  }
};

let current = config[cat];
title.innerText = cat.replace("-", " ").toUpperCase();

/* LOAD IMAGES SMART */
function load(rival){
  gallery.innerHTML="";
  let i=1, fails=0;

  function loop(){

    let num = String(i).padStart(3,'0');

    let url = `${BASE}${FOLDER}${current.folder}/q_auto,f_auto,w_400/CN2026_${current.code}_CDMX_${rival}_${num}.jpg`;

    let img = new Image();
    img.src = url;

    img.onload = ()=>{
      fails=0;
      img.onclick=()=>open(url.replace("w_400/",""));
      gallery.appendChild(img);
    };

    img.onerror = ()=>fails++;

    i++;

    if(fails < 20){
      requestAnimationFrame(loop);
    }
  }

  loop();
}

/* CREATE TABS */
current.tabs.forEach((r,i)=>{
  let t=document.createElement("div");
  t.className="tab";
  if(i===0) t.classList.add("active");

  t.innerText = r==="3RD" ? "Premiación" : "vs "+r;

  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    load(r);
  };

  tabsDiv.appendChild(t);
});

/* INIT */
load(current.tabs[0]);

/* VIEWER */
function open(src){
  viewer.style.display="flex";
  viewerImg.src=src;
}

function closeViewer(){
  viewer.style.display="none";
}

</script>

</body>
</html>
