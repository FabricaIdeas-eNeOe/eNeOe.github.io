<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:url('background.png') no-repeat center center fixed;
  background-size:cover;
}

/* HIDDEN ADMIN HOTSPOTS */
.hotspot{
  position:fixed;
  width:40px;
  height:40px;
  z-index:9999;
}

#homeBtn{top:0;left:0;}
#campBtn{top:0;right:0;}
#adminBtn{top:0;left:50%;transform:translateX(-50%);}

/* HEADER */
.header{
  text-align:center;
  padding:60px 20px 20px;
}

.title{
  display:inline-block;
  font-size:40px;
  font-weight:800;
  color:#0a4f73;
  padding:18px 60px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);
  border-radius:35px;
  border:1px solid rgba(255,255,255,0.6);
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin-top:20px;
}

.tab{
  padding:10px 18px;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  color:#0a4f73;
  cursor:pointer;
}

.tab.active{
  background:#0a4f73;
  color:white;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:18px;
  padding:40px;
}

.gallery img{
  width:100%;
  border-radius:15px;
  cursor:pointer;
}

/* VIEWER */
.viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.viewer img{
  max-width:90%;
  max-height:85%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

.footer{
  background:rgba(255,255,255,0.8);
  padding:15px;
  text-align:center;
}

</style>
</head>

<body>

<div id="homeBtn" class="hotspot" onclick="location.href='index.html'"></div>
<div id="campBtn" class="hotspot" onclick="location.href='campeonato2026.html'"></div>
<div id="adminBtn" class="hotspot" onclick="location.href='admin.html'"></div>

<div class="header">
  <div class="title" id="title"></div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
  <div class="close" onclick="closeViewer()">✕</div>
  <img id="viewerImg">
</div>

<div class="footer">
  <img src="logo1.png" height="40">
  <img src="logo2.png" height="40">
  <img src="logo3.png" height="40">
</div>

<script>

const cloud = "https://res.cloudinary.com/YOUR_CLOUD/image/upload/Leonardo/gallery/";

const params = new URLSearchParams(window.location.search);
const cat = params.get("cat");

const gallery = document.getElementById("gallery");
const tabsContainer = document.getElementById("tabs");

function createTabs(tabs){
  tabsContainer.innerHTML="";
  tabs.forEach((t,i)=>{
    let el=document.createElement("div");
    el.className="tab"+(i===0?" active":"");
    el.innerText=t.name;
    el.onclick=()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      el.classList.add("active");
      loadGallery(t.prefix);
    };
    tabsContainer.appendChild(el);
  });
}

function loadGallery(prefix){

  gallery.innerHTML="";

  let index=1;
  let batch=20;
  let failCount=0;

  function loadBatch(){

    for(let j=0;j<batch;j++){

      let num=String(index).padStart(3,'0');

      let img=new Image();
      img.src=`${cloud}q_auto,f_auto,w_400/${prefix}_${num}.jpg`;

      img.onload=()=>{
        failCount=0;

        img.onclick=()=>{
          openViewer(`${cloud}q_auto,f_auto/${prefix}_${num}.jpg`);
        };

        gallery.appendChild(img);
      };

      img.onerror=()=>{
        failCount++;
      };

      index++;
    }

    if(failCount<batch){
      setTimeout(loadBatch,200);
    }
  }

  loadBatch();
}

function openViewer(src){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src=src;
}

function closeViewer(){
  document.getElementById("viewer").style.display="none";
}

/* CONFIG */

if(cat==="junior"){
  document.getElementById("title").innerText="Junior";

  createTabs([
    {name:"vs GTO - Game 1", prefix:"CN2026_Junr_CDMX_GTO_0402"},
    {name:"vs GTO - Game 2", prefix:"CN2026_Junr_CDMX2_GTO_0402"},
    {name:"vs UNAM - Game 1", prefix:"CN2026_Junr_CDMX_UNAM_0404"},
    {name:"vs UNAM - Game 2", prefix:"CN2026_Junr_CDMX_UNAM2_0404"},
    {name:"Premiación", prefix:"CN2026_Junr_CDMX_3RD_0404"}
  ]);
}

if(cat==="inf-mayor"){
  document.getElementById("title").innerText="Infantil Mayor";

  createTabs([
    {name:"vs AGS", prefix:"CN2026_INF_MAYOR_AGS"},
    {name:"vs COAH", prefix:"CN2026_INF_MAYOR_COAH"},
    {name:"vs EDOMEX", prefix:"CN2026_INF_MAYOR_EDOMEX"},
    {name:"vs GRO", prefix:"CN2026_INF_MAYOR_GRO"},
    {name:"vs NL", prefix:"CN2026_INF_MAYOR_NL"},
    {name:"vs QROO", prefix:"CN2026_INF_MAYOR_QROO"}
  ]);
}

if(cat==="inf-menor"){
  document.getElementById("title").innerText="Infantil Menor";

  createTabs([
    {name:"vs GRO", prefix:"CN2026_INF_MENOR_GRO"},
    {name:"vs GTO", prefix:"CN2026_INF_MENOR_GTO"},
    {name:"vs MIC", prefix:"CN2026_INF_MENOR_MIC"},
    {name:"vs NL", prefix:"CN2026_INF_MENOR_NL"}
  ]);
}

/* INIT */
setTimeout(()=>{
  document.querySelector(".tab").click();
},100);

</script>

</body>
</html>
