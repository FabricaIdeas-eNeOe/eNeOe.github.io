<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* BASE */
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  overflow-x:hidden;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-position:center;
}

/* BACK */
.back{
  position:fixed;
  top:20px;
  left:20px;
  color:#0a4f73;
  text-decoration:none;
  font-weight:600;
  z-index:10;
}

/* HEADER */
.header{
  text-align:center;
  padding:80px 20px 30px;
}

/* TITLE */
.title{
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:18px 60px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);

  border-radius:30px;
  border:1px solid rgba(255,255,255,0.6);

  position:relative;
  overflow:hidden;
}

.title::before{
  content:"";
  position:absolute;
  inset:0;

  background:linear-gradient(
    120deg,
    transparent 30%,
    rgba(255,255,255,0.6) 50%,
    transparent 70%
  );

  animation:wave 3s infinite linear;
}

@keyframes wave{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

/* FILTERS */
.filters{
  text-align:center;
  margin:25px 0;
}

.filters button{
  margin:6px;
  padding:10px 18px;
  border-radius:25px;

  border:1px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(12px);

  color:#0a4f73;
  font-weight:600;
  cursor:pointer;

  box-shadow:
    inset 0 1px 3px rgba(255,255,255,0.6),
    0 4px 10px rgba(0,0,0,0.1);

  transition:0.3s;
}

.filters button:hover{
  transform:translateY(-2px);
}

.filters button.active{
  background:#0a4f73;
  color:white;
  box-shadow:0 6px 16px rgba(0,0,0,0.25);
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px;
  padding:30px 30px 80px;
}

.gallery img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:14px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.gallery img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(10px);

  display:flex;
  align-items:center;
  justify-content:center;

  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.lightbox.active{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:90%;
  max-height:85%;
  border-radius:10px;
}

</style>
</head>

<body>

<a href="index.html" class="back">← Back</a>

<div class="header">
  <div id="title" class="title">Gallery</div>
</div>

<div id="filters" class="filters"></div>
<div id="gallery" class="gallery"></div>

<div id="lightbox" class="lightbox">
  <img id="lightbox-img">
</div>

<script>

/* URL PARAMS */
const params = new URLSearchParams(window.location.search);
const event = params.get("event");
const category = params.get("cat");

const cloudName="du4pmuch7";

/* CONFIG */
const CONFIG = {

  cn2026: {

    "inf-menor": {
      title:"Infantil Menor",
      base:"WP%202026/Campeonato%20Nacional%202026/inf-menor-cdmx",
      teams:{
        GRO:{prefix:"CN2026_InfMnr_CDMX_GRO_0319_",count:85},
        GTO:{prefix:"CN2026_InfMnr_CDMX_GTO_0322_",count:79},
        MIC:{prefix:"CN2026_InfMnr_CDMX_MIC_0321_",count:43},
        NLE:{prefix:"CN2026_InfMnr_CDMX_NLE_0320_",count:68}
      }
    },

    "inf-mayor": {
      title:"Infantil Mayor",
      base:"WP%202026/Campeonato%20Nacional%202026/inf-mayor-cdmx",
      teams:{
        AGS:{prefix:"CN2026_InfMyr_CDMX_AGS_0320_",count:50},
        COAH:{prefix:"CN2026_InfMyr_CDMX_COA_0320_",count:51},
        EDOMEX:{prefix:"CN2026_InfMyr_CDMX_EDM_0319_",count:44},
        GRO:{prefix:"CN2026_InfMyr_CDMX_GRO_0319_",count:113},
        NL:{prefix:"CN2026_InfMyr_CDMX_NLE_0321_",count:107},
        QROO:{prefix:"CN2026_InfMyr_CDMX_ROO_0322_",count:60}
      }
    },

    "junior": {
      title:"Junior",
      base:"WP%202026/Campeonato%20Nacional%202026/junior-cdmx",
      teams:{
        /* 🔜 YOU WILL FILL THIS */
      }
    }

  }

};

const config = CONFIG[event]?.[category];

if(!config){
  document.getElementById("title").innerText="Gallery not found";
}

/* TITLE */
document.getElementById("title").innerText=config.title;

/* FILTERS */
const filtersDiv=document.getElementById("filters");

Object.keys(config.teams).forEach((team,i)=>{
  const btn=document.createElement("button");
  btn.innerText="vs "+team;

  if(i===0) btn.classList.add("active");

  btn.onclick=()=>{
    document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    loadTeam(team);
  };

  filtersDiv.appendChild(btn);
});

/* GENERATE IMAGES */
function generateImages(team){
  const c=config.teams[team];
  let arr=[];

  for(let i=1;i<=c.count;i++){
    let n=String(i).padStart(3,"0");

    arr.push({
      thumb:`https://res.cloudinary.com/${cloudName}/image/upload/w_300,q_auto:low,f_auto/${config.base}/gallery/${c.prefix}${n}.jpg`,
      lightbox:`https://res.cloudinary.com/${cloudName}/image/upload/w_1200,q_auto:good,f_auto/${config.base}/gallery/${c.prefix}${n}.jpg`
    });
  }

  return arr;
}

/* LOADING SYSTEM */
let currentImages=[];
let loaded=0;
let batchSize=30;

function loadMore(){
  const g=document.getElementById("gallery");
  const next=currentImages.slice(loaded,loaded+batchSize);

  next.forEach((img)=>{
    let el=document.createElement("img");
    el.src=img.thumb;
    el.loading="lazy";

    const index=loaded;
    el.onclick=()=>openLightbox(index);

    g.appendChild(el);
    loaded++;
  });
}

function ensureFill(){
  while(document.body.offsetHeight < window.innerHeight && loaded < currentImages.length){
    loadMore();
  }
}

function loadTeam(team){
  document.getElementById("gallery").innerHTML="";
  currentImages=generateImages(team);
  loaded=0;
  loadMore();
  ensureFill();
}

window.addEventListener("scroll",()=>{
  if((window.innerHeight+window.scrollY)>=document.body.offsetHeight-300){
    if(loaded<currentImages.length){
      loadMore();
    }
  }
});

/* LIGHTBOX */
function openLightbox(i){
  document.getElementById("lightbox-img").src=currentImages[i].lightbox;
  document.getElementById("lightbox").classList.add("active");
}

document.addEventListener("DOMContentLoaded",()=>{
  const firstTeam = Object.keys(config.teams)[0];
  loadTeam(firstTeam);
});

</script>

</body>
</html>
