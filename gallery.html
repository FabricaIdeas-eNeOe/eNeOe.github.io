<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-attachment:fixed;
}

/* TITLE */
.header{text-align:center;padding:60px 20px 20px;}
.title{
  display:inline-block;
  font-size:32px;
  font-weight:800;
  color:#0a4f73;
  padding:14px 40px;
  background:rgba(255,255,255,0.25);
  border-radius:25px;
  animation:float 6s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

/* FILTERS */
.filters{text-align:center;margin-bottom:10px;}
.filters button{
  margin:5px;
  padding:8px 18px;
  border-radius:20px;
  border:none;
  background:#ffffff60;
  color:#0a4f73;
  font-weight:600;
}
.filters button.active{
  background:#0a4f73;
  color:white;
}

/* MATCH */
.match{margin:30px 20px;}

/* COVER */
.cover{
  height:200px;
  border-radius:16px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  overflow:hidden;
  position:relative;
}
.cover::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
}
.cover span{
  position:relative;
  margin:10px;
  padding:8px 16px;
  border-radius:20px;
  background:rgba(255,255,255,0.3);
  color:white;
  font-weight:600;
}

/* GRID */
.grid{
  margin-top:10px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
}
.grid img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s;
}
.lightbox.active{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:95%;
  max-height:85%;
  border-radius:10px;
  transform-origin:center;
  transition:transform .2s ease;
}

/* DOWNLOAD BUTTON */
.download{
  position:absolute;
  top:20px;
  right:20px;
  background:rgba(255,255,255,0.2);
  padding:8px 12px;
  border-radius:12px;
  color:white;
  font-size:14px;
  cursor:pointer;
  backdrop-filter:blur(5px);
}

/* LOCK SCROLL */
body.lightbox-open{overflow:hidden;}

</style>
</head>

<body>

<div class="header">
  <div id="title" class="title"></div>
</div>

<div id="filters" class="filters"></div>
<div id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <div class="download" id="downloadBtn">Download</div>
  <img id="lightbox-img">
</div>

<script>

const cloud="du4pmuch7";
const params=new URLSearchParams(window.location.search);
const category=params.get("cat");

if(!category){
  document.body.innerHTML="";
  throw new Error("Blocked");
}

document.getElementById("title").innerText=category.toUpperCase();

const API=`https://wp-aofm-cdmx.vercel.app/api/images?folder=WP2026/CN2026/${category}/gallery`;

let ALL=[];
let currentRival="";
let matches=[];
let currentImages=[];
let currentIndex=0;

async function load(){
  const res=await fetch(API);
  ALL=await res.json();
  buildFilters();
}

function buildFilters(){
  const rivals=[...new Set(ALL.map(i=>i.split("_")[3]))];
  const f=document.getElementById("filters");

  rivals.forEach((r,i)=>{
    const btn=document.createElement("button");
    btn.innerText=r;
    if(i===0){btn.classList.add("active");currentRival=r;}
    btn.onclick=()=>{document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");currentRival=r;prepareMatches();}
    f.appendChild(btn);
  });

  prepareMatches();
}

function prepareMatches(){
  const filtered=ALL.filter(img=>img.includes(`_${currentRival}_`));
  const groups={};

  filtered.forEach(img=>{
    const date=img.split("_")[4];
    if(!groups[date]) groups[date]=[];
    groups[date].push(img);
  });

  matches=Object.keys(groups).sort().map(date=>({date,images:groups[date]}));

  const container=document.getElementById("gallery");
  container.innerHTML="";

  matches.forEach(match=>{
    const section=document.createElement("div");
    section.className="match";

    const cover=document.createElement("div");
    cover.className="cover";
    cover.style.backgroundImage=`url(https://res.cloudinary.com/${cloud}/image/upload/w_800/${match.images[0]}.jpg)`;
    cover.innerHTML=`<span>${currentRival} · ${match.date}</span>`;

    const grid=document.createElement("div");
    grid.className="grid";

    match.images.forEach((id,i)=>{
      const img=new Image();
      img.src=`https://res.cloudinary.com/${cloud}/image/upload/w_400/${id}.jpg`;
      img.onclick=()=>openLightbox(match.images,i);
      grid.appendChild(img);
    });

    section.appendChild(cover);
    section.appendChild(grid);
    container.appendChild(section);
  });
}

/* LIGHTBOX */

const lightbox=document.getElementById("lightbox");
const imgEl=document.getElementById("lightbox-img");
const downloadBtn=document.getElementById("downloadBtn");

let scale=1;
let posX=0,posY=0;
let lastTap=0;

function openLightbox(images,index){
  currentImages=images;
  currentIndex=index;
  resetZoom();
  showImage();
  lightbox.classList.add("active");
  document.body.classList.add("lightbox-open");
}

function closeLightbox(){
  lightbox.classList.remove("active");
  document.body.classList.remove("lightbox-open");
}

function showImage(){
  const id=currentImages[currentIndex];
  const url=`https://res.cloudinary.com/${cloud}/image/upload/${id}.jpg`;
  imgEl.src=url;

  downloadBtn.onclick=()=>window.open(url);

  // preload next
  const next=new Image();
  next.src=`https://res.cloudinary.com/${cloud}/image/upload/${currentImages[(currentIndex+1)%currentImages.length]}.jpg`;
}

/* SWIPE */
let startX=0;
lightbox.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
lightbox.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(scale===1){
    if(endX<startX-50) next();
    if(endX>startX+50) prev();
  }
});

function next(){currentIndex=(currentIndex+1)%currentImages.length;resetZoom();showImage();}
function prev(){currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;resetZoom();showImage();}

/* DOUBLE TAP ZOOM */
lightbox.addEventListener("touchend",(e)=>{
  let now=Date.now();
  if(now-lastTap<300){
    scale=scale===1?2:1;
    applyTransform();
  }
  lastTap=now;
});

/* PINCH ZOOM */
lightbox.addEventListener("touchmove",(e)=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    scale=Math.min(4,Math.max(1,Math.sqrt(dx*dx+dy*dy)/200));
    applyTransform();
  }
});

/* DRAG */
lightbox.addEventListener("touchmove",(e)=>{
  if(scale>1 && e.touches.length===1){
    posX+=e.touches[0].movementX||0;
    posY+=e.touches[0].movementY||0;
    applyTransform();
  }
});

/* APPLY */
function applyTransform(){
  imgEl.style.transform=`scale(${scale}) translate(${posX}px,${posY}px)`;
}

function resetZoom(){
  scale=1;
  posX=0;
  posY=0;
  applyTransform();
}

/* CLOSE */
lightbox.onclick=(e)=>{
  if(e.target===lightbox) closeLightbox();
};

window.onload=load;

</script>

</body>
</html>
