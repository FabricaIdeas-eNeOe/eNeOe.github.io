<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
}

h1 {
    margin: 40px 0 10px;
    font-size: 36px;
}

.tabs {
    margin-bottom: 30px;
}

.tab {
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    margin: 5px;
    cursor: pointer;
    background: #ddd;
}

.tab.active {
    background: #1f5c63;
    color: white;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
    padding: 0 40px 40px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    object-fit: cover;
}
</style>
</head>

<body>

<h1 id="title">GALERÍA</h1>

<div class="tabs" id="tabs"></div>

<div class="gallery" id="gallery"></div>

<script>
const cloudName = "du4pmuch7";
const basePath = "WP2026/Campeonato-Nacional-2026";

// CATEGORY MAP
const CATEGORY_MAP = {
  "junior": "JNR",
  "inf-mayor": "InfMyr",
  "inf-menor": "InfMnr",
  "kids": "Kids"
};

// TEAMS PER CATEGORY (edit if needed)
const TEAMS = {
  "junior": ["GTO", "3RD"],
  "inf-mayor": ["ROO", "COAH"],
  "inf-menor": ["GTO", "MIC"],
  "kids": ["FUN"]
};

// DATES PER MATCH (IMPORTANT)
const DATES = {
  "GTO": "0402",
  "3RD": "0405",
  "ROO": "0322",
  "COAH": "0321",
  "MIC": "0321",
  "FUN": "0320"
};

// GET URL PARAMS
const params = new URLSearchParams(window.location.search);
const category = params.get("cat") || "junior";

// SET TITLE
document.getElementById("title").innerText =
  "GALERÍA " + category.toUpperCase();

// CREATE TABS
const tabsContainer = document.getElementById("tabs");

TEAMS[category].forEach((team, index) => {
  const btn = document.createElement("button");
  btn.className = "tab" + (index === 0 ? " active" : "");
  btn.innerText = "vs " + team;

  btn.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    loadGallery(team);
  };

  tabsContainer.appendChild(btn);
});

// LOAD IMAGES AUTOMATICALLY
function loadGallery(team) {

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  const categoryCode = CATEGORY_MAP[category];
  const date = DATES[team];

  let index = 1;
  let fails = 0;

  function loadNext() {

    if (fails > 5) return; // stop after 5 missing images

    const num = String(index).padStart(3, "0");

    const url = `https://res.cloudinary.com/${cloudName}/image/upload/${basePath}/${category}-cdmx/gallery/CN2026_${categoryCode}_CDMX_${team}_${date}_${num}.jpg`;

    const img = new Image();

    img.onload = () => {
      gallery.appendChild(img);
      index++;
      loadNext();
    };

    img.onerror = () => {
      fails++;
      index++;
      loadNext();
    };

    img.src = url;
  }

  loadNext();
}

// INITIAL LOAD
loadGallery(TEAMS[category][0]);
</script>

</body>
</html>
