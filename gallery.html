<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-position:center;
}

/* HEADER */
.header{
  text-align:center;
  padding:80px 20px 20px;
}

.title{
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
}

/* FILTERS */
.filters{
  text-align:center;
  margin:20px 0;
}

.filters button{
  margin:5px;
  padding:10px 18px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.filters button.active{
  background:#0a4f73;
  color:white;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:30px;
}

.gallery img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
}

.lightbox.active{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:15px;
}

.footer img{
  height:40px;
  margin:0 10px;
}

</style>
</head>

<body>

<div class="header">
  <div id="title" class="title"></div>
</div>

<div id="filters" class="filters"></div>
<div id="gallery" class="gallery"></div>

<div id="lightbox" class="lightbox">
  <img id="lightbox-img">
</div>

<div class="footer">
  <img src="logo-aofm.png">
  <img src="logo-club.png">
  <img src="logo-olimpicos.png">
</div>

<script>

/* PARAMS */
const params = new URLSearchParams(window.location.search);
const event = params.get("event");
const cat = params.get("cat");

const cloud = "du4pmuch7";

/* CONFIG */
const CONFIG = {

  cn2026: {

    "inf-menor": {
      title:"INF MENOR",
      base:"WP%202026/Campeonato%20Nacional%202026/inf-menor-cdmx/gallery",
      teams:{
        GTO:"CN2026_InfMen_CDMX_GTO_",
        GTO2:"CN2026_InfMen_CDMX_GTO2_",
        UNAM:"CN2026_InfMen_CDMX_UNAM_",
        UNAM2:"CN2026_InfMen_CDMX_UNAM2_"
      }
    },

    "inf-mayor": {
      title:"INF MAYOR",
      base:"WP%202026/Campeonato%20Nacional%202026/inf-mayor-cdmx/gallery",
      teams:{
        GTO:"CN2026_InfMay_CDMX_GTO_",
        GTO2:"CN2026_InfMay_CDMX_GTO2_",
        UNAM:"CN2026_InfMay_CDMX_UNAM_",
        UNAM2:"CN2026_InfMay_CDMX_UNAM2_"
      }
    },

    "junior": {
      title:"GALERÍA JUNIOR",
      base:"WP%202026/Campeonato%20Nacional%202026/junior-cdmx/gallery",
      teams:{
        GTO:"CN2026_JNR_CDMX_GTO_",
        GTO2:"CN2026_JNR_CDMX_GTO2_",
        UNAM:"CN2026_JNR_CDMX_UNAM_",
        UNAM2:"CN2026_JNR_CDMX_UNAM2_"
      }
    }

  }

};

const config = CONFIG[event][cat];

document.getElementById("title").innerText = config.title;

/* FILTERS */
const filtersDiv=document.getElementById("filters");

Object.keys(config.teams).forEach((team,i)=>{
  let btn=document.createElement("button");
  btn.innerText="vs "+team;
  if(i===0) btn.classList.add("active");

  btn.onclick=()=>{
    document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    load(team);
  };

  filtersDiv.appendChild(btn);
});

/* LOAD IMAGES */
function load(team){

  const g=document.getElementById("gallery");
  g.innerHTML="";

  for(let i=1;i<=120;i++){

    let num=String(i).padStart(3,"0");

    let url=`https://res.cloudinary.com/${cloud}/image/upload/w_400,q_auto,f_auto/${config.base}/${config.teams[team]}${num}.jpg`;

    let img=document.createElement("img");
    img.src=url;

    img.onclick=()=>{
      document.getElementById("lightbox-img").src=url;
      document.getElementById("lightbox").classList.add("active");
    };

    g.appendChild(img);
  }
}

/* INIT */
const first=Object.keys(config.teams)[0];
load(first);

document.getElementById("lightbox").onclick=()=>{
  document.getElementById("lightbox").classList.remove("active");
};

</script>

</body>
</html>
