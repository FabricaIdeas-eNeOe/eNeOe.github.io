<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: url('background.jpg') no-repeat center/cover;
}

/* TITLE */
.title {
  text-align:center;
  margin-top:40px;
  font-size:40px;
  font-weight:bold;
  color:#1f3b4d;
}

/* TABS */
.tabs {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px 0;
}

.tab {
  padding:10px 20px;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  cursor:pointer;
  transition:0.3s;
}

.tab.active {
  background:#1f5b6b;
  color:white;
}

/* GALLERY */
.gallery {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.img-box {
  width:100%;
  aspect-ratio: 4/3;
  overflow:hidden;
  border-radius:15px;
}

.img-box img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
</style>
</head>

<body>

<div class="title">JUNIOR</div>

<div class="tabs">
  <div class="tab active" onclick="loadGallery('gto')">vs GTO</div>
  <div class="tab" onclick="loadGallery('gto2')">vs GTO2</div>
  <div class="tab" onclick="loadGallery('unam')">vs UNAM</div>
  <div class="tab" onclick="loadGallery('unam2')">vs UNAM2</div>
</div>

<div class="gallery" id="gallery"></div>

<script>

const BASE =
"https://res.cloudinary.com/du4pmuch7/image/upload/WP2026/Campeonato-Nacional-2026/junior-cdmx/gallery/";

function loadGallery(team){

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  // 🔥 TEMP: load first 80 images (adjust later)
  for(let i=1;i<=80;i++){

    let num = String(i).padStart(3,'0');

    let url = BASE + "CN2026_Junr_CDMX_" + team.toUpperCase() + "_0404_" + num + ".jpg";

    let img = document.createElement("img");
    img.src = url;

    img.onerror = () => img.remove();

    let box = document.createElement("div");
    box.className = "img-box";
    box.appendChild(img);

    gallery.appendChild(box);
  }
}

// initial load
loadGallery("gto");

</script>

</body>
</html>
