<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* SAME DESIGN (LOCKED) */
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  overflow-x:hidden;
  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-position:center;
}

.back{
  position:fixed;
  top:20px;
  left:20px;
  color:#0a4f73;
  text-decoration:none;
  font-weight:600;
}

.header{
  text-align:center;
  padding:80px 20px 30px;
}

.title{
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:18px 60px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.6);
}

.filters{
  text-align:center;
  margin:25px 0;
}

.filters button{
  margin:6px;
  padding:10px 18px;
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(10px);
  color:#0a4f73;
  font-weight:600;
  cursor:pointer;
}

.filters button.active{
  background:#0a4f73;
  color:white;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px;
  padding:30px 30px 80px;
}

.gallery img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:14px;
  cursor:pointer;
}

.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
}

.lightbox.active{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:90%;
  max-height:85%;
}

</style>
</head>

<body>

<a href="index.html" class="back">← Back</a>

<div class="header">
  <div id="title" class="title">Gallery</div>
</div>

<div id="filters" class="filters"></div>
<div id="gallery" class="gallery"></div>

<div id="lightbox" class="lightbox">
  <img id="lightbox-img">
</div>

<script>

/* 🔥 STEP 3 — READ URL */
const params = new URLSearchParams(window.location.search);

const event = params.get("event");
const category = params.get("cat");

/* 🔥 STEP 4 — CONFIG SYSTEM */
const cloudName="du4pmuch7";

const CONFIG = {

  cn2026: {

    "inf-menor": {
      title:"Infantil Menor",
      base:"WP%202026/Campeonato%20Nacional%202026/inf-menor-cdmx",
      teams:{
        GRO:{prefix:"CN2026_InfMnr_CDMX_GRO_0319_",count:85},
        GTO:{prefix:"CN2026_InfMnr_CDMX_GTO_0322_",count:79},
        MIC:{prefix:"CN2026_InfMnr_CDMX_MIC_0321_",count:43},
        NLE:{prefix:"CN2026_InfMnr_CDMX_NLE_0320_",count:68}
      }
    },

    "junior": {
      title:"Junior",
      base:"WP%202026/Campeonato%20Nacional%202026/junior-cdmx",
      teams:{
        // 👉 YOU WILL FILL THIS BASED ON YOUR UPLOADS
      }
    }

  }

};

/* 🔥 LOAD CONFIG */
const config = CONFIG[event]?.[category];

document.getElementById("title").innerText = config?.title || "Gallery";

/* BUILD FILTERS */
const filtersDiv = document.getElementById("filters");

Object.keys(config.teams).forEach((team,i)=>{
  const btn=document.createElement("button");
  btn.innerText="vs "+team;

  if(i===0) btn.classList.add("active");

  btn.onclick=()=>{
    document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    loadTeam(team);
  };

  filtersDiv.appendChild(btn);
});

/* GENERATE IMAGES */
function generateImages(team){
  const c=config.teams[team];
  let arr=[];

  for(let i=1;i<=c.count;i++){
    let n=String(i).padStart(3,"0");

    arr.push({
      thumb:`https://res.cloudinary.com/${cloudName}/image/upload/w_300,q_auto:low,f_auto/${config.base}/gallery/${c.prefix}${n}.jpg`,
      lightbox:`https://res.cloudinary.com/${cloudName}/image/upload/w_1200,q_auto:good,f_auto/${config.base}/gallery/${c.prefix}${n}.jpg`
    });
  }

  return arr;
}

/* LOAD SYSTEM */
let currentImages=[];
let loaded=0;
let batchSize=30;

function loadMore(){
  const g=document.getElementById("gallery");
  const next=currentImages.slice(loaded,loaded+batchSize);

  next.forEach((img)=>{
    let el=document.createElement("img");
    el.src=img.thumb;
    el.loading="lazy";

    const index=loaded;
    el.onclick=()=>openLightbox(index);

    g.appendChild(el);
    loaded++;
  });
}

/* AUTO FILL */
function ensureFill(){
  while(document.body.offsetHeight < window.innerHeight && loaded < currentImages.length){
    loadMore();
  }
}

function loadTeam(team){
  document.getElementById("gallery").innerHTML="";
  currentImages=generateImages(team);
  loaded=0;
  loadMore();
  ensureFill();
}

window.addEventListener("scroll",()=>{
  if((window.innerHeight+window.scrollY)>=document.body.offsetHeight-300){
    if(loaded<currentImages.length){
      loadMore();
    }
  }
});

/* LIGHTBOX */
function openLightbox(i){
  document.getElementById("lightbox-img").src=currentImages[i].lightbox;
  document.getElementById("lightbox").classList.add("active");
}

document.addEventListener("DOMContentLoaded",()=>{
  const firstTeam = Object.keys(config.teams)[0];
  loadTeam(firstTeam);
});

</script>

</body>
</html>
