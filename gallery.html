<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* BACKGROUND */
body{
  margin:0;
  font-family:'Montserrat',sans-serif;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* HEADER */
.header{
  text-align:center;
  padding:80px 20px 40px;
}

/* 🔥 GLASS TITLE */
.title{
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:18px 60px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.6);

  position:relative;
  overflow:hidden;
}

.title::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    120deg,
    transparent 30%,
    rgba(255,255,255,0.6) 50%,
    transparent 70%
  );
  animation:wave 3s infinite linear;
}

@keyframes wave{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

/* FILTERS */
.filters{
  text-align:center;
  margin:30px 0;
}

.filters button{
  margin:6px;
  padding:10px 20px;
  border-radius:25px;

  border:1px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(12px);

  color:#0a4f73;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.filters button.active{
  background:#0a4f73;
  color:white;
}

/* MATCH SECTION */
.match{
  margin:40px 60px 10px;
}

.match-title{
  font-size:20px;
  font-weight:700;
  color:#0a4f73;
  margin-bottom:15px;
}

/* GALLERY GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:14px;
}

/* IMAGE */
.grid img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:14px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.grid img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.lightbox.active{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:90%;
  max-height:85%;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  padding:12px;
  background:rgba(255,255,255,0.85);
}

.footer img{
  height:40px;
  margin:0 12px;
}

</style>
</head>

<body>

<div class="header">
  <div id="title" class="title">Galería</div>
</div>

<div id="filters" class="filters"></div>

<div id="gallery"></div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<div class="footer">
  <img src="logo-aofm.png">
  <img src="logo-club.png">
  <img src="logo-olimpicos.png">
</div>

<script>

const cloud="du4pmuch7";

// CATEGORY FROM URL
const params=new URLSearchParams(window.location.search);
const category=params.get("cat")||"infmenor";

// TITLE
document.getElementById("title").innerText=
  category.replace(/^\w/,c=>c.toUpperCase());

// API
const API=`https://wp-aofm-cdmx.vercel.app/api/images?folder=WP2026/CN2026/${category}/gallery`;

let ALL=[];
let currentRival="";

// LOAD
async function load(){
  const res=await fetch(API);
  ALL=await res.json();
  buildFilters();
}

// FILTERS
function buildFilters(){

  const rivals=new Set();

  ALL.forEach(img=>{
    const p=img.split("_");
    rivals.add(p[3]);
  });

  const container=document.getElementById("filters");
  container.innerHTML="";

  let first=true;

  rivals.forEach(r=>{
    const btn=document.createElement("button");
    btn.innerText=r;

    btn.onclick=()=>setRival(btn,r);

    if(first){
      btn.classList.add("active");
      currentRival=r;
      first=false;
    }

    container.appendChild(btn);
  });

  render();
}

// GROUP + RENDER
function render(){

  const container=document.getElementById("gallery");
  container.innerHTML="";

  // filter by rival
  const filtered=ALL.filter(img=>img.includes(`_${currentRival}_`));

  // group by date
  const groups={};

  filtered.forEach(img=>{
    const parts=img.split("_");
    const date=parts[4];

    if(!groups[date]) groups[date]=[];
    groups[date].push(img);
  });

  Object.keys(groups).sort().forEach(date=>{

    const section=document.createElement("div");
    section.className="match";

    const title=document.createElement("div");
    title.className="match-title";
    title.innerText=`${currentRival} · ${formatDate(date)}`;

    const grid=document.createElement("div");
    grid.className="grid";

    groups[date].forEach(id=>{

      const url=`https://res.cloudinary.com/${cloud}/image/upload/f_auto,q_auto,w_400/${id}.jpg`;

      const img=new Image();
      img.src=url;
      img.loading="lazy";

      img.onclick=()=>{
        document.getElementById("lightbox-img").src=url.replace("w_400","w_1200");
        document.getElementById("lightbox").classList.add("active");
      };

      grid.appendChild(img);
    });

    section.appendChild(title);
    section.appendChild(grid);
    container.appendChild(section);

  });
}

// FORMAT DATE
function formatDate(d){
  const day=d.slice(2);
  const month=d.slice(0,2);

  const months={
    "03":"MAR",
    "04":"APR"
  };

  return `${day} ${months[month]||month}`;
}

// CHANGE RIVAL
function setRival(btn,r){
  currentRival=r;

  document.querySelectorAll(".filters button")
    .forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");

  render();
}

// LIGHTBOX
function closeLightbox(){
  document.getElementById("lightbox").classList.remove("active");
}

// INIT
window.onload=load;

</script>

</body>
</html>
