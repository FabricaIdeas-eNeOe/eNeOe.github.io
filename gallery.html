<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

h1 {
  margin-top: 40px;
}

.buttons {
  margin: 20px;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border-radius: 20px;
  border: none;
  background: #ccc;
  cursor: pointer;
}

button.active {
  background: #2f5d62;
  color: white;
}

#gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap: 10px;
  padding: 20px;
}

#gallery img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>GALERÍA INF-MENOR</h1>

<div class="buttons">
  <button onclick="loadGTO(this)" class="active">vs GTO</button>
  <button onclick="loadMIC(this)">vs MIC</button>
</div>

<div id="gallery"></div>

<script>
const cloudName = "du4pmuch7";

// ⚠️ THIS IS THE REAL FIX (spaces included)
const basePath = "WP 2026/Campeonato Nacional 2026/inf-menor-cdmx/gallery/";

function clearActive(btn) {
  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function loadGTO(btn) {
  clearActive(btn);
  loadImages("CN2026_InfMnr_CDMX_GTO_0322_", 120);
}

function loadMIC(btn) {
  clearActive(btn);
  loadImages("CN2026_InfMnr_CDMX_MIC_0321_", 120);
}

function loadImages(prefix, max) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  for (let i = 1; i <= max; i++) {
    let num = i.toString().padStart(3, "0");

    let img = document.createElement("img");

    img.src =
      "https://res.cloudinary.com/" +
      cloudName +
      "/image/upload/f_auto,q_auto/" +
      basePath +
      prefix +
      num +
      ".jpg";

    img.onerror = () => img.remove();

    gallery.appendChild(img);
  }
}

// default load
loadImages("CN2026_InfMnr_CDMX_GTO_0322_", 120);
</script>

</body>
</html>
