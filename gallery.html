<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:url("background.png") center/cover no-repeat fixed;
}

/* TITLE */
.title{
  text-align:center;
  margin-top:40px;
  font-size:38px;
  font-weight:bold;
  color:#0a4f73;

  display:inline-block;
  padding:15px 40px;
  border-radius:25px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.5);
}

/* TABS */
.tabs{
  margin-top:20px;
  text-align:center;
}

.tab{
  display:inline-block;
  margin:5px;
  padding:10px 18px;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
  position:relative;
  overflow:hidden;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.5);
}

/* WATER SHIMMER */
.tab::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    120deg,
    transparent 30%,
    rgba(255,255,255,0.6) 50%,
    transparent 70%
  );
  opacity:0;
}

.tab:hover::before{
  opacity:1;
  animation:wave 2s linear infinite;
}

@keyframes wave{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

.tab.active{
  background:#0a4f73;
  color:white;
}

/* GALLERY */
.gallery{
  margin-top:40px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  padding-bottom:100px;
}

.gallery img{
  width:220px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10;
}

.viewer img{
  max-width:90%;
  max-height:90%;
}

/* BOTTOM BAR */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  text-align:center;
  padding:10px;
}

.footer img{
  height:40px;
  margin:0 10px;
}
</style>
</head>

<body>

<div style="text-align:center">
  <div id="title" class="title"></div>
</div>

<div id="tabs" class="tabs"></div>

<div id="gallery" class="gallery"></div>

<div id="viewer" class="viewer" onclick="this.style.display='none'">
  <img id="full">
</div>

<div class="footer">
  <img src="logo-aofm.png">
  <img src="logo-cdmx.png">
  <img src="logo-federacion.png">
</div>

<script>
const BASE = "https://res.cloudinary.com/du4pmuch7/image/upload/";
const ROOT = "WP 2026/Campeonato Nacional 2026/";

/* CATEGORY CONFIG (LOCKED STRUCTURE) */
const CONFIG = {
  "inf-menor": {
    title:"INF MENOR",
    folder:"inf-menor-cdmx/gallery/",
    prefix:"InfMnr",
    rivals:["GRO","GTO","MIC","NL"]
  },
  "inf-mayor": {
    title:"INF MAYOR",
    folder:"inf-mayor-cdmx/gallery/",
    prefix:"InfMyr",
    rivals:["AGS","COAH","EDOMEX","GRO","NL","ROO"]
  },
  "junior": {
    title:"JUNIOR",
    folder:"junior-cdmx/gallery/",
    prefix:"Junr",
    rivals:["GTO","GTO2","UNAM","UNAM2"]
  }
};

const urlParams = new URLSearchParams(window.location.search);
const cat = urlParams.get("cat");

const current = CONFIG[cat];

const title = document.getElementById("title");
const tabs = document.getElementById("tabs");
const gallery = document.getElementById("gallery");
const viewer = document.getElementById("viewer");
const full = document.getElementById("full");

title.innerText = current.title;

/* BUILD TABS */
current.rivals.forEach((r,i)=>{
  let t = document.createElement("div");
  t.className = "tab" + (i==0 ? " active":"");
  t.innerText = "vs " + r;
  t.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    load(r);
  };
  tabs.appendChild(t);
});

/* LOAD IMAGES (FIXED ENGINE) */
function load(rival){

  gallery.innerHTML="";
  let index = 1;
  let failCount = 0;

  function scan(){

    let num = String(index).padStart(3,"0");
    let attempts = 0;
    let success = false;

    const dates = ["0319","0320","0321","0322","0404"];

    dates.forEach(date=>{

      let publicId = `${ROOT}${current.folder}CN2026_${current.prefix}_CDMX_${rival}_${date}_${num}`;

      let thumb = `${BASE}q_auto,f_auto,w_400/${encodeURI(publicId)}.jpg`;
      let fullUrl = `${BASE}${encodeURI(publicId)}.jpg`;

      let img = new Image();

      img.onload = ()=>{
        success = true;
        failCount = 0;

        img.onclick = ()=>{
          full.src = fullUrl;
          viewer.style.display="flex";
        };

        gallery.appendChild(img);
      };

      img.onerror = ()=>{
        attempts++;
        if(attempts === dates.length){
          if(!success) failCount++;
        }
      };

      img.src = thumb;
    });

    index++;

    setTimeout(()=>{
      if(failCount < 25){
        scan();
      }
    }, 60);
  }

  scan();
}

/* INIT */
load(current.rivals[0]);
</script>

</body>
</html>
