<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
}

h1 {
    margin: 40px 0 10px;
    font-size: 36px;
}

.tabs {
    margin-bottom: 30px;
}

.tab {
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    margin: 5px;
    cursor: pointer;
    background: #ddd;
}

.tab.active {
    background: #1f5c63;
    color: white;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
    padding: 0 40px 40px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    object-fit: cover;
}
</style>
</head>

<body>

<h1 id="title">GALERÍA</h1>
<div class="tabs" id="tabs"></div>
<div class="gallery" id="gallery"></div>

<script>
const cloudName = "du4pmuch7";
const basePath = "WP2026/Campeonato-Nacional-2026";

// CATEGORY MAP
const CATEGORY_MAP = {
  "junior": "JNR",
  "inf-mayor": "InfMyr",
  "inf-menor": "InfMnr",
  "kids": "Kids"
};

// TEAMS
const TEAMS = {
  "junior": ["GTO", "3RD"],
  "inf-mayor": ["ROO", "COAH"],
  "inf-menor": ["GTO", "MIC"],
  "kids": ["FUN"]
};

// PARAMS
const params = new URLSearchParams(window.location.search);
const category = params.get("cat") || "junior";

// TITLE
document.getElementById("title").innerText =
  "GALERÍA " + category.toUpperCase();

// CREATE TABS
const tabsContainer = document.getElementById("tabs");

TEAMS[category].forEach((team, index) => {
  const btn = document.createElement("button");
  btn.className = "tab" + (index === 0 ? " active" : "");
  btn.innerText = "vs " + team;

  btn.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    loadGallery(team);
  };

  tabsContainer.appendChild(btn);
});

// 🔥 FINAL AUTO-DETECT LOAD FUNCTION (NO DATES NEEDED)
function loadGallery(team) {

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  const categoryCode = CATEGORY_MAP[category];

  let imgIndex = 1;
  let fails = 0;

  function generateDates() {
    const dates = [];

    for (let m = 1; m <= 12; m++) {
      for (let d = 1; d <= 31; d++) {
        const mm = String(m).padStart(2, "0");
        const dd = String(d).padStart(2, "0");
        dates.push(mm + dd);
      }
    }

    return dates;
  }

  const ALL_DATES = generateDates();
  let dateIndex = 0;

  function tryNext() {

    const num = String(imgIndex).padStart(3, "0");
    const date = ALL_DATES[dateIndex];

    const url = `https://res.cloudinary.com/${cloudName}/image/upload/${basePath}/${category}-cdmx/gallery/CN2026_${categoryCode}_CDMX_${team}_${date}_${num}.jpg`;

    const img = new Image();

    img.onload = () => {
      gallery.appendChild(img);
      imgIndex++;
      fails = 0;
      tryNext();
    };

    img.onerror = () => {
      dateIndex++;

      if (dateIndex >= ALL_DATES.length) {
        dateIndex = 0;
        imgIndex++;
        fails++;
      }

      if (fails > 10) return;

      tryNext();
    };

    img.src = url;
  }

  tryNext();
}

// INITIAL LOAD
loadGallery(TEAMS[category][0]);
</script>

</body>
</html>
