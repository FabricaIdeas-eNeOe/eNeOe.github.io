<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  overflow-x:hidden;

  background:
    linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.15)),
    url('background.png');
  background-size:cover;
  background-position:center;
}

/* HEADER */
.header{
  text-align:center;
  padding:80px 20px 30px;
}

.title{
  display:inline-block;
  font-size:42px;
  font-weight:800;
  color:#0a4f73;
  padding:18px 60px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(25px);

  border-radius:30px;
  border:1px solid rgba(255,255,255,0.6);
}

/* FILTERS */
.filters{
  text-align:center;
  margin:25px 0;
}

.filters button{
  margin:6px;
  padding:10px 18px;
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(12px);
  color:#0a4f73;
  font-weight:600;
  cursor:pointer;
}

.filters button.active{
  background:#0a4f73;
  color:white;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px;
  padding:30px 30px 120px;
}

.gallery img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:14px;
  cursor:pointer;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.lightbox.active{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:95%;
  max-height:90%;
}

.close-btn{
  position:absolute;
  top:20px;
  right:20px;
  width:45px;
  height:45px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  padding:12px;
  background:rgba(255,255,255,0.85);
}

.footer img{
  height:40px;
  margin:0 10px;
}

/* ADMIN */
.admin-zone{
  position:fixed;
  bottom:0;
  right:0;
  width:80px;
  height:60px;
  opacity:0;
}

</style>
</head>

<body>

<div class="header">
  <div id="title" class="title">Gallery</div>
</div>

<div id="filters" class="filters"></div>
<div id="gallery" class="gallery"></div>

<div id="lightbox" class="lightbox">
  <div class="close-btn" onclick="closeLightbox()">✕</div>
  <img id="lightbox-img">
</div>

<div class="footer">
  <img src="logo-aofm.png">
  <img src="logo-club.png">
  <img src="logo-olimpicos.png">
</div>

<div class="admin-zone" onclick="window.location='index.html'"></div>

<script>

const params = new URLSearchParams(window.location.search);
const event = params.get("event");
const category = params.get("cat");

const cloudName="du4pmuch7";

/* FULL CONFIG RESTORED */
const CONFIG = {

  cn2026: {

    "inf-menor": {
      title:"Infantil Menor",
      base:"WP%202026/Campeonato%20Nacional%202026/inf-menor-cdmx",
      teams:{
        GRO:{prefix:"CN2026_InfMnr_CDMX_GRO_0319_",count:85},
        GTO:{prefix:"CN2026_InfMnr_CDMX_GTO_0322_",count:79},
        MIC:{prefix:"CN2026_InfMnr_CDMX_MIC_0321_",count:43},
        NLE:{prefix:"CN2026_InfMnr_CDMX_NLE_0320_",count:68}
      }
    },

    "inf-mayor": {
      title:"Infantil Mayor",
      base:"WP%202026/Campeonato%20Nacional%202026/inf-mayor-cdmx",
      teams:{
        AGS:{prefix:"CN2026_InfMyr_CDMX_AGS_0320_",count:50},
        COAH:{prefix:"CN2026_InfMyr_CDMX_COA_0320_",count:51},
        EDOMEX:{prefix:"CN2026_InfMyr_CDMX_EDM_0319_",count:44},
        GRO:{prefix:"CN2026_InfMyr_CDMX_GRO_0319_",count:113},
        NL:{prefix:"CN2026_InfMyr_CDMX_NLE_0321_",count:107},
        QROO:{prefix:"CN2026_InfMyr_CDMX_ROO_0322_",count:60}
      }
    },

    "junior": {
      title:"Junior",
      base:"WP%202026/Campeonato%20Nacional%202026/junior-cdmx",
      teams:{
        GTO1:{prefix:"CN2026_JNR_CDMX_GTO_0402_",count:80,label:"vs GTO - Game 1"},
        GTO2:{prefix:"CN2026_JNR_CDMX_GTO2_0402_",count:80,label:"vs GTO - Game 2"},
        UNAM1:{prefix:"CN2026_JNR_CDMX_UNAM_0403_",count:80,label:"vs UNAM - Game 1"},
        UNAM2:{prefix:"CN2026_JNR_CDMX_UNAM2_0403_",count:80,label:"vs UNAM - Game 2"},
        PREMIACION:{prefix:"CN2026_JNR_CDMX_3RD_",count:60,label:"Premiación"}
      }
    }

  }

};

const config = CONFIG[event]?.[category];

if(!config){
  document.getElementById("title").innerText="No gallery found";
  throw new Error("Invalid category");
}

document.getElementById("title").innerText=config.title;

/* FILTERS */
const filtersDiv=document.getElementById("filters");

Object.keys(config.teams).forEach((team,i)=>{
  const btn=document.createElement("button");
  btn.innerText = config.teams[team].label || ("vs " + team);

  if(i===0) btn.classList.add("active");

  btn.onclick=()=>{
    document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    loadTeam(team);
  };

  filtersDiv.appendChild(btn);
});

/* IMAGES */
function generateImages(team){
  const c=config.teams[team];
  let arr=[];

  for(let i=1;i<=c.count;i++){
    let n=String(i).padStart(3,"0");

    arr.push({
      thumb:`https://res.cloudinary.com/${cloudName}/image/upload/w_300,q_auto:low,f_auto/${config.base}/gallery/${c.prefix}${n}.jpg`,
      full:`https://res.cloudinary.com/${cloudName}/image/upload/q_auto:good,f_auto/${config.base}/gallery/${c.prefix}${n}.jpg`
    });
  }

  return arr;
}

/* LOAD */
let currentImages=[];
let loaded=0;

function loadMore(){
  const g=document.getElementById("gallery");

  currentImages.slice(loaded,loaded+30).forEach((img)=>{
    let el=document.createElement("img");
    el.src=img.thumb;

    const index=loaded;
    el.onclick=()=>openLightbox(index);

    g.appendChild(el);
    loaded++;
  });
}

function loadTeam(team){
  document.getElementById("gallery").innerHTML="";
  currentImages=generateImages(team);
  loaded=0;
  loadMore();
}

/* LIGHTBOX */
function openLightbox(i){
  document.getElementById("lightbox-img").src=currentImages[i].full;
  document.getElementById("lightbox").classList.add("active");
}

function closeLightbox(){
  document.getElementById("lightbox").classList.remove("active");
}

document.addEventListener("DOMContentLoaded",()=>{
  loadTeam(Object.keys(config.teams)[0]);
});

</script>

</body>
</html>
