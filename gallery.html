<script>

/* =========================
   CONFIG
========================= */

const CLOUD_NAME = "du4pmuch7";
const BASE_PATH = "WP_2026/Campeonato_Nacional_2026";

/* =========================
   FALLBACK MANIFEST (manual safety)
========================= */

const FALLBACK = {
  junior: {
    GTO: ["gto_01"],
    GTO2: [],
    UNAM: [],
    UNAM2: [],
    "3RD": []
  },
  "inf-mayor": {
    COAH: [],
    ROO: []
  },
  "inf-menor": {
    MIC: []
  }
};

/* =========================
   INIT
========================= */

const params = new URLSearchParams(window.location.search);
const category = params.get("cat");

const gallery = document.getElementById("gallery");
const tabs = document.getElementById("tabs");
const title = document.getElementById("title");

if(!FALLBACK[category]){
  document.body.innerHTML = "<h2>Invalid category</h2>";
}

title.innerText = category.toUpperCase();

/* =========================
   BUILD TABS
========================= */

Object.keys(FALLBACK[category]).forEach((rival,i)=>{

  const tab = document.createElement("div");
  tab.className = "tab" + (i===0 ? " active" : "");

  tab.innerText = rival === "3RD" ? "Premiación" : "vs " + rival;

  tab.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    loadImages(rival);
  };

  tabs.appendChild(tab);
});

/* =========================
   LOAD IMAGES (HYBRID)
========================= */

async function loadImages(rival){

  gallery.innerHTML = "Loading...";

  const folder = `${BASE_PATH}/${category}-cdmx/gallery`;

  const jsonURL = `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${folder}.json`;

  try {

    const res = await fetch(jsonURL);

    if(!res.ok) throw "Cloudinary JSON failed";

    const data = await res.json();

    // Filter images by rival keyword
    const images = data.resources
      .map(r => r.public_id.split("/").pop())
      .filter(name => name.toLowerCase().includes(rival.toLowerCase()));

    render(images);

  } catch(e){

    console.warn("Using FALLBACK:", e);

    const images = FALLBACK[category][rival] || [];
    render(images);
  }
}

/* =========================
   RENDER
========================= */

function render(list){

  gallery.innerHTML = "";

  if(!list.length){
    gallery.innerHTML = "<p>No images yet</p>";
    return;
  }

  list.forEach(name => {

    const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${BASE_PATH}/${category}-cdmx/gallery/${name}.jpg`;

    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = url;

    img.onerror = ()=>card.remove();

    card.appendChild(img);
    gallery.appendChild(card);
  });
}

/* =========================
   INIT LOAD
========================= */

const first = Object.keys(FALLBACK[category])[0];
loadImages(first);

</script>
